<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Team Season</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --black:#B23333;
    --dark:#333333;
    --muted:#6f6f6f;
    --border:#dddddd;
    --bg:#F2F4F7;
    --surface:#ffffff;
    --radius:3px;
    --green:#2a7a4e;
    --green-bg:#e6f4ea;
    --amber:#7a5f18;
    --amber-bg:#fbf3d9;
    --red:#b03030;
    --red-bg:#fbe9e9;
  }
  *{box-sizing:border-box}
  html,body{height:100%;width:100%;font-family:'Montserrat',Arial,sans-serif;font-size:14px;background:var(--bg);color:var(--dark);margin:0;overscroll-behavior-x:none}
  .wrap{max-width:520px;margin:0 auto;padding:16px 16px 40px}
  .app-header{background:#0F1E2E;display:flex;align-items:center;gap:10px;padding:12px 16px}
  .app-header .brand-mark{width:32px;height:32px;border:1.5px solid var(--black);border-radius:6px;background:linear-gradient(135deg,#0F1E2E,#1a2f45);display:flex;align-items:center;justify-content:center;font-weight:800;font-style:italic;color:#fff;font-size:13px;flex-shrink:0;background-size:cover;background-position:center}
  .app-header .brand-name{font-weight:800;font-size:16px;color:#fff}
  .app-header .brand-name b{color:var(--black)}
  .team-header{margin-bottom:16px}
  .team-header h1{font-size:22px;margin:0 0 2px;font-weight:800}
  .team-header .sub{font-size:13px;color:var(--muted)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
  .card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
  .stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  .stat-value{font-size:20px;font-weight:800;margin-top:2px}
  .row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .row-meta{font-size:11px;color:var(--muted);flex-shrink:0}
  .pill{background:#eee;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;flex-shrink:0}
  .badge{border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;flex-shrink:0}
  .badge-W{background:var(--green-bg);color:var(--green)}
  .badge-D{background:var(--amber-bg);color:var(--amber)}
  .badge-L{background:var(--red-bg);color:var(--red)}
  .score{font-size:13px;font-weight:700;flex-shrink:0}
  .outcome-banner{text-align:center;padding:18px 16px}
  .outcome-banner .name{font-weight:700;font-size:14px}
  .outcome-banner .label{font-size:19px;font-weight:800;margin-top:4px}
  .squad-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#eee;font-size:11px;font-weight:700;flex-shrink:0}
  .empty{text-align:center;padding:40px 16px;color:var(--muted)}
  .empty .icon{font-size:32px;margin-bottom:10px}
  .loading{text-align:center;padding:60px 16px;color:var(--muted)}
  .footer-note{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .skeleton{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:skeleton-shimmer 1.4s ease-in-out infinite;border-radius:4px}
  @keyframes skeleton-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skeleton-line{height:14px;margin-bottom:8px}
  .skeleton-title{height:22px;width:60%;margin-bottom:4px}
  @media (prefers-reduced-motion: reduce){.skeleton{animation:none;background:#eee}}
  .sticky-header{position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;transform:translateY(-100%);transition:transform .2s ease;z-index:100}
  .sticky-header.visible{transform:translateY(0)}
  .sticky-header .name{font-weight:800;font-size:14px}
  .sticky-header .season{font-size:11px;color:var(--muted)}
  @media (prefers-reduced-motion: reduce){.sticky-header{transition:none}}
  .live-banner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--black);color:#fff;padding:10px 20px;border-radius:24px;font-size:12px;font-weight:700;font-family:inherit;border:none;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:100;display:flex;align-items:center;gap:8px;cursor:pointer}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .skip-link{position:absolute;top:-40px;left:8px;background:var(--dark);color:#fff;padding:8px 14px;border-radius:4px;z-index:1000;text-decoration:none;font-size:13px;font-weight:700}
  .skip-link:focus{top:8px}
  a:focus-visible, button:focus-visible, [tabindex]:focus-visible, [role="button"]:focus-visible {
    outline:3px solid #1a56c4; outline-offset:2px;
  }
  /* No focus outline is ever removed without this visible replacement —
     every interactive element in this file relies on the browser's
     default focus behavior plus this enhanced visible ring, never
     outline:none on its own. */
  .live-banner .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:live-pulse 1.5s ease-in-out infinite}
  @keyframes live-pulse{0%,100%{opacity:1}50%{opacity:.3}}
  @media (prefers-reduced-motion: reduce){.live-banner .dot{animation:none}}
</style>
</head>
<body>
<a href="#content" class="skip-link">Skip to main content</a>
<div id="stickyHeader" class="sticky-header" aria-hidden="true">
  <span class="name" id="stickyName"></span>
  <span class="season" id="stickySeason"></span>
</div>
<div class="app-header">
  <div class="brand-mark" id="brandMark" aria-hidden="true">11</div>
  <div class="brand-name">Next<b>Eleven</b></div>
</div>
<div class="wrap">
  <main id="content">
    <div class="team-header">
      <div class="skeleton skeleton-title"></div>
      <div class="skeleton skeleton-line" style="width:30%"></div>
    </div>
    <div class="card">
      <div class="skeleton skeleton-line" style="width:40%"></div>
      <div class="skeleton skeleton-line" style="width:70%"></div>
    </div>
    <div class="card">
      <div class="skeleton skeleton-line" style="width:40%"></div>
      <div class="stat-grid">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line"></div>
      </div>
    </div>
  </main>
</div>

<script src="public-stats-core.js"></script>
<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
// Pre-configured so this page works with zero setup for whoever opens the
// link — same reasoning as the main app's own DEFAULTS: these values are
// meant to be public-facing (Supabase's anon key carries no special
// privileges by itself), and the actual security boundary is entirely
// inside the get_public_team_data RPC and this feature's RLS policy, not
// secrecy of the project URL.
const SUPABASE_URL = 'https://wicydcvdakqopodbxtrl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpY3lkY3ZkYWtxb3BvZGJ4dHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MDA5NTUsImV4cCI6MjA5NzE3Njk1NX0._sIaztNAGi9ffuL8qz84G-q_h5TIKTYbyjcnD9VwbE0';

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  if (!d) return '—';
  const parts = String(d).split('-');
  if (parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}
function shortName(fullName) {
  if (!fullName) return '';
  const parts = String(fullName).trim().split(/\s+/);
  if (parts.length <= 2) return fullName;
  return parts[0] + ' ' + parts[parts.length - 1];
}

// ══════════════════════════════════════════════════════════════════════════
// PHASE 3 — LIVE REFRESH ENGINE
// ══════════════════════════════════════════════════════════════════════════
let _teamPageToken = null;
let _lastGoodData = null;
let _refreshInFlight = false;
let _pollTimer = null;
let _lastSuccessfulRefresh = null;

async function loadTeamPage() {
  const contentEl = document.getElementById('content');
  const params = new URLSearchParams(window.location.search);
  _teamPageToken = params.get('token');

  if (!_teamPageToken) {
    contentEl.innerHTML = `<div class="empty"><div class="icon">🔗</div><strong>No link provided</strong><p>This page needs a share link from a parent or guardian.</p></div>`;
    return;
  }

  await refreshTeamData(true); // true = this is the initial load, allowed to replace the skeleton with an error state if it fails
  startPolling();
  bindVisibilityAndReconnectRefresh();
}

// The actual fetch + render step, reused by initial load, the 60s poll,
// visibility-change, reconnect, and the manual Refresh button — all of
// them funnel through this one function, which guarantees at most one
// request in flight at a time (per the approved spec) and never wipes a
// previously-successful render just because a later background refresh
// failed.
async function refreshTeamData(isInitialLoad) {
  if (_refreshInFlight) return; // never overlap two refreshes
  _refreshInFlight = true;
  const contentEl = document.getElementById('content');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_public_team_data`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      },
      body: JSON.stringify({ p_token: _teamPageToken }),
    });
    if (!res.ok) throw new Error('Request failed');
    const data = await res.json();

    if (!data) {
      // A genuinely revoked/disabled token — this is a real, permanent
      // state, not a transient failure, so it's correct to replace the
      // page even on a background refresh (per spec: disabled/revoked
      // tokens must show nothing).
      contentEl.innerHTML = `<div class="empty"><div class="icon">🔒</div><strong>This link isn't available</strong><p>It may have been disabled or replaced with a new one. Ask the team parent for the current link.</p></div>`;
      stopPolling();
      return;
    }

    _lastGoodData = data;
    _lastSuccessfulRefresh = new Date();
    render(contentEl, data);
    updateFooterRefreshStatus(null);
  } catch (err) {
    if (isInitialLoad && !_lastGoodData) {
      // Only the very first load, with nothing successful yet to fall
      // back on, shows the scary full-page error — every later failure
      // (a background poll, a flaky reconnect) keeps whatever was last
      // successfully shown, per "keep last successful data visible if
      // refresh fails."
      contentEl.innerHTML = `<div class="empty"><div class="icon">⚠️</div><strong>Couldn't load this page</strong><p>Please check your connection and try again.</p></div>`;
    } else {
      updateFooterRefreshStatus('Refresh failed — showing last update.');
    }
  } finally {
    _refreshInFlight = false;
  }
}

function startPolling() {
  if (_pollTimer) return; // never start twice
  _pollTimer = setInterval(() => {
    if (document.visibilityState === 'visible' && navigator.onLine) {
      refreshTeamData(false);
    }
  }, 60000); // 60 seconds, per the approved spec — not 2 minutes
}

function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

function bindVisibilityAndReconnectRefresh() {
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') refreshTeamData(false);
  });
  window.addEventListener('online', () => refreshTeamData(false));
}

// Manual Refresh button handler — always allowed regardless of the
// in-flight guard's timing, since a real user tap should never feel
// ignored; refreshTeamData's own guard still prevents a true overlap if
// one happens to already be running.
function handleManualRefresh() {
  refreshTeamData(false);
}

function updateFooterRefreshStatus(errorMessage) {
  const el = document.getElementById('footerRefreshStatus');
  if (!el) return;
  if (errorMessage) {
    el.textContent = errorMessage;
    return;
  }
  if (_lastSuccessfulRefresh) {
    const hh = String(_lastSuccessfulRefresh.getHours()).padStart(2,'0');
    const mm = String(_lastSuccessfulRefresh.getMinutes()).padStart(2,'0');
    el.textContent = `Last updated: ${hh}:${mm}`;
  }
}


function renderSeasonLeaders(players, finishedGames, gamePlayers) {
  if (!players.length || !finishedGames.length) return '';

  const withStats = players.map(p => ({
    ...p,
    stats: playerPublicStats(p.playerId, finishedGames, gamePlayers)
  }));

  function leaderRow(label, statKey) {
    const maxVal = Math.max(...withStats.map(p => p.stats[statKey] || 0));
    if (maxVal === 0) return ''; // hide categories with no meaningful data
    const leaders = withStats.filter(p => (p.stats[statKey] || 0) === maxVal);
    const names = leaders.map(p => shortName(p.fullName)).join(', ');
    return `<div class="row">
      <span class="row-name">${label}</span>
      <span class="row-meta">${esc(names)} (${maxVal})</span>
    </div>`;
  }

  const rows = [
    leaderRow('Most Appearances', 'calledUp'),
    leaderRow('Top Scorer', 'goals'),
    leaderRow('Most Assists', 'assists'),
  ].filter(r => r);

  if (!rows.length) return '';

  return `
  <div class="card">
    <h2 class="card-title" style="margin-top:0;font-size:11px">Season Leaders</h2>
    ${rows.join('')}
  </div>`;
}

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtBirthday(b) {
  if (!b.birthdayMonth || !b.birthdayDay) return '';
  return b.birthdayDay + ' ' + MONTH_NAMES[b.birthdayMonth - 1];
}

function renderBirthdaySection(birthdays) {
  if (!birthdays.length) return '';

  const todayBirthdays = birthdays.filter(b => b.isToday);
  const thisWeekBirthdays = birthdays.filter(b => b.isThisWeek);
  const upcoming = birthdays.slice(0, 3);

  // Today takes priority — a genuine, prominent celebration card, one
  // per player if multiple share a birthday (rare, but handled).
  if (todayBirthdays.length) {
    return `
    <div class="card" style="background:#fef6e0;border-color:#f0d98a;text-align:center">
      ${todayBirthdays.map(b => `
        <div style="padding:6px 0">
          <div style="font-size:28px" aria-hidden="true">🎂</div>
          <div style="font-weight:800;font-size:16px;margin-top:4px">Happy Birthday, ${esc(shortName(b.fullName))}!</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${fmtBirthday(b)} · Turning ${b.turningAge} today${b.shirtNumber ? ' · #' + esc(b.shirtNumber) : ''}</div>
        </div>
      `).join('<hr style="border:none;border-top:1px solid #f0d98a;margin:10px 0">')}
    </div>`;
  }

  // Within the coming week — a lighter mention, not a full celebration
  // card, since the day itself hasn't arrived yet.
  if (thisWeekBirthdays.length) {
    return `
    <div class="card" style="background:#fef6e0;border-color:#f0d98a">
      <h2 class="card-title" style="color:#7a5f18;margin-top:0;font-size:11px"><span aria-hidden="true">🎂</span> Birthday${thisWeekBirthdays.length>1?'s':''} This Week</h2>
      ${thisWeekBirthdays.map(b => `<div class="row">
        <span class="row-name">${esc(shortName(b.fullName))}${b.shirtNumber ? ' · #' + esc(b.shirtNumber) : ''}</span>
        <span class="row-meta">${fmtBirthday(b)} · Turning ${b.turningAge} · ${b.daysUntil === 1 ? 'tomorrow' : 'in ' + b.daysUntil + ' days'}</span>
      </div>`).join('')}
    </div>`;
  }

  // Otherwise — a compact, low-key "next 3 upcoming" list, so the
  // section is genuinely useful even when nothing is imminent.
  return `
  <div class="card">
    <h2 class="card-title" style="margin-top:0;font-size:11px">Upcoming Birthdays</h2>
    ${upcoming.map(b => `<div class="row">
      <span class="row-name">${esc(shortName(b.fullName))}${b.shirtNumber ? ' · #' + esc(b.shirtNumber) : ''}</span>
      <span class="row-meta">${fmtBirthday(b)} · Turning ${b.turningAge} · in ${b.daysUntil} days</span>
    </div>`).join('')}
  </div>`;
}

function renderRecap(el, data) {
  const games = data.games || [];
  const gamePlayers = data.gamePlayers || [];
  const players = data.players || [];
  const tournaments = data.tournaments || [];
  const season = data.season || {};
  const now = new Date();
  const finishedGames = games.filter(g => {
    if (!g.date) return false;
    const kickoff = new Date(`${g.date}T${g.gameTime || '23:59'}`);
    return kickoff <= now;
  });

  const stats = teamSeasonStats(finishedGames, gamePlayers);
  const withStats = players.map(p => ({ ...p, stats: playerPublicStats(p.playerId, finishedGames, gamePlayers) }));

  function leader(statKey) {
    const maxVal = Math.max(...withStats.map(p => p.stats[statKey] || 0));
    if (maxVal === 0) return null;
    const names = withStats.filter(p => (p.stats[statKey]||0) === maxVal).map(p => shortName(p.fullName));
    return { names, value: maxVal };
  }
  const topScorer = leader('goals');
  const topAssists = leader('assists');
  const mostApps = leader('calledUp');

  const backUrl = window.location.pathname + window.location.search.replace(/&?view=recap/, '');

  el.innerHTML = `
    <div class="team-header">
      <h1>${esc(season.clubName || 'Team')} ${season.ageGroup ? '· ' + esc(season.ageGroup) : ''}</h1>
      <div class="sub">${esc(season.seasonName || '')} Season Recap</div>
    </div>

    ${data.seasonStory ? `
    <div class="card" style="background:#1a1a2e;color:#fff">
      <p style="font-size:14px;line-height:1.6;margin:0">${esc(data.seasonStory)}</p>
    </div>` : ''}

    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Final Record</h2>
      <div class="stat-grid">
        <div><div class="stat-label">Record</div><div class="stat-value">${stats.wins}-${stats.draws}-${stats.losses}</div></div>
        <div><div class="stat-label">Goal Diff</div><div class="stat-value">${stats.goalDiff>0?'+':''}${stats.goalDiff}</div></div>
        <div><div class="stat-label">Goals For</div><div class="stat-value">${stats.goalsFor}</div></div>
        <div><div class="stat-label">Goals Against</div><div class="stat-value">${stats.goalsAgainst}</div></div>
      </div>
    </div>

    ${(topScorer || topAssists || mostApps) ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Season Leaders</h2>
      ${topScorer ? `<div class="row"><span class="row-name">Top Scorer</span><span class="row-meta">${esc(topScorer.names.join(', '))} (${topScorer.value})</span></div>` : ''}
      ${topAssists ? `<div class="row"><span class="row-name">Most Assists</span><span class="row-meta">${esc(topAssists.names.join(', '))} (${topAssists.value})</span></div>` : ''}
      ${mostApps ? `<div class="row"><span class="row-name">Most Appearances</span><span class="row-meta">${esc(mostApps.names.join(', '))} (${mostApps.value})</span></div>` : ''}
    </div>` : ''}

    ${tournaments.length ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Tournaments</h2>
      ${tournaments.map(t => {
        const outcome = getTournamentOutcomePublic(t, games, gamePlayers, 'EN');
        return `<div class="row"><span class="row-name">${esc(t.name)}</span><span class="row-meta">${outcome.emoji?outcome.emoji+' ':''}${esc(outcome.label)}</span></div>`;
      }).join('')}
    </div>` : ''}

    ${(data.seasonHighlights && data.seasonHighlights.length) ? `
    <div class="card" style="background:#faf7f0;border-color:#e2d9c4">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Season Highlights</h2>
      ${data.seasonHighlights.map(a => `<div class="row"><span class="row-name"><span aria-hidden="true">🏆</span> ${esc(a.title)}</span><span class="row-meta">${a.date?fmtDate(a.date):''}</span></div>`).join('')}
    </div>` : ''}

    <div class="card" style="text-align:center">
      <a href="${esc(backUrl)}" style="font-size:13px;font-weight:700;color:var(--red);text-decoration:none">← Back to Team Page</a>
    </div>

    <div class="footer-note">Shared read-only via NextEleven · Season Recap</div>
  `;
}

// Applies the app's own real branding logo to the header, per the
// "reuse the central branding resolver, do not build a separate
// mechanism" instruction — this is the public-page equivalent of
// applyDynamicBrandingToDocument() in the main app, fed by the RPC
// since team.html has no IndexedDB/branding-resolver access at all.
function applyTeamPageBranding(appBranding) {
  const mark = document.getElementById('brandMark');
  if (!mark) return;
  const logoUrl = appBranding?.mainLogo;
  if (logoUrl) {
    // Same fix as the main app: a real white background behind a likely-
    // transparent logo PNG, 'contain' so the full logo shows without
    // cropping, small padding via content-box so it doesn't touch the
    // rounded corners edge-to-edge.
    mark.style.background = '#fff';
    mark.style.backgroundImage = `url('${logoUrl}')`;
    mark.style.backgroundSize = 'contain';
    mark.style.backgroundRepeat = 'no-repeat';
    mark.style.backgroundPosition = 'center';
    mark.style.padding = '3px';
    mark.style.backgroundOrigin = 'content-box';
    mark.style.backgroundClip = 'content-box';
    mark.textContent = '';
  }
}

function render(el, data) {
  applyTeamPageBranding(data.appBranding);

  const params = new URLSearchParams(window.location.search);
  if (params.get('view') === 'recap') {
    renderRecap(el, data);
    return;
  }

  const games = data.games || [];
  const gamePlayers = data.gamePlayers || [];
  const players = data.players || [];
  const tournaments = data.tournaments || [];
  const season = data.season || {};

  // Only finished games count toward the record — same rule the main
  // app's own isGameResultVisible / Team Summary use: the moment kickoff
  // has passed, a game counts as finished. Games here already exclude
  // deleted rows; visibility just needs "already happened."
  const now = new Date();
  const finishedGames = games.filter(g => {
    if (!g.date) return false;
    const kickoff = new Date(`${g.date}T${g.gameTime || '00:00'}`);
    return !isNaN(kickoff) && now >= kickoff;
  });
  const upcomingGames = games.filter(g => !finishedGames.includes(g))
    .sort((a,b) => gameSortKey(a) - gameSortKey(b));

  const stats = teamSeasonStats(finishedGames, gamePlayers);

  const recent = [...finishedGames].sort((a,b) => gameSortKey(b) - gameSortKey(a)).slice(0, 5);
  const next = upcomingGames[0];

  // Live Match banner — only shown when today is genuinely match day,
  // per the spec's "do not show it outside match day." Deliberately a
  // simple date check (today's date matches a scheduled game), not a
  // precise live-clock/in-progress detector, since the app has no
  // concept of "match currently in progress" beyond the scheduled date.
  const todayStr = now.toISOString().slice(0,10);
  const liveMatchToday = games.find(g => g.date === todayStr);

  const html = `
    <div class="team-header">
      <h1>${esc(season.clubName || 'Team')} ${season.ageGroup ? '· ' + esc(season.ageGroup) : ''}</h1>
      <div class="sub">${esc(season.seasonName || '')} ${season.status === 'completed' ? '<span class="badge" style="background:#e8f0fe;color:#1a56c4;margin-left:6px">Completed</span>' : ''}</div>
    </div>

    ${season.status === 'completed' ? `
    <a class="card" href="${esc(window.location.pathname+window.location.search+'&view=recap')}" style="background:#1a1a2e;color:#fff;text-decoration:none;display:block" aria-label="View full ${esc(season.seasonName)} Season Recap">
      <h2 class="card-title" style="color:#aab;margin-top:0;font-size:11px">${esc(season.seasonName)} Season Recap</h2>
      <div class="stat-grid" style="margin-top:8px">
        <div><div class="stat-value" style="color:#fff">${stats.played}</div><div class="stat-label" style="color:#889">Games</div></div>
        <div><div class="stat-value" style="color:#fff">${stats.wins}</div><div class="stat-label" style="color:#889">Wins</div></div>
        <div><div class="stat-value" style="color:#fff">${stats.draws}</div><div class="stat-label" style="color:#889">Draws</div></div>
        <div><div class="stat-value" style="color:#fff">${stats.losses}</div><div class="stat-label" style="color:#889">Losses</div></div>
      </div>
      <div style="margin-top:10px;font-size:12px;font-weight:700;text-decoration:underline">View Recap →</div>
    </a>` : ''}

    ${next ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Next Match</h2>
      <div style="font-weight:700;font-size:15px">${esc(next.opponent)}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px">${fmtDate(next.date)}${next.gameTime ? ' · ' + next.gameTime : ''}${next.competitionName ? ' · ' + esc(next.competitionName) : ''}</div>
      ${(() => {
        const kickoff = new Date(`${next.date}T${next.gameTime || '00:00'}`);
        const daysLeft = Math.round((kickoff - new Date()) / (1000*60*60*24));
        if (isNaN(kickoff) || daysLeft < 0) return '';
        if (daysLeft === 0) return `<div style="font-size:12px;font-weight:700;color:var(--black);margin-top:6px">Today</div>`;
        if (daysLeft === 1) return `<div style="font-size:12px;font-weight:700;color:var(--black);margin-top:6px">Tomorrow</div>`;
        return `<div style="font-size:12px;font-weight:700;color:var(--black);margin-top:6px">${daysLeft} days remaining</div>`;
      })()}
    </div>` : ''}

    ${renderBirthdaySection(data.birthdays || [])}

    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Season Summary</h2>
      <div class="stat-grid">
        <div><div class="stat-label">Record</div><div class="stat-value">${stats.wins}-${stats.draws}-${stats.losses}</div></div>
        <div><div class="stat-label">Goal Diff</div><div class="stat-value">${stats.goalDiff>0?'+':''}${stats.goalDiff}</div></div>
        <div><div class="stat-label">Goals For</div><div class="stat-value">${stats.goalsFor}</div></div>
        <div><div class="stat-label">Goals Against</div><div class="stat-value">${stats.goalsAgainst}</div></div>
      </div>
      ${recent.length ? `
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div class="stat-label" style="margin-bottom:6px">Current Form</div>
        <div style="display:flex;gap:6px">
          ${[...recent].reverse().map(g => {
            const gps = gamePlayers.filter(r => r.gameId === g.gameId);
            const our = teamGoals(gps, g);
            const their = parseInt(g.opponentScore)||0;
            const res = result(our, their, g);
            return `<span class="badge badge-${res}" style="width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%">${res}</span>`;
          }).join('')}
        </div>
      </div>` : ''}
    </div>

    ${renderSeasonLeaders(players, finishedGames, gamePlayers)}

    ${recent.length ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Recent Results</h2>
      ${recent.map(g => {
        const gps = gamePlayers.filter(r => r.gameId === g.gameId);
        const our = teamGoals(gps, g);
        const their = parseInt(g.opponentScore)||0;
        const res = result(our, their, g);
        const s = homeAwayScore(g.homeAway, our, their, g.neutralSide);
        const hasPens = g.ourPenaltyGoals!=null && g.penaltiesForThem!=null;
        return `<div class="row">
          <span class="row-name">${esc(g.opponent)}</span>
          <span class="row-meta">${g.competitionName ? esc(g.competitionName) : ''}</span>
          <span class="score">${s.home}-${s.away}</span>
          ${hasPens?`<span class="row-meta">${g.ourPenaltyGoals}-${g.penaltiesForThem}P</span>`:''}
          <span class="badge badge-${res}">${res}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${tournaments.length ? `
    ${tournaments.map(t => {
      const outcome = getTournamentOutcomePublic(t, games, gamePlayers, 'EN');
      const matchesPlayed = games.filter(g => g.tournamentId === t.tournamentId).length;
      return `<div class="card">
        <h2 class="card-title" style="margin-top:0;font-size:11px">Tournament</h2>
        <div style="font-weight:700;font-size:15px">${esc(t.name)}</div>
        <div style="font-size:13px;margin-top:4px">${outcome.emoji ? outcome.emoji + ' ' : ''}${esc(outcome.label)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${matchesPlayed} match${matchesPlayed===1?'':'es'} played</div>
      </div>`;
    }).join('')}
    ` : ''}

    ${(data.availability && (data.availability.available + data.availability.unavailable) > 0) ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Player Availability</h2>
      <div class="stat-grid">
        <div><div class="stat-label">Available</div><div class="stat-value" style="color:var(--green)">${data.availability.available}</div></div>
        <div><div class="stat-label">Unavailable</div><div class="stat-value" style="color:var(--red)">${data.availability.unavailable}</div></div>
      </div>
      ${data.availability.unavailablePlayers && data.availability.unavailablePlayers.length ? `
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        ${data.availability.unavailablePlayers.map(p => `<div class="row">
          <span class="squad-num">${p.shirtNumber||'—'}</span>
          <span class="row-name">${esc(shortName(p.fullName))}${p.primaryPosition?' · '+esc(p.primaryPosition):''}</span>
          <span class="row-meta" style="color:var(--red)">Unavailable</span>
        </div>`).join('')}
      </div>` : ''}
    </div>` : ''}

    ${players.length ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Squad</h2>
      ${players.map(p => {
        const s = playerPublicStats(p.playerId, finishedGames, gamePlayers);
        const mostPlayed = s.mostPlayedPosition || p.primaryPosition;
        return `<div class="row">
          <span class="squad-num">${p.shirtNumber||'—'}</span>
          <span class="row-name">${esc(p.fullName)}</span>
          <span class="row-meta">${p.primaryPosition?esc(p.primaryPosition):''}${(mostPlayed && mostPlayed !== p.primaryPosition) ? ' · ' + esc(mostPlayed) + ' (most played)' : ''}</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${players.length ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Player Statistics</h2>
      ${players.map(p => {
        const s = playerPublicStats(p.playerId, finishedGames, gamePlayers);
        if (s.calledUp === 0) return '';
        return `<div class="row">
          <span class="row-name">${esc(shortName(p.fullName))}</span>
          <span class="pill">${s.calledUp} GP</span>
          <span class="pill">${s.goals} G</span>
          <span class="pill">${s.assists} A</span>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${(data.seasonHighlights && data.seasonHighlights.length) ? `
    <div class="card" style="background:#faf7f0;border-color:#e2d9c4">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Season Highlights</h2>
      ${data.seasonHighlights.map(a => `<div class="row">
        <span class="row-name"><span aria-hidden="true">🏆</span> ${esc(a.title)}</span>
        <span class="row-meta">${a.date ? fmtDate(a.date) : ''}</span>
      </div>`).join('')}
    </div>` : ''}

    ${(data.previousAchievements && data.previousAchievements.length) ? `
    <div class="card" style="background:#faf7f0;border-color:#e2d9c4">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Previous Achievements</h2>
      ${data.previousAchievements.map(a => `<div class="row">
        <span class="row-name"><span aria-hidden="true">🏆</span> ${esc(a.title)}</span>
        <span class="row-meta">${a.date ? fmtDate(a.date) : ''}</span>
      </div>`).join('')}
    </div>` : ''}

    ${(data.previousSeasons && data.previousSeasons.length) ? `
    <div class="card">
      <h2 class="card-title" style="margin-top:0;font-size:11px">Previous Seasons</h2>
      ${data.previousSeasons.map(s => `<a class="row" href="team.html?token=${encodeURIComponent(s.shareToken)}" style="text-decoration:none;color:inherit" aria-label="View ${esc(s.seasonName)} season for ${esc(s.clubName||'')}">
        <span class="row-name">${esc(s.seasonName)}</span>
        <span class="row-meta">${esc(s.clubName||'')} ›</span>
      </a>`).join('')}
    </div>` : ''}

    <div class="footer-note">
      Shared read-only via NextEleven · Live team data<br>
      <span id="footerRefreshStatus" role="status" aria-live="polite"></span>
      <button type="button" style="background:none;border:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-size:11px;margin-left:6px" onclick="handleManualRefresh()">Refresh</button>
    </div>
  `;

  el.innerHTML = html;

  // Live Match floating banner — a separate fixed element, only ever
  // added to the page when a game is genuinely scheduled today. Removed
  // and re-added fresh each render rather than toggled, since it's
  // simplest to keep in sync with liveMatchToday's actual current value.
  const existingBanner = document.getElementById('liveBanner');
  if (existingBanner) existingBanner.remove();
  if (liveMatchToday) {
    const banner = document.createElement('button');
    banner.id = 'liveBanner';
    banner.type = 'button';
    banner.className = 'live-banner';
    banner.setAttribute('role', 'status');
    banner.setAttribute('aria-live', 'polite');
    banner.innerHTML = `<span class="dot" aria-hidden="true"></span> LIVE MATCH · vs ${esc(liveMatchToday.opponent)}`;
    banner.onclick = () => document.querySelector('.card')?.scrollIntoView({behavior:'smooth'});
    document.body.appendChild(banner);
  }

  // Sticky compact header — populated here, shown/hidden via scroll
  // listener attached once (not re-attached on every render, since
  // loadTeamPage only calls render once per real data load anyway).
  const stickyNameEl = document.getElementById('stickyName');
  const stickySeasonEl = document.getElementById('stickySeason');
  if (stickyNameEl) stickyNameEl.textContent = season.clubName || 'Team';
  if (stickySeasonEl) stickySeasonEl.textContent = season.seasonName || '';

  if (!window._stickyScrollBound) {
    window._stickyScrollBound = true;
    const stickyEl = document.getElementById('stickyHeader');
    const heroEl = document.querySelector('.team-header');
    window.addEventListener('scroll', () => {
      if (!stickyEl || !heroEl) return;
      const heroBottom = heroEl.getBoundingClientRect().bottom;
      stickyEl.classList.toggle('visible', heroBottom < 0);
    }, { passive: true });
  }
}

loadTeamPage();
</script>
</body>
</html>
