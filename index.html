    // ── HELP PAGE ──
    help_quickstart_title:'Início Rápido',
    help_quickstart_content:`
          <ol style="padding-left:18px;line-height:2">
            <li><strong>Criar uma Época</strong> — Definições → Épocas → Nova Época. Indique o nome do clube, o escalão e o nome da época.</li>
            <li><strong>Adicionar Jogadores</strong> — Plantel → Adicionar Jogador. Preencha nome, posição, número da camisola. Marque os jogadores acompanhados como "Acompanhado".</li>
            <li><strong>Adicionar um Jogo</strong> — Jogos → Adicionar Jogo. Indique a data, o adversário e a competição.</li>
            <li><strong>Registar Estatísticas do Jogo</strong> — Jogos → toque em qualquer jogo → preencha golos, assistências, estatuto de cada jogador → Guardar.</li>
            <li><strong>Sincronizar com a Nuvem</strong> — Definições → Sincronização → Sincronizar Agora. Dados disponíveis em todos os seus dispositivos.</li>
            <li><strong>Registar Estatísticas Avançadas</strong> — Toque num jogador acompanhado no menu → separador Estatísticas Avançadas → introduza as estatísticas por jogo.</li>
          </ol>`,
    help_dashboard_title:'Dashboard',
    help_dashboard_content:`
          O ecrã principal mostra de imediato:<br><br>
          <strong>Estado da sincronização</strong> — ponto verde = sincronizado, vermelho = erro, azul = a sincronizar. Toque em Sincronizar para atualizar.<br>
          <strong>Registo da época</strong> — vitórias, empates, derrotas, golos marcados e sofridos.<br>
          <strong>Próximo jogo</strong> — data, adversário, hora de chegada calculada automaticamente.<br>
          <strong>Cartões dos jogadores acompanhados</strong> — estatísticas rápidas de cada jogador acompanhado com a forma recente.<br>
          <strong>Ações rápidas</strong> — adicionar jogo, adicionar jogador, sincronizar, criar cópia de segurança.`,
    help_squad_title:'Plantel',
    help_squad_content:`
          Adicione, edite e gira todos os jogadores da época atual.<br><br>
          <strong>Jogador Acompanhado</strong> — assinale um jogador como acompanhado (o seu filho, um jogador que segue). Passa a ter uma página de estatísticas dedicada no menu.<br>
          <strong>Etiqueta de Acompanhamento</strong> — mostrada como distintivo em todas as tabelas. Ex.: "O Meu Filho".<br>
          <strong>Arquivar</strong> — remove um jogador do plantel ativo sem eliminar o seu histórico de estatísticas.<br>
          <strong>Ordenar colunas</strong> — toque em qualquer cabeçalho de coluna para ordenar de forma ascendente ou descendente.<br>
          <strong>O número da camisola fica fixo</strong> ao deslizar para a direita no telemóvel.`,
    help_games_title:'Jogos',
    help_games_content:`
          Registe cada jogo e introduza as estatísticas de cada jogador.<br><br>
          <strong>Adicionar Jogo</strong> — indique data, adversário, casa/fora, competição. A hora de chegada é calculada automaticamente:<br>
          &nbsp; Jogo em casa: início do jogo menos 45 minutos<br>
          &nbsp; Jogo fora: início do jogo menos 60 minutos<br><br>
          <strong>Detalhe do Jogo</strong> — toque em qualquer jogo para abrir a tabela de estatísticas dos jogadores.<br>
          <strong>Estatuto</strong> — Titular, Suplente ou Não Convocado. Controla quais os campos de estatísticas ativos.<br>
          <strong>Jogo Completo</strong> — definido automaticamente para titulares. Desmarque se o jogador foi substituído.<br>
          <strong>Minuto de Entrada/Saída</strong> — lista de 0–90. Usado para calcular os minutos jogados estimados.<br>
          <strong>MVP e Capitão</strong> — apenas um jogador por jogo pode ter cada um destes estatutos.<br>
          <strong>Guardar</strong> — toque sempre em Guardar antes de saír de um jogo.`,
    help_tp_title:'Páginas de Jogadores Acompanhados',
    help_tp_content:`
          Cada jogador acompanhado tem a sua própria página no menu com 5 separadores:<br><br>
          <strong>Resumo da Época</strong> — jogos, golos, assistências, minutos, MVP, cartões, forma recente, posições jogadas.<br>

const I18n = (() => {
  let _lang = 'EN';
  function set(lang) { if (TR[lang]) _lang = lang; }
  function get() { return _lang; }
  function t(key, vars) {
    let s = (TR[_lang] && TR[_lang][key]) || (TR['EN'] && TR['EN'][key]) || key;
    if (vars) Object.entries(vars).forEach(([k,v]) => { s = s.replace('{'+k+'}', v); });
    return s;
  }
  return { set, get, t };
})();
const i18n = (key, vars) => I18n.t(key, vars);

// ══════════════════════════════════════════════════════════════════════════════
// DATABASE
// ══════════════════════════════════════════════════════════════════════════════
const DB = (() => {
  let _db = null;

  function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(CONFIG.DB_NAME, CONFIG.SCHEMA_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('appMeta')) {
          db.createObjectStore('appMeta', { keyPath: 'metaKey' });
        }
        if (!db.objectStoreNames.contains('seasons')) {
          const s = db.createObjectStore('seasons', { keyPath: 'seasonId', autoIncrement: true });
          s.createIndex('seasonName', 'seasonName', { unique: false });
        }
        if (!db.objectStoreNames.contains('players')) {
          const s = db.createObjectStore('players', { keyPath: 'playerId', autoIncrement: true });
          s.createIndex('seasonId', 'seasonId', { unique: false });
        }
        if (!db.objectStoreNames.contains('games')) {
          const s = db.createObjectStore('games', { keyPath: 'gameId', autoIncrement: true });
          s.createIndex('seasonId', 'seasonId', { unique: false });
          s.createIndex('date', 'date', { unique: false });
        }
        if (!db.objectStoreNames.contains('gamePlayers')) {
          const s = db.createObjectStore('gamePlayers', { keyPath: 'gamePlayerId', autoIncrement: true });
          s.createIndex('gameId', 'gameId', { unique: false });
          s.createIndex('playerId', 'playerId', { unique: false });
          s.createIndex('seasonId', 'seasonId', { unique: false });
        }
        if (!db.objectStoreNames.contains('backups')) {
          db.createObjectStore('backups', { keyPath: 'backupId', autoIncrement: true });
        }
        if (!db.objectStoreNames.contains('achievements')) {
          const s = db.createObjectStore('achievements', { keyPath: 'achievementId', autoIncrement: true });
          s.createIndex('seasonId', 'seasonId', { unique: false });
        }
        if (!db.objectStoreNames.contains('clubHistory')) {
          db.createObjectStore('clubHistory', { keyPath: 'clubHistoryId', autoIncrement: true });
        }
        if (!db.objectStoreNames.contains('playerGameStats')) {
          const pgs = db.createObjectStore('playerGameStats', { keyPath: 'pgsId', autoIncrement: true });
          pgs.createIndex('playerId', 'playerId', { unique: false });
          pgs.createIndex('gameId', 'gameId', { unique: false });
          pgs.createIndex('seasonId', 'seasonId', { unique: false });
        }
        if (!db.objectStoreNames.contains('events')) {
          const ev = db.createObjectStore('events', { keyPath: 'eventId', autoIncrement: true });
          ev.createIndex('playerId', 'playerId', { unique: false });
        }
        if (!db.objectStoreNames.contains('goalEvents')) {
          const ge = db.createObjectStore('goalEvents', { keyPath: 'goalEventId', autoIncrement: true });
          ge.createIndex('gameId', 'gameId', { unique: false });
          ge.createIndex('scorerId', 'scorerId', { unique: false });
        }
        if (!db.objectStoreNames.contains('injuries')) {
          const inj = db.createObjectStore('injuries', { keyPath: 'injuryId', autoIncrement: true });
          inj.createIndex('playerId', 'playerId', { unique: false });
          inj.createIndex('seasonId', 'seasonId', { unique: false });
        } else {
          // Upgrading from an older schema where injuries existed but had
          // no seasonId index yet.
          const tx = e.currentTarget.transaction;
          const injStore = tx.objectStore('injuries');
          if (!injStore.indexNames.contains('seasonId')) {
            injStore.createIndex('seasonId', 'seasonId', { unique: false });
          }
        }
        if (!db.objectStoreNames.contains('opponents')) {
          const opp = db.createObjectStore('opponents', { keyPath: 'opponentId', autoIncrement: true });
          opp.createIndex('opponentName', 'opponentName', { unique: false });
        }
        if (!db.objectStoreNames.contains('trainingSessions')) {
          const ts = db.createObjectStore('trainingSessions', { keyPath: 'trainingSessionId', autoIncrement: true });
          ts.createIndex('playerId', 'playerId', { unique: false });
          ts.createIndex('seasonId', 'seasonId', { unique: false });
          ts.createIndex('status', 'status', { unique: false });
        }
        if (!db.objectStoreNames.contains('customDrills')) {
          // Pass 1 — guardian/player-created drills. Kept separate from the
          // static official DRILL_LIBRARY constant since these need normal
          // CRUD (create/edit/delete), while the 26 official drills remain
          // a fixed, code-defined list. getDrillById() reads from both
          // sources so the rest of the app never needs to know which one a
          // given drill came from.
          const cd = db.createObjectStore('customDrills', { keyPath: 'drillId', autoIncrement: true });
          cd.createIndex('ownerType', 'ownerType', { unique: false });
          cd.createIndex('ownerId', 'ownerId', { unique: false });
        }
        if (!db.objectStoreNames.contains('drillFavourites')) {
          // Pass 2 — favourites are per (userType, userId), never shared —
          // a guardian favouriting a drill has no effect on the player's
          // own favourite list and vice versa.
          const fv = db.createObjectStore('drillFavourites', { keyPath: 'favouriteId', autoIncrement: true });
          fv.createIndex('userType', 'userType', { unique: false });
          fv.createIndex('userId', 'userId', { unique: false });
          fv.createIndex('drillKey', 'drillKey', { unique: false });
        }
        if (!db.objectStoreNames.contains('trainingPacks')) {
          // Pass 4 — a pack stores lightweight drillRefs (kind + key), NOT
          // full drill copies. This is what a pack itself owns and what
          // gets edited when someone edits their own pack later. When a
          // pack is added to a SESSION, each ref is resolved and the full
          // drill data is snapshotted directly into that session's own
          // drills array — the pack and the session are never linked after
          // that point, by design (see addPackToSession).
          const tp = db.createObjectStore('trainingPacks', { keyPath: 'packId', autoIncrement: true });
          tp.createIndex('ownerType', 'ownerType', { unique: false });
          tp.createIndex('ownerId', 'ownerId', { unique: false });
          tp.createIndex('status', 'status', { unique: false });
        }
      };
      req.onsuccess = e => { _db = e.target.result; resolve(_db); };
      req.onerror = e => reject(e.target.error);
    });
  }

  function tx(stores, mode = 'readonly') {
    return _db.transaction(stores, mode);
  }

  function getAll(store, indexName, key) {
    return new Promise((resolve) => {
      // Defensive: if the store doesn't exist yet (schema upgrade pending/failed
      // on this device), return an empty array instead of throwing synchronously
      // and silently killing the calling async function.
      if (!_db.objectStoreNames.contains(store)) {
        console.warn('[DB.getAll] store does not exist yet:', store);
        resolve([]);
        return;
      }
      try {
        const t = tx(store);
        const s = t.objectStore(store);
        const req = indexName ? s.index(indexName).getAll(key) : s.getAll();
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => { console.error('[DB.getAll] error', store, e.target.error); resolve([]); };
      } catch(err) {
        console.error('[DB.getAll] threw synchronously for store', store, err);
        resolve([]);
      }
    });
  }

  function get(store, key) {
    return new Promise((resolve, reject) => {
      const t = tx(store);
      const req = t.objectStore(store).get(key);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = e => reject(e.target.error);
    });
  }

  function put(store, obj) {
    return new Promise((resolve, reject) => {
      if (!_db.objectStoreNames.contains(store)) {
        console.error('[DB.put] store does not exist:', store, '— reload the app to apply a pending database upgrade.');
        reject(new Error(`Store "${store}" does not exist. Please reload the app.`));
        return;
      }
      try {
        const t = tx(store, 'readwrite');
        const req = t.objectStore(store).put(obj);
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      } catch(err) { reject(err); }
    });
  }

  function del(store, key) {
    return new Promise((resolve, reject) => {
      if (!_db.objectStoreNames.contains(store)) {
        console.warn('[DB.del] store does not exist:', store);
        resolve();
        return;
      }
      try {
        const t = tx(store, 'readwrite');
        const req = t.objectStore(store).delete(key);
        req.onsuccess = () => resolve();
        req.onerror = e => reject(e.target.error);
      } catch(err) { reject(err); }
    });
  }

  function clear(store) {
    return new Promise((resolve, reject) => {
      const t = tx(store, 'readwrite');
      const req = t.objectStore(store).clear();
      req.onsuccess = () => resolve();
      req.onerror = e => reject(e.target.error);
    });
  }

  async function getAllFromAllStores() {
    const stores = ['appMeta','seasons','players','games','gamePlayers','achievements','clubHistory','playerGameStats','events','goalEvents','injuries'];
    const result = {};
    for (const s of stores) { result[s] = await getAll(s); }
    return result;
  }

  async function restoreAllStores(data) {
    const stores = ['appMeta','seasons','players','games','gamePlayers','achievements','clubHistory','playerGameStats','events','goalEvents','injuries'];
    for (const s of stores) {
      await clear(s);
      if (data[s]) {
        for (const item of data[s]) { await put(s, item); }
      }
    }
  }

  function hasStore(store) {
    return _db && _db.objectStoreNames.contains(store);
  }

  return { open, get, getAll, put, del, clear, getAllFromAllStores, restoreAllStores, hasStore };
})();

// BACKUP
// ══════════════════════════════════════════════════════════════════════════════
const Backup = (() => {

  async function create(trigger = 'manual') {
    try {
      const data = await DB.getAllFromAllStores();
      const snapshot = JSON.stringify({ schemaVersion: CONFIG.SCHEMA_VERSION, exportedAt: new Date().toISOString(), data });
      await DB.put('backups', { createdAt: new Date().toISOString(), trigger, sizeBytes: snapshot.length, snapshot });
      await pruneOld();
    } catch(e) { console.warn('Backup failed:', e); }
  }

  async function pruneOld() {
    const all = await DB.getAll('backups');
    if (all.length > CONFIG.MAX_BACKUPS) {
      all.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
      const toDelete = all.slice(0, all.length - CONFIG.MAX_BACKUPS);
      for (const b of toDelete) { await DB.del('backups', b.backupId); }
    }
  }

  async function exportJSON() {
    const data = await DB.getAllFromAllStores();
    const payload = { schemaVersion: CONFIG.SCHEMA_VERSION, exportedAt: new Date().toISOString(), data };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const ts = now.toISOString().replace(/[-:]/g,'').replace('T','-').slice(0,13);
    a.href = url; a.download = `football-tracker-backup-${ts}.json`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  }

  function validate(parsed) {
    if (!parsed.schemaVersion) return false;
    if (!parsed.data) return false;
    const required = ['seasons','players','games','gamePlayers'];
    return required.every(s => Array.isArray(parsed.data[s]));
  }

  async function restoreFromJSON(jsonStr) {
    let parsed;
    try { parsed = JSON.parse(jsonStr); } catch(e) { throw new Error(I18n.t('bk_err_invalid_json')); }
    if (!validate(parsed)) throw new Error('File is missing required data. Cannot restore.');
    await create('before-restore');
    await DB.restoreAllStores(parsed.data);
  }

  async function getList() {
    const all = await DB.getAll('backups');
    return all.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  }

  async function restoreFromBackupId(backupId) {
    const b = await DB.get('backups', backupId);
    if (!b || !b.snapshot) throw new Error('Backup not found.');
    let parsed;
    try { parsed = JSON.parse(b.snapshot); } catch(e) { throw new Error('Backup data is corrupted.'); }
    if (!validate(parsed)) throw new Error('Backup is missing required data.');
    await create('before-restore');
    await DB.restoreAllStores(parsed.data);
  }

  async function deleteBackup(backupId) {
    await DB.del('backups', backupId);
  }

  return { create, exportJSON, restoreFromJSON, restoreFromBackupId, deleteBackup, getList };
})();

// CALCULATIONS
// ══════════════════════════════════════════════════════════════════════════════
const Calc = (() => {

  function teamGoals(gpRecords) {
    return gpRecords.filter(r => r.calledUp).reduce((s,r) => s + (parseInt(r.goals)||0), 0);
  }

  function result(ourGoals, theirGoals) {
    const o = parseInt(ourGoals)||0, t = parseInt(theirGoals)||0;
    return o > t ? 'W' : o < t ? 'L' : 'D';
  }

  // Returns the score in correct football convention: Home — Away.
  // 'our'/'their' are always from the tracked team's perspective; this
  // flips them into home/away order based on game.homeAway so an Away
  // game like Sporting vs SLO displays as Sporting 1 — SLO 0, not 0-1.
  function homeAwayScore(homeAway, ourGoals, theirGoals) {
    const o = parseInt(ourGoals)||0, t = parseInt(theirGoals)||0;
    if (homeAway === 'Away') return { home: t, away: o };
    return { home: o, away: t }; // Home or Neutral: we're treated as home side for display
  }

  function goalContributions(goals, assists) {
    return (parseInt(goals)||0) + (parseInt(assists)||0);
  }

  // Default arrival time = 1 hour before kick-off. Always optional —
  // caller decides whether to use this or leave blank.
  function arrivalTime(gameTime, homeAway) {
    if (!gameTime) return '';
    const [h, m] = gameTime.split(':').map(Number);
    let totalMins = (h * 60 + m) - 60; // 1 hour before, regardless of home/away
    if (totalMins < 0) totalMins += 24 * 60;
    const ah = Math.floor(totalMins / 60);
    const am = totalMins % 60;
    return `${String(ah).padStart(2,'0')}:${String(am).padStart(2,'0')}`;
  }

  function availabilityPct(calledUp, totalGames) {
    if (!totalGames) return 0;
    return Math.round((calledUp / totalGames) * 100);
  }

  function startsPct(starts, calledUp) {
    if (!calledUp) return 0;
    return Math.round((starts / calledUp) * 100);
  }

  function estimatedMins(fullGames, partialGames) {
    return (fullGames * CONFIG.FULL_GAME_MINS) + (partialGames * CONFIG.PARTIAL_GAME_MINS);
  }

  function lorenzoStats(games, allGP) {
    const s = {
      calledUp:0, started:0, subbed:0, fullGames:0, partialGames:0,
      goals:0, assists:0, yellow:0, red:0, mom:0, captain:0, totalGames: games.length
    };
    const posMap = {};

    games.forEach(g => {
      const gp = allGP.find(r => r.gameId === g.gameId);
      if (!gp || !gp.calledUp) return;
      s.calledUp++;
      if (gp.role === 'Starter') s.started++;
      if (gp.role === 'Sub') s.subbed++;
      if (gp.playedFullGame) s.fullGames++; else s.partialGames++;
      s.goals += parseInt(gp.goals)||0;
      s.assists += parseInt(gp.assists)||0;
      s.yellow += parseInt(gp.yellowCards)||0;
      s.red += parseInt(gp.redCards)||0;
      if (gp.playerOfTheMatch) s.mom++;
      if (gp.captain) s.captain++;
      if (gp.positionPlayed) posMap[gp.positionPlayed] = (posMap[gp.positionPlayed]||0)+1;
    });

    s.contributions = goalContributions(s.goals, s.assists);
    s.minutes = estimatedMins(s.fullGames, s.partialGames);
    s.availabilityPct = availabilityPct(s.calledUp, s.totalGames);
    s.startsPct = startsPct(s.started, s.calledUp);
    s.positionBreakdown = posMap;
    return s;
  }

  function teamSeasonStats(games, allGP) {
    const s = {
      played:0, wins:0, draws:0, losses:0,
      goalsFor:0, goalsAgainst:0,
      homeW:0,homeD:0,homeL:0,
      awayW:0,awayD:0,awayL:0,
      cleanSheets:0, failedToScore:0,
      biggestWin:null, biggestLoss:null,
      streak:0, unbeaten:0, currentStreak:0, currentUnbeaten:0
    };

    const sorted = [...games].sort((a,b)=>new Date(a.date)-new Date(b.date));
    let streak=0, unbeaten=0, bestStreak=0, bestUnbeaten=0;

    sorted.forEach(g => {
      const gps = allGP.filter(r => r.gameId === g.gameId);
      const our = teamGoals(gps);
      const their = parseInt(g.opponentScore)||0;
      const res = result(our, their);
      const gd = our - their;

      s.played++;
      s.goalsFor += our;
      s.goalsAgainst += their;

      if (res==='W') { s.wins++; streak++; unbeaten++; if(streak>bestStreak) bestStreak=streak; if(unbeaten>bestUnbeaten) bestUnbeaten=unbeaten; }
      else if (res==='D') { s.draws++; streak=0; unbeaten++; if(unbeaten>bestUnbeaten) bestUnbeaten=unbeaten; }
      else { s.losses++; streak=0; unbeaten=0; }

      if (g.homeAway==='Home') { if(res==='W')s.homeW++;else if(res==='D')s.homeD++;else s.homeL++; }
      else if (g.homeAway==='Away') { if(res==='W')s.awayW++;else if(res==='D')s.awayD++;else s.awayL++; }

      if (their===0) s.cleanSheets++;
      if (our===0) s.failedToScore++;

      const haScore = homeAwayScore(g.homeAway, our, their);
      const haScoreStr = `${haScore.home}-${haScore.away}`;
      if (res==='W' && (!s.biggestWin || gd > s.biggestWin.gd)) s.biggestWin = { score:haScoreStr, opp:g.opponent, gd };
      if (res==='L' && (!s.biggestLoss || gd < s.biggestLoss.gd)) s.biggestLoss = { score:haScoreStr, opp:g.opponent, gd };
    });

    s.goalDiff = s.goalsFor - s.goalsAgainst;
    s.bestStreak = bestStreak;
    s.bestUnbeaten = bestUnbeaten;
    return s;
  }

  function playerSeasonStats(playerId, games, allGP) {
    let calledUp=0,started=0,subbed=0,goals=0,assists=0,yellow=0,red=0,mom=0,fullGames=0,partial=0;
    games.forEach(g => {
      const gp = allGP.find(r => r.gameId===g.gameId && r.playerId===playerId);
      if (!gp||!gp.calledUp) return;
      calledUp++;
      if(gp.role==='Starter')started++;
      if(gp.role==='Sub')subbed++;
      if(gp.playedFullGame)fullGames++;else partial++;
      goals+=parseInt(gp.goals)||0;
      assists+=parseInt(gp.assists)||0;
      yellow+=parseInt(gp.yellowCards)||0;
      red+=parseInt(gp.redCards)||0;
      if(gp.playerOfTheMatch)mom++;
    });
    return {calledUp,started,subbed,goals,assists,yellow,red,mom,fullGames,partial,minutes:estimatedMins(fullGames,partial)};
  }

  return { teamGoals, result, homeAwayScore, goalContributions, arrivalTime, lorenzoStats, teamSeasonStats, playerSeasonStats, estimatedMins };
})();

// data-i18n-placeholder="key" for an input/textarea placeholder. Call this

// elements added with these attributes.
function applyStaticTranslations() {

}

// ROADMAP MODULE
// ══════════════════════════════════════════════════════════════════════════════
const Roadmap = (() => {
  const SUPABASE_TABLE = 'roadmap_items';

  // ── Supabase direct calls (not family-scoped) ──────────────────────────────
  async function apiCall(method, filter, body) {
    const cfg = Sync.getStatus();
    // Read config directly from DB
    const urlM  = await DB.get('appMeta','supabaseUrl');
    const keyM  = await DB.get('appMeta','supabaseAnonKey');
    if (!urlM?.value || !keyM?.value) throw new Error('Supabase not configured.');
    const base = urlM.value.replace(/\/rest\/v1\/?$/, '').replace(/\/$/, '') + '/rest/v1/' + SUPABASE_TABLE;
    const url  = filter ? base + '?' + filter : base;
    const res  = await fetch(url, {
      method,
      headers: {
        'apikey':        keyM.value,
        'Authorization': 'Bearer ' + keyM.value,
        'Content-Type':  'application/json',
        'Prefer':        method === 'GET' ? 'return=representation' : 'return=representation',
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error('Supabase error ' + res.status + ': ' + err.slice(0,300));
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  async function getAll() {
    return await apiCall('GET', 'order=phase.asc,priority.asc,created_at.asc');
  }

  async function save(item) {
    if (item.id) {
      // Update
      const { id, ...body } = item;
      body.updated_at = new Date().toISOString();
      return await apiCall('PATCH', 'id=eq.' + id, body);
    } else {
      // Insert
      item.created_at = new Date().toISOString();
      item.updated_at = item.created_at;
      return await apiCall('POST', null, item);
    }
  }

  async function remove(id) {
    const urlM = await DB.get('appMeta','supabaseUrl');
    const keyM = await DB.get('appMeta','supabaseAnonKey');
    const base = urlM.value.replace(/\/rest\/v1\/?$/, '').replace(/\/$/, '') + '/rest/v1/' + SUPABASE_TABLE;
    const res  = await fetch(base + '?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': keyM.value, 'Authorization': 'Bearer ' + keyM.value, 'Prefer': 'return=minimal' },
    });
    if (!res.ok) { const err = await res.text(); throw new Error('Delete error: ' + err.slice(0,200)); }
  }

  return { getAll, save, remove };
})();

// ── Render roadmap table ───────────────────────────────────────────────────────
async function renderRoadmapTable() {
  const el = document.getElementById('admin-panel-roadmap');

  // Read current filter values BEFORE showing the loading spinner —
  // the spinner replaces el.innerHTML, which destroys the filter <select>
  // elements, so reading them afterward always returns empty/undefined.
  const typeFilter   = document.getElementById('rm-filter-type')?.value   || '';
  const statusFilter = document.getElementById('rm-filter-status')?.value || '';
  const phaseFilter  = document.getElementById('rm-filter-phase')?.value  || '';
  const search       = document.getElementById('rm-search')?.value?.toLowerCase() || '';
  const searchRaw    = document.getElementById('rm-search')?.value || '';

  el.innerHTML = `<div class="empty"><div class="spinner"></div><p>${I18n.t('rm_loading')}</p></div>`;
  let items;
  try { items = await Roadmap.getAll(); }
  catch(e) { el.innerHTML = `<div class="empty"><strong>${I18n.t('rm_could_not_load')}</strong><p>${e.message}</p></div>`; return; }

  const phases = [...new Set(items.map(i=>i.phase))].sort((a,b)=>a-b);

  let filtered = items.filter(i => {
    if (typeFilter   && i.type !== typeFilter)     return false;
    if (statusFilter && i.status !== statusFilter) return false;
    if (phaseFilter  && String(i.phase) !== phaseFilter) return false;
    if (search && !i.title?.toLowerCase().includes(search) && !i.description?.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sorting
  const sortKey = el.dataset.sortKey || 'phase';
  const sortDir = el.dataset.sortDir || 'asc';
  const sortFns = {
    title:    (a,b) => (a.title||'').localeCompare(b.title||''),
    type:     (a,b) => (a.type||'').localeCompare(b.type||''),
    phase:    (a,b) => (a.phase||0) - (b.phase||0),
    version:  (a,b) => (a.version||'').localeCompare(b.version||''),
    priority: (a,b) => (a.priority||'').localeCompare(b.priority||''),
    status:   (a,b) => (a.status||'').localeCompare(b.status||''),
    test:     (a,b) => (a.test_status||'').localeCompare(b.test_status||''),
    target:   (a,b) => new Date(a.target_date||0) - new Date(b.target_date||0),
    visible:  (a,b) => (a.is_visible_to_users?1:0) - (b.is_visible_to_users?1:0),
  };
  filtered.sort((a,b) => {
    const fn = sortFns[sortKey] || sortFns.phase;
    return sortDir === 'asc' ? fn(a,b) : fn(b,a);
  });

  function thSort(key, label, extra='') {
    const active = sortKey === key;
    const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<th style="${extra}cursor:pointer;user-select:none" onclick="roadmapTableSort('${key}')">${label}${arrow}</th>`;
  }

  const typeLabel = {'Bug':I18n.t('rm_type_bug'),'Feature':I18n.t('rm_type_feature'),'Improvement':I18n.t('rm_type_improvement'),'Technical Debt':I18n.t('rm_type_techdebt'),'Security':I18n.t('rm_type_security'),'Release':I18n.t('rm_type_release')};
  const statusLabel = {'Backlog':I18n.t('rm_status_backlog'),'In Progress':I18n.t('rm_status_inprogress'),'Testing':I18n.t('rm_status_testing'),'Deployed':I18n.t('rm_status_deployed'),'Cancelled':I18n.t('rm_status_cancelled')};

  el.innerHTML = `
    <!-- Filters -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <input id="rm-search" type="text" placeholder="${I18n.t('rm_search_placeholder')}" value="${esc(searchRaw)}"
        style="flex:1;min-width:140px;border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:13px"
        oninput="renderRoadmapTable()">
      <select id="rm-filter-type" onchange="renderRoadmapTable()" style="border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:12px">
        <option value="">${I18n.t('rm_all_types')}</option>
        ${['Bug','Feature','Improvement','Technical Debt','Security','Release'].map(t=>`<option value="${t}"${typeFilter===t?' selected':''}>${typeLabel[t]}</option>`).join('')}
      </select>
      <select id="rm-filter-status" onchange="renderRoadmapTable()" style="border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:12px">
        <option value="">${I18n.t('rm_all_statuses')}</option>
        ${['Backlog','In Progress','Testing','Deployed','Cancelled'].map(s=>`<option value="${s}"${statusFilter===s?' selected':''}>${statusLabel[s]}</option>`).join('')}
      </select>
      <select id="rm-filter-phase" onchange="renderRoadmapTable()" style="border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:12px">
        <option value="">${I18n.t('rm_all_phases')}</option>
        ${phases.map(p=>`<option value="${p}"${phaseFilter===String(p)?' selected':''}>${I18n.t('rm_phase_prefix')} ${p}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:#999">${filtered.length} / ${items.length} ${I18n.t('rm_items_suffix')}</span>
    </div>

    <!-- Table -->
    <div class="game-detail-table-wrap">

function roadmapTableSort(key) {
  const el = document.getElementById('admin-panel-roadmap');
  if (!el) return;
  const current = el.dataset.sortKey;
  const dir     = el.dataset.sortDir;

}

function statusBadge(s) {
  const map = {
    'Backlog':     'background:#f0f0f0;color:#666',
    'In Progress': 'background:#e8f0fe;color:#1a56c4',
    'Testing':     'background:#fff3cd;color:#856404',
    'Deployed':    'background:#e6f4ea;color:#2a7a3b',
    'Cancelled':   'background:#fde8e8;color:#b03030',
  };
  const labelKeys = {
    'Backlog':'rm_status_backlog','In Progress':'rm_status_inprogress','Testing':'rm_status_testing',
    'Deployed':'rm_status_deployed','Cancelled':'rm_status_cancelled',
  };
  const label = labelKeys[s] ? I18n.t(labelKeys[s]) : (s||'—');
  return `<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;${map[s]||''}">${label}</span>`;
}

let _rmItems = [];

async function openRoadmapForm(id) {
  document.getElementById('rm-id').value = id || '';
  document.getElementById('rmFormTitle').textContent = id ? I18n.t('rm_form_edit_title') : I18n.t('rm_form_add_title');

  // Reset form
  ['rm-title','rm-desc','rm-version','rm-problem','rm-benefit','rm-release','rm-notes'].forEach(fid => {
    const el = document.getElementById(fid); if(el) el.value='';
  });
  document.getElementById('rm-type').value     = 'Feature';
  document.getElementById('rm-priority').value = 'P3';
  document.getElementById('rm-status').value   = 'Backlog';
  document.getElementById('rm-phase').value    = '1';
  document.getElementById('rm-testStatus').value = '';
  document.getElementById('rm-visible').value  = 'false';
  document.getElementById('rm-target').value   = '';

  if (id) {
    // Load existing item
    try {
      const items = await Roadmap.getAll();
      const item = items.find(i => i.id === id);
      if (item) {
        document.getElementById('rm-title').value    = item.title || '';
        document.getElementById('rm-desc').value     = item.description || '';
        document.getElementById('rm-type').value     = item.type || 'Feature';
        document.getElementById('rm-priority').value = item.priority || 'P3';
        document.getElementById('rm-status').value   = item.status || 'Backlog';
        document.getElementById('rm-phase').value    = String(item.phase || 1);
        document.getElementById('rm-version').value  = item.version || '';
        document.getElementById('rm-target').value   = item.target_date || '';
        document.getElementById('rm-testStatus').value = item.test_status || '';
        document.getElementById('rm-visible').value  = String(item.is_visible_to_users || false);
        document.getElementById('rm-problem').value  = item.user_problem || '';
        document.getElementById('rm-benefit').value  = item.expected_benefit || '';
        document.getElementById('rm-release').value  = item.release_note || '';
        document.getElementById('rm-notes').value    = item.internal_notes || '';
      }
    } catch(e) { Toast.error(I18n.t('rm_err_could_not_load_item', {msg: e.message})); return; }
  }

  document.getElementById('roadmapFormOverlay').classList.add('open');
}

function closeRoadmapForm() {
  document.getElementById('roadmapFormOverlay').classList.remove('open');
}

async function saveRoadmapItem() {
  const title = document.getElementById('rm-title').value.trim();
  if (!title) { Toast.error(I18n.t('rm_err_title_required')); return; }

  const id = document.getElementById('rm-id').value;
  const item = {
    title,
    description:        document.getElementById('rm-desc').value.trim() || null,
    type:               document.getElementById('rm-type').value,
    priority:           document.getElementById('rm-priority').value,
    status:             document.getElementById('rm-status').value,
    phase:              parseInt(document.getElementById('rm-phase').value) || 0,
    version:            document.getElementById('rm-version').value.trim() || null,
    target_date:        document.getElementById('rm-target').value || null,
    test_status:        document.getElementById('rm-testStatus').value || null,
    is_visible_to_users: document.getElementById('rm-visible').value === 'true',
    user_problem:       document.getElementById('rm-problem').value.trim() || null,
    expected_benefit:   document.getElementById('rm-benefit').value.trim() || null,
    release_note:       document.getElementById('rm-release').value.trim() || null,
    internal_notes:     document.getElementById('rm-notes').value.trim() || null,
  };
  if (id) item.id = id;

  try {
    await Roadmap.save(item);
    closeRoadmapForm();
    Toast.show(id ? I18n.t('rm_item_updated') : I18n.t('rm_item_added'));
    // Refresh current admin tab
    const kanbanVisible = document.getElementById('admin-panel-kanban').style.display !== 'none';
    if (kanbanVisible) renderKanban(); else renderRoadmapTable();
  } catch(e) { Toast.error(I18n.t('rm_err_save_failed', {msg: e.message})); }
}

async function deleteRoadmapItem(id) {
  Confirm.show(I18n.t('rm_confirm_delete_title'), I18n.t('rm_confirm_delete_body'), async () => {
    try {
      await Roadmap.remove(id);
      Toast.show(I18n.t('ch_deleted'));
      renderRoadmapTable();
    } catch(e) { Toast.error(I18n.t('rm_err_delete_failed', {msg: e.message})); }
  });
}

function updateDashSyncStatus() {
  const dot   = document.getElementById('dashSyncDot');
  const label = document.getElementById('dashSyncLabel');
  const time  = document.getElementById('dashSyncTime');
  if (!dot || !label) return;

  const s = Sync.getStatus();
  const colors  = { connected:'#2a7a3b', disconnected:'#ccc', error:'#b03030', syncing:'#1a56c4' };
  const labels  = { connected:'Synced', disconnected:'Not configured', error:'Sync error', syncing:'Syncing...' };

  dot.style.background = colors[s.status] || '#ccc';
  label.textContent    = labels[s.status]  || '—';

  if (s.lastSync) {
    const d = new Date(s.lastSync);
    time.textContent = 'Last sync: ' + d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  } else {
    time.textContent = s.configured ? 'Never synced' : '';
  }
}

function switchTrackedTab(playerId, tab) {
  State.currentTrackedPlayer = playerId;
  State.currentTrackedTab = tab;
  try { sessionStorage.setItem('squadTracker_trackedTab', tab); } catch(e) {}
  const tabMap = {
    overview: `tracked-content-${playerId}`,
    stats:    `tracked-stats-${playerId}`,
    log:      `tracked-log-${playerId}`,
    training: `tracked-training-${playerId}`,
    clubs:    `tracked-clubs-${playerId}`,
    ach:      `tracked-ach-${playerId}`,
    events:   `tracked-events-${playerId}`,
  };
  const btnMap = {
    overview: `tab-overview-${playerId}`,
    stats:    `tab-stats-${playerId}`,
    log:      `tab-log-${playerId}`,
    training: `tab-training-${playerId}`,
    clubs:    `tab-clubs-${playerId}`,
    ach:      `tab-ach-${playerId}`,
    events:   `tab-events-${playerId}`,
  };
  Object.keys(tabMap).forEach(t => {
    const el  = document.getElementById(tabMap[t]);
    const btn = document.getElementById(btnMap[t]);
    if (el)  el.style.display  = t === tab ? '' : 'none';
    if (btn) btn.classList.toggle('active-tab', t === tab);
  });
  if (tab === 'stats')    renderExtendedStats(playerId);
  if (tab === 'log')      renderMatchLog(playerId);
  if (tab === 'training') renderPlayerTraining(playerId, 'guardian');
  if (tab === 'clubs')    renderPlayerClubHistory(playerId);
  if (tab === 'ach')      renderPlayerAchievements(playerId);
  if (tab === 'events')   renderPlayerEvents(playerId);
}

// Pass 1 — ownership tiers. Every drill in DRILL_LIBRARY is an official,
// built-in drill — stamped programmatically rather than edited into all 26
// entries by hand, so there's no risk of missing one or mistyping a value.
// This is purely additive: nothing about how these drills already render or
// behave changes, they simply now carry an explicit ownership tag matching
// what was already implicitly true.
DRILL_LIBRARY.forEach(d => { d.ownerType = 'official'; d.ownerId = null; });

function getLibraryDrill(key) {
  return DRILL_LIBRARY.find(d => d.key === key) || null;
}

function libDrillDisplayName(key) {
  return I18n.t('drilllib_' + key);
}

// ── PASS 1 — OWNERSHIP TIERS & UNIFIED DRILL LOOKUP ──────────────────────────
// Drills now come from two sources: the 26 fixed official drills in
// DRILL_LIBRARY (unchanged, in-memory, synchronous), and guardian/player
// created drills in the new customDrills IndexedDB store (async CRUD).
//
// getDrillById() unifies both behind one lookup so the rest of the app can
// treat "a drill" as one concept regardless of where it came from. It's
// intentionally synchronous, taking an already-loaded customDrills array as
// its second argument, rather than making every one of the 8 existing call
// sites (several inside .map() template callbacks) async right now. This
// keeps every current call site working exactly as before with zero
// changes; Pass 2's drill library UI will load customDrills once per
// render and pass it through here, at which point custom drills become
// visible everywhere this function is used.
function getDrillById(key, customDrillsList) {
  const official = getLibraryDrill(key);
  if (official) return official;
  if (customDrillsList) return customDrillsList.find(d => String(d.drillId) === String(key)) || null;
  return null;
}

async function getAllCustomDrills() {
  return DB.getAll('customDrills');
}

// For browsing contexts (the picker, "my drills" lists) — archived drills
// are intentionally excluded here but NOT from getAllCustomDrills(), since
// getDrillById() needs to keep resolving archived drills correctly when
// viewing a past session's history that already used one.
async function getActiveCustomDrills() {
  const all = await getAllCustomDrills();
  return all.filter(d => d.status !== 'archived');
}

async function saveCustomDrill(drill) {
  // ownerType/ownerId must already be set by the caller — this function
  // does not infer ownership, to keep that decision explicit at the point
  // of creation rather than guessed here.
  if (!drill.ownerType || drill.ownerType === 'official') {
    throw new Error('Custom drills must have ownerType "guardian" or "player", never "official".');
  }
  // Phase 1 hardening: on an UPDATE (drillId already set), independently
  // re-verify the incoming ownerType/ownerId actually matches the EXISTING
  // stored record's real owner, rather than trusting whatever the caller
  // passed in. Not currently exploitable (the only caller, the Drill
  // Builder, already blocks entry earlier), but this makes the function
  // self-defending rather than relying solely on that earlier check.
  if (drill.drillId) {
    const existing = await DB.get('customDrills', drill.drillId);
    if (existing && !canEditDrill(existing, drill.ownerType, drill.ownerId)) {
      throw new Error('You do not have permission to modify this drill.');
    }
  }
  if (!drill.status) drill.status = 'active';
  return DB.put('customDrills', drill);
}

// Pass 4 — archiving, not hard deletion. A custom drill that's already
// been used in a past session must stay resolvable when viewing that
// session's history, so it's hidden from active browsing (status:
// 'archived') rather than removed from the database. Restorable by simply
// flipping the status back.
async function archiveCustomDrill(drillId, requestingAs, requestingOwnerId) {
  const drill = await DB.get('customDrills', drillId);
  if (!drill) return;
  if (!canEditDrill(drill, requestingAs, requestingOwnerId)) {
    throw new Error('You do not have permission to archive this drill.');
  }
  drill.status = 'archived';
  await DB.put('customDrills', drill);
}

async function restoreCustomDrill(drillId, requestingAs, requestingOwnerId) {
  const drill = await DB.get('customDrills', drillId);
  if (!drill) return;
  if (!canEditDrill(drill, requestingAs, requestingOwnerId)) {
    throw new Error('You do not have permission to restore this drill.');
  }
  drill.status = 'active';
  await DB.put('customDrills', drill);
}

// Official drills can never be edited or archived by anyone — guardian or
// player. Guardian-owned and player-owned drills can only be edited/archived
// by whoever created them (matched by ownerType AND ownerId, so a guardian
// can never edit another guardian's — or a player's — custom drill).
function canEditDrill(drill, requestingAs, requestingOwnerId) {
  if (!drill || drill.ownerType === 'official') return false;
  return drill.ownerType === requestingAs && String(drill.ownerId) === String(requestingOwnerId);
}
// canDeleteDrill removed as dead code in the Phase 1 stabilization pass —
// defined in Pass 1, never actually called; every archive path uses
// canEditDrill directly.

function addDrillBuilderKpiField() {
  _drillBuilderKpiFields.push({ key: 'field'+Date.now(), label: '', type: 'number', showInHistory: true, showAverage: true, showPersonalBest: true, goalDirection: 'higher', weight: 0, format: '{v}' });
  renderDrillBuilderKpiRows();
}

function removeDrillBuilderKpiField(index) {
  _drillBuilderKpiFields.splice(index, 1);
  renderDrillBuilderKpiRows();
}

function updateDrillBuilderKpiField(index, prop, value) {
  _drillBuilderKpiFields[index][prop] = value;
  if (prop === 'type') {
    // Non-numeric types can't meaningfully average or personal-best —
    // reset those flags so the saved schema stays internally consistent
    // rather than showing checkboxes that don't apply to the chosen type.
    const numeric = ['number','time','distance','percentage'].includes(value);
    _drillBuilderKpiFields[index].showAverage = numeric;
    _drillBuilderKpiFields[index].showPersonalBest = numeric;
    renderDrillBuilderKpiRows();
  }
}

          </select>

    </div>`;
  }).join('') || `<p style="font-size:12px;color:var(--muted)">${I18n.t('drill_builder_no_kpis')}</p>`;
}

async function saveDrillFromBuilder(viewAs) {
  const name = document.getElementById('db-name')?.value.trim();
  if (!name) { Toast.error(I18n.t('drill_builder_err_name_required')); return; }

  const { userType, userId } = getCurrentDrillUser(viewAs);
  const drill = {
    ownerType: userType,
    ownerId: userId,
    name,
    category: document.getElementById('db-category')?.value.trim() || I18n.t('drill_builder_category_placeholder'),
    difficulty: document.getElementById('db-difficulty')?.value || 'Easy',
    durationMin: parseInt(document.getElementById('db-duration')?.value) || 10,
    equipment: document.getElementById('db-equipment')?.value.trim() || '',
    objective: document.getElementById('db-objective')?.value.trim() || '',

    coachingPoints: document.getElementById('db-coaching')?.value.trim() || '',

}

// Small badge shown wherever a drill is listed, so ownership is always
// visible at a glance — official vs guardian-created vs player-created.
function drillOwnershipBadge(drill) {
  const type = drill?.ownerType || 'official';
  const labelKey = { official: 'drill_owner_official', guardian: 'drill_owner_guardian', player: 'drill_owner_player' }[type];
  const colorMap = { official: 'background:#eef0f3;color:#555', guardian: 'background:#e8f0fb;color:#2a5a9e', player: 'background:#eafaf0;color:#2a7a4e' };
  return `<span class="pos-pill" style="${colorMap[type]}">${I18n.t(labelKey)}</span>`;
}

// ── PASS 2 — DRILL FAVOURITES ─────────────────────────────────────────────────
// Kept in a dedicated store, keyed by (userType, userId, drillKey) — never
// on the player record — so a guardian's favourites and a player's
// favourites are always two completely separate lists, even when they're
// looking at the same drill library.
async function getFavouriteDrillKeys(userType, userId) {
  const all = await DB.getAll('drillFavourites');
  return all.filter(f => f.userType === userType && String(f.userId) === String(userId)).map(f => f.drillKey);
}

async function isDrillFavourited(drillKey, userType, userId) {
  const all = await DB.getAll('drillFavourites');
  return all.some(f => f.userType === userType && String(f.userId) === String(userId) && f.drillKey === drillKey);
}

async function toggleDrillFavourite(drillKey, userType, userId) {
  const all = await DB.getAll('drillFavourites');
  const existing = all.find(f => f.userType === userType && String(f.userId) === String(userId) && f.drillKey === drillKey);
  if (existing) {
    await DB.del('drillFavourites', existing.favouriteId);
    return false; // now unfavourited
  } else {
    await DB.put('drillFavourites', { userType, userId, drillKey });
    return true; // now favourited
  }
}

// Resolves "who is currently looking at the picker" into a stable
// (userType, userId) pair for favourites/ownership — guardian identity
// comes from the authenticated account, player identity from their own
// portalPlayerId, so favourites and future custom-drill ownership are
// always attributed to the right, specific person.
function getCurrentDrillUser(viewAs) {
  if (viewAs === 'player') return { userType: 'player', userId: State.portalPlayerId };
  return { userType: 'guardian', userId: Auth.getUserId() };
}

// ── PASS 4 — TRAINING PACKS ──────────────────────────────────────────────────
// A pack stores lightweight drillRefs, never full drill copies — see the
// trainingPacks store comment for why. Ownership/permission rules mirror
// custom drills exactly: official is always read-only (duplicate only),
// guardian/player packs are editable/archivable only by their creator.
const OFFICIAL_PACK_SEED = [
  { packId: 'off-warmup-strength', name: 'Warm-Up & Strength Basics', description: 'A simple starter pack covering warm-up and core strength — good for any session.', difficulty: 'Easy', skillsTrained: ['Fitness','Strength'], drillRefs: [{kind:'library',key:'warmUp'},{kind:'library',key:'situpsPushups'}] },
  { packId: 'off-passing-focus', name: 'Passing Focus', description: 'Wall passing drills building accuracy and rhythm with both feet.', difficulty: 'Easy', skillsTrained: ['Passing'], drillRefs: [{kind:'library',key:'wallPassing100'},{kind:'library',key:'twoTouchWallPassing'},{kind:'library',key:'oneTouchWallPassing'}] },
  { packId: 'off-shooting-focus', name: 'Shooting Focus', description: 'Target practice and finishing drills to sharpen accuracy in front of goal.', difficulty: 'Medium', skillsTrained: ['Shooting'], drillRefs: [{kind:'library',key:'targetShooting'},{kind:'library',key:'dribbleAndFinish'}] },
];
OFFICIAL_PACK_SEED.forEach(p => { p.ownerType = 'official'; p.ownerId = null; p.status = 'active'; p.estimatedDurationMin = null; });

async function getAllPacks() {
  const custom = await DB.getAll('trainingPacks');
  return [...OFFICIAL_PACK_SEED, ...custom];
}
async function getActivePacks() {
  const all = await getAllPacks();
  return all.filter(p => p.status !== 'archived');
}
async function getPackById(packId) {
  const all = await getAllPacks();
  return all.find(p => String(p.packId) === String(packId)) || null;
}

function canEditPack(pack, requestingAs, requestingOwnerId) {
  if (!pack || pack.ownerType === 'official') return false;
  return pack.ownerType === requestingAs && String(pack.ownerId) === String(requestingOwnerId);
}
function canArchivePack(pack, requestingAs, requestingOwnerId) {
  return canEditPack(pack, requestingAs, requestingOwnerId);
}

async function saveTrainingPack(pack) {
  if (!pack.ownerType || pack.ownerType === 'official') {
    throw new Error('Custom packs must have ownerType "guardian" or "player", never "official".');
  }
  // Phase 1 hardening — same reasoning as saveCustomDrill above: verify
  // the incoming ownership claim against the actual stored record on
  // update, not just trust the caller.
  if (pack.packId) {
    const existing = await DB.get('trainingPacks', pack.packId);
    if (existing && !canEditPack(existing, pack.ownerType, pack.ownerId)) {
      throw new Error('You do not have permission to modify this pack.');
    }
  }
  if (!pack.status) pack.status = 'active';
  return DB.put('trainingPacks', pack);
}

async function archiveTrainingPack(packId, requestingAs, requestingOwnerId) {
  const pack = await DB.get('trainingPacks', packId);
  if (!pack) return;
  if (!canArchivePack(pack, requestingAs, requestingOwnerId)) {
    throw new Error('You do not have permission to archive this pack.');
  }
  pack.status = 'archived';
  await DB.put('trainingPacks', pack);
}

async function duplicateTrainingPack(packId, requestingAs, requestingOwnerId) {
  const pack = await getPackById(packId);
  if (!pack) return;
  const copy = {
    ownerType: requestingAs,
    ownerId: requestingOwnerId,
    name: pack.name + ' ' + I18n.t('drill_duplicate_suffix'),
    description: pack.description,
    difficulty: pack.difficulty,
    skillsTrained: [...(pack.skillsTrained||[])],
    drillRefs: JSON.parse(JSON.stringify(pack.drillRefs||[])),
    estimatedDurationMin: pack.estimatedDurationMin,
    status: 'active',
  };
  return saveTrainingPack(copy);
}

// Favourites reuse the exact same drillFavourites store/functions — a pack
// favourite is just a "drillKey" that happens to be a packId, kept in the
// same table rather than inventing a parallel store for a near-identical

async function isPackFavourited(packId, userType, userId) {
  return isDrillFavourited('pack:'+packId, userType, userId);
}
async function togglePackFavourite(packId, userType, userId) {
  return toggleDrillFavourite('pack:'+packId, userType, userId);
}

// Reuses the existing Drill Library Picker (Pass 2) in a lightweight
// "select for pack" mode — every drill is still reviewed via the Detail

function openDrillLibraryPickerForPack(viewAs) {

}
let _packBuilderPickerActive = false;

async function renderPackBuilderDrillList() {
  const el = document.getElementById('packBuilderDrillList');
  const durEl = document.getElementById('packBuilderDuration');
  if (!el) return;
  const customDrills = await getAllCustomDrills();
  let totalDuration = 0;
  el.innerHTML = _packBuilderDrillRefs.map((ref, i) => {
    let name, duration;
    if (ref.kind === 'library') {
      const drill = getLibraryDrill(ref.key);
      name = drill ? libDrillDisplayName(drill.key) : ref.key;
      duration = drill?.durationMin || 0;
    } else {
      const custom = customDrills.find(d => String(d.drillId) === String(ref.key));
      name = custom ? custom.name : ref.key;
      duration = custom?.durationMin || 0;
    }
    totalDuration += duration;
    return `
      <div class="wp-row"><div class="wp-info" style="cursor:default">
        <button type="button" onclick="moveDrillUp(_packBuilderDrillRefs,${i},renderPackBuilderDrillList)" ${i===0?'disabled':''} style="width:22px;height:18px;border:1px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;font-size:9px;line-height:1;flex-shrink:0;${i===0?'opacity:.35':''}" aria-label="${I18n.t('tr_move_up')}">&#9650;</button>

async function saveTrainingPackFromBuilder(viewAs) {
  const name = document.getElementById('pb-name')?.value.trim();
  if (!name) { Toast.error(I18n.t('pack_builder_err_name_required')); return; }
  if (!_packBuilderDrillRefs.length) { Toast.error(I18n.t('pack_builder_err_no_drills')); return; }

  const { userType, userId } = getCurrentDrillUser(viewAs);
  const skillsRaw = document.getElementById('pb-skills')?.value.trim() || '';
  const skillsTrained = skillsRaw ? skillsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];

  let totalDuration = 0;
  const customDrillsForDuration = await getAllCustomDrills();
  _packBuilderDrillRefs.forEach(ref => {
    if (ref.kind === 'library') {
      const drill = getLibraryDrill(ref.key);
      totalDuration += drill?.durationMin || 0;
    } else {
      const custom = customDrillsForDuration.find(d => String(d.drillId) === String(ref.key));
      totalDuration += custom?.durationMin || 0;
    }
  });

  const pack = {
    ownerType: userType,
    ownerId: userId,
    name,
    description: document.getElementById('pb-description')?.value.trim() || '',
    difficulty: document.getElementById('pb-difficulty')?.value || 'Easy',
    skillsTrained,
    drillRefs: JSON.parse(JSON.stringify(_packBuilderDrillRefs)),
    estimatedDurationMin: totalDuration,
    status: 'active',
  };
  if (_packBuilderEditingId) pack.packId = _packBuilderEditingId;

  try {
    await saveTrainingPack(pack);
    document.getElementById('packBuilderOverlay')?.remove();
    Toast.show(I18n.t('pack_builder_saved'));
    if (document.getElementById('packsListPanel')) renderPacksList(_lastPacksViewAs);
  } catch(err) {
    Toast.error(err.message);
  }
}

// ── PASS 4 — PACK → SESSION SNAPSHOT (the critical requirement) ─────────────
// Adding a pack to a session expands each of its drillRefs into a full,
// independent drill entry — reusing the exact same shape a manually-added
// drill already uses (built via the same logic addDrillFromPicker uses).
// After this runs, the session has its OWN copy; it holds no reference to
// the pack at all. Editing the pack later, or archiving/deleting it, can
// never retroactively change any session that already used it — there is
// simply no link left to follow.
async function handleAddPackToSession(packId, viewAs) {
  const pack = await getPackById(packId);
  if (!pack) return;

  (pack.drillRefs || []).forEach(ref => {
    const newDrillEntry = ref.kind === 'library'
      ? { libraryKey: ref.key, drillType: null }
      : { customDrillId: ref.key, drillType: null };
    _trainingFormDrills.push(newDrillEntry);
  });

  document.getElementById('packDetailOverlay')?.remove();
  Toast.show(I18n.t('pack_added_to_session', {n: (pack.drillRefs||[]).length}));

  // Refresh whichever drill-row view is actually open right now.
  if (_trainingFormPlayerId) {
    renderTrainingDrillRows(_trainingFormPlayerId, 'plan');
    refreshAutoSessionName(_trainingFormPlayerId);
  }
}

// The ONLY function that actually inserts a drill into a session's working
// drill list — called exclusively from the detail popup's "Add to Session"
// button, so no path in the app can add a drill without this review step
// having happened first. rowIndex null = adding a brand new row; a number =
// replacing an existing row's drill (the "tap row to change" flow).
async function addDrillFromPicker(drillKey, playerId, mode, rowIndex) {
  const isOfficial = !!getLibraryDrill(drillKey);

  if (mode === 'packbuilder') {
    // Building a pack — store a lightweight reference (kind + key), not a
    // resolved drill. The pack owns this reference; snapshotting into an
    // actual session only happens later, at addPackToSession time.
    const ref = isOfficial ? { kind: 'library', key: drillKey } : { kind: 'custom', key: drillKey };
    _packBuilderDrillRefs.push(ref);
    document.getElementById('drillDetailOverlay')?.remove();
    document.getElementById('drillLibraryPickerOverlay')?.remove();
    renderPackBuilderDrillList();
    return;
  }

  const newDrillEntry = isOfficial
    ? { libraryKey: drillKey, drillType: null }
    : { customDrillId: drillKey, drillType: null };

  if (rowIndex === null || rowIndex === undefined) {
    _trainingFormDrills.push(newDrillEntry);
  } else {
    _trainingFormDrills[rowIndex] = newDrillEntry;
  }

  document.getElementById('drillDetailOverlay')?.remove();
  document.getElementById('drillLibraryPickerOverlay')?.remove();
  renderTrainingDrillRows(playerId, mode);
  if (mode === 'plan') refreshAutoSessionName(playerId);
}

// Legacy generic drills (DRILL_TYPES) — kept reachable but deliberately
// separate from the main card grid, since they have no real category,
// difficulty, or equipment metadata and forcing placeholder values into
// the cards above would present fabricated data as if it were real.
// Flagged for a real decision in a later pass once/if these are properly
// enriched or retired.
function toggleLegacyDrillFallback(playerId, mode, rowIndex) {
  const el = document.getElementById('drillPickerLegacy');
  if (!el) return;

    </select>`;
}

function addLegacyDrillFromPicker(drillTypeKey, playerId, mode, rowIndex) {
  if (!drillTypeKey) return;
  const newDrillEntry = { drillType: drillTypeKey, libraryKey: null };
  if (rowIndex === null || rowIndex === undefined) {
    _trainingFormDrills.push(newDrillEntry);
  } else {
    _trainingFormDrills[rowIndex] = newDrillEntry;
  }
  document.getElementById('drillLibraryPickerOverlay')?.remove();
  renderTrainingDrillRows(playerId, mode);
  if (mode === 'plan') refreshAutoSessionName(playerId);
}

// ── PHASE 1 FIX — shared drill resolution for display ────────────────────────
// Every session drill entry is one of three shapes: an official library
// drill (libraryKey), a custom drill (customDrillId), or a legacy generic
// drill (drillType). This was previously resolved separately, and
// inconsistently, in three different render functions — none of which
// checked customDrillId at all, so a custom drill added to a session
// rendered blank everywhere. This single helper is now the only place that
// logic lives; callers must pass an already-fetched customDrills array
// (fetch once per render, not per row) since drill resolution itself stays
// synchronous for use inside .map().
function resolveSessionDrill(drill, customDrillsList) {
  if (drill.libraryKey) {
    return { kind: 'library', drill: getLibraryDrill(drill.libraryKey), fields: null };
  }
  if (drill.customDrillId) {
    const custom = (customDrillsList || []).find(d => String(d.drillId) === String(drill.customDrillId));
    return { kind: 'custom', drill: custom || null, fields: custom ? custom.kpiFields : null };
  }
  if (drill.drillType) {
    const def = DRILL_TYPES.find(d => d.key === drill.drillType) || DRILL_TYPES[0];
    return { kind: 'generic', drill: def, fields: def.fields };
  }
  return { kind: 'none', drill: null, fields: null };
}

function drillResolutionLabel(resolved) {
  if (resolved.kind === 'library' && resolved.drill) return libDrillDisplayName(resolved.drill.key);
  if (resolved.kind === 'custom' && resolved.drill) return resolved.drill.name;
  if (resolved.kind === 'generic' && resolved.drill) return drillTypeLabel(resolved.drill.key);
  return I18n.t('drill_picker_no_drill_selected');
}

// ── PASS 5 — COMPLETION STATES ───────────────────────────────────────────────
// Five states replace the old skipped:true/false boolean:
//   not_started | completed | partial | skipped | missed
// completed and partial allow KPI entry; skipped and missed disable it.
// not_started is the default for a drill nobody has touched yet.
//
// Backward compatibility: old records never had completionStatus at all,
// only skipped. This function computes the right status AT READ TIME,
// every time, without ever writing anything back to the record — an old
// session opened today looks correct immediately, with zero migration
// step and zero risk of corrupting historical data.
function getDrillCompletionStatus(drill) {
  if (drill.completionStatus) return drill.completionStatus; // Pass 5+ record, already explicit
  if (drill.skipped === true) return 'skipped';               // legacy: skipped:true → skipped
  const hasValues = Object.keys(drill).some(k =>
    !['libraryKey','drillType','customDrillId','skipped','completionStatus'].includes(k) &&
    drill[k] !== undefined && drill[k] !== null && drill[k] !== '' && drill[k] !== 0
  );
  return hasValues ? 'completed' : 'not_started'; // legacy: skipped:false, has real values → completed; otherwise → not_started
}

function isKpiEntryEnabled(status) {
  return status === 'completed' || status === 'partial' || status === 'not_started';
}

// ── PHASE 2 — completion status as large tap targets, not a dropdown ────────
// Replaces the old <select> with real buttons: at least 44px tall (comfortable
// mobile tap target, fixing the audit's flagged undersized reorder buttons at
// the same touchpoint), icon + short label, clear selected state. One tap,
// not "open dropdown → scroll → tap → close."
const COMPLETION_STATUS_STYLE = {
  completed: { icon: '&#9989;', color: '#2a7a4e', bg: '#e6f4ea' },
  partial:   { icon: '&#128993;', color: '#8a6d1a', bg: '#fbf3d9' },
  skipped:   { icon: '&#10060;', color: '#8a5a20', bg: '#f0d9c0' },
  missed:    { icon: '&#10060;', color: '#8a5a20', bg: '#f0d9c0' },
};
function completionStatusButton(statusKey, currentStatus, onclickCall) {
  const s = COMPLETION_STATUS_STYLE[statusKey];
  const isSelected = currentStatus === statusKey;
  return `<button type="button" onclick="${onclickCall}" style="min-height:44px;padding:8px 6px;border-radius:8px;border:2px solid ${isSelected?s.color:'var(--border)'};background:${isSelected?s.bg:'#fff'};color:${isSelected?s.color:'var(--dark)'};font-size:12px;font-weight:${isSelected?'700':'500'};cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;width:100%;min-width:0;box-sizing:border-box">
    <span style="font-size:15px;flex-shrink:0">${s.icon}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${I18n.t('tr_status_'+statusKey)}</span>
  </button>`;
}

// Per your explicit instruction: changing status to skipped/missed does
// NOT auto-clear any KPI values that already exist on the record. Inputs
// are disabled for further edits, but old data is only cleared if the
// person explicitly changes the status AND saves again with fresh (zeroed)
// values entered through the normal edit flow — never as an automatic
// side effect of just picking a status.
function updateDrillCompletionStatus(drillsArray, index, newStatus) {
  drillsArray[index].completionStatus = newStatus;
  // Keep the legacy field in sync for anything not yet migrated to read
  // completionStatus, but never rely on it as the source of truth going
  // forward — completionStatus always wins per getDrillCompletionStatus.
  drillsArray[index].skipped = (newStatus === 'skipped' || newStatus === 'missed');
}

function moveDrillUp(drillsArray, index, rerenderFn) {
  if (index <= 0) return;
  [drillsArray[index-1], drillsArray[index]] = [drillsArray[index], drillsArray[index-1]];
  rerenderFn();
}
function moveDrillDown(drillsArray, index, rerenderFn) {
  if (index >= drillsArray.length - 1) return;
  [drillsArray[index], drillsArray[index+1]] = [drillsArray[index+1], drillsArray[index]];
  rerenderFn();
}

// Builds the drill rows every NEW training session starts with — currently
// the warm-up and sit-ups/push-ups block, both pre-filled with their usual
// default numbers, status not_started until actually performed.
function getDefaultSessionDrills() {
  return DRILL_LIBRARY.filter(d => d.isDefault).map(d => ({
    libraryKey: d.key,
    drillType: null,
    completionStatus: 'not_started',
    ...d.defaultValues,
  }));
}

// ── FIELD VISIBILITY CONFIG ──────────────────────────────────────────────────
// Stored in appMeta as a single JSON object. Defaults to everything visible
// if no config exists, so nothing changes until the admin disables something.
let _fieldVisibilityCache = null;

async function getFieldVisibility() {
  if (_fieldVisibilityCache) return _fieldVisibilityCache;
  const meta = await DB.get('appMeta', 'fieldVisibility');
  const config = meta?.value || {};
  // Build defaults (true) for any field not explicitly set
  const defaults = {};
  EXT_STAT_FIELDS.forEach(section => section.fields.forEach(f => {
    defaults[f.key] = config.hasOwnProperty(f.key) ? config[f.key] : true;
  }));
  _fieldVisibilityCache = defaults;
  return defaults;
}

async function saveFieldVisibility(config) {
  await DB.put('appMeta', { metaKey: 'fieldVisibility', value: config });
  _fieldVisibilityCache = config;
}

function isFieldVisible(key) {
  if (!_fieldVisibilityCache) return true; // not loaded yet, fail open
  return _fieldVisibilityCache[key] !== false;
}

function isSectionFullyHidden(section) {
  if (!_fieldVisibilityCache) return false;
  return section.fields.every(f => _fieldVisibilityCache[f.key] === false);
}

// ── EXTENDED STATS — LIVE AUTO-FILL LOGIC ────────────────────────────────────
// Cross is a type of pass: logging a cross adds the same amount onto the pass
// field, live, while typing. The pass field stays fully editable afterward —
// this is a starting suggestion, not a locked value.
// "Completed implies Attempted": if Won/Completed exceeds Attempted, bump
// Attempted up to match, for Tackles, Duels, and Dribbles.
// Shots Total is purely calculated (On Target + Off Target + Blocked) — no
// input field, no override needed, just a live running sum.
const EXT_STAT_CROSS_TO_PASS = { crossesAttempted: 'passesAttempted', crossesCompleted: 'passesCompleted' };
const EXT_STAT_COMPLETED_IMPLIES_ATTEMPTED = {
  tacklesWon: 'tacklesAttempted',
  duelsWon: 'duelsAttempted',
  dribblesCompleted: 'dribblesAttempted',
};

function getExtStatInputEl(playerId, gameId, key) {
  return document.getElementById(`ext-${playerId}-${gameId}-${key}`);
}

let _prevExtStatValues = {}; // tracks last value per field key so we add only the delta, not the full new value each keystroke

function handleExtStatInput(playerId, gameId, key, rawValue) {
  const value = parseInt(rawValue) || 0;
  const trackKey = `${playerId}-${gameId}-${key}`;
  const prevValue = _prevExtStatValues[trackKey] || 0;
  const delta = value - prevValue;
  _prevExtStatValues[trackKey] = value;

  // Rule 1: Cross -> Pass (add the delta, don't overwrite — respects manual pass edits)
  if (EXT_STAT_CROSS_TO_PASS[key] && delta !== 0) {
    const passKey = EXT_STAT_CROSS_TO_PASS[key];
    const passEl = getExtStatInputEl(playerId, gameId, passKey);
    if (passEl) {
      const newPassVal = Math.max(0, (parseInt(passEl.value)||0) + delta);
      passEl.value = newPassVal;
      _prevExtStatValues[`${playerId}-${gameId}-${passKey}`] = newPassVal;
    }
  }

  // Rule 2: Completed/Won implies Attempted — bump up if needed, never down
  if (EXT_STAT_COMPLETED_IMPLIES_ATTEMPTED[key]) {
    const attemptedKey = EXT_STAT_COMPLETED_IMPLIES_ATTEMPTED[key];
    const attemptedEl = getExtStatInputEl(playerId, gameId, attemptedKey);
    if (attemptedEl) {
      const attemptedVal = parseInt(attemptedEl.value)||0;
      if (value > attemptedVal) {
        attemptedEl.value = value;
        _prevExtStatValues[`${playerId}-${gameId}-${attemptedKey}`] = value;
      }
    }
  }

  // Shots Total — pure live sum, always recalculated, never stored as input
  if (['shotsOnTarget','shotsOffTarget','shotsBlocked'].includes(key)) {
    const onT = parseInt(getExtStatInputEl(playerId,gameId,'shotsOnTarget')?.value)||0;
    const offT = parseInt(getExtStatInputEl(playerId,gameId,'shotsOffTarget')?.value)||0;
    const blocked = parseInt(getExtStatInputEl(playerId,gameId,'shotsBlocked')?.value)||0;
    const totalEl = document.getElementById(`ext-${playerId}-${gameId}-shotsTotal`);
    if (totalEl) totalEl.textContent = onT + offT + blocked;
  }
}

function toggleExtStatForm(playerId, gameId) {
  const el = document.getElementById(`ext-form-${playerId}-${gameId}`);
  if (!el) return;
  const opening = el.style.display === 'none';
  el.style.display = opening ? '' : 'none';
  if (opening) {
    // Seed delta-tracking with whatever values are already in the inputs,
    // so the first edit after opening calculates a correct delta instead
    // of treating the existing saved value as a jump from zero.
    const allFields = EXT_STAT_FIELDS.flatMap(s => s.fields);
    allFields.forEach(f => {
      const input = getExtStatInputEl(playerId, gameId, f.key);
      if (input) _prevExtStatValues[`${playerId}-${gameId}-${f.key}`] = parseInt(input.value)||0;
    });
  }
}


async function saveExtStats(playerId, gameId) {
  const allFields = EXT_STAT_FIELDS.flatMap(s => s.fields);

  // Check if record exists — start from existing values so hidden fields
  // (no input on screen) keep their previously recorded data, not zeroed.
  const existing = await DB.getAll('playerGameStats','gameId',gameId);
  const prev = existing.find(r => r.playerId === playerId);

  const record = { playerId, gameId, seasonId: State.currentSeasonId };
  if (prev) record.pgsId = prev.pgsId;

  allFields.forEach(f => {
    const el = document.getElementById(`ext-${playerId}-${gameId}-${f.key}`);
    if (el) {
      record[f.key] = parseInt(el.value)||0;
    } else {
      // Field is hidden — preserve whatever was already stored, default to 0 if none
      record[f.key] = prev ? (prev[f.key]||0) : 0;
    }
  });

  await DB.put('playerGameStats', record);
  Toast.show(I18n.t('ext_stats_saved'));
  // Close form, re-render
  const formEl = document.getElementById(`ext-form-${playerId}-${gameId}`);
  if (formEl) formEl.style.display = 'none';
  await renderExtendedStats(playerId);
}

async function renderMatchLog(playerId) {
  const el = document.getElementById(`tracked-log-${playerId}`);
  if (!el) return;

  const players = await DB.getAll('players','seasonId',State.currentSeasonId);
  const player = players.find(p => p.playerId === playerId);
  if (!player) return;

  const games = await DB.getAll('games','seasonId',State.currentSeasonId);
  const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);
  const lorGP = allGP.filter(r => r.playerId === playerId);

  // Pre-compute everything needed for sorting
  const enriched = games.map(g => {
    const gp = lorGP.find(r => r.gameId === g.gameId);
    const gps = allGP.filter(r => r.gameId === g.gameId);
    const our = Calc.teamGoals(gps);
    const their = parseInt(g.opponentScore)||0;
    return { game: g, gp, _our: our, _their: their, _res: Calc.result(our,their) };
  });

  const sortKey = el.dataset.sortKey || 'date';
  const sortDir = el.dataset.sortDir || 'desc';
  const sortFns = {
    date:     (a,b) => new Date(a.game.date||0) - new Date(b.game.date||0),
    opponent: (a,b) => (a.game.opponent||'').localeCompare(b.game.opponent||''),
    result:   (a,b) => (a._res||'').localeCompare(b._res||''),
    role:     (a,b) => (a.gp?.role||'').localeCompare(b.gp?.role||''),
    position: (a,b) => (a.gp?.positionPlayed||'').localeCompare(b.gp?.positionPlayed||''),
    goals:    (a,b) => (a.gp?.goals||0) - (b.gp?.goals||0),
    assists:  (a,b) => (a.gp?.assists||0) - (b.gp?.assists||0),
    yc:       (a,b) => (a.gp?.yellowCards||0) - (b.gp?.yellowCards||0),
    rc:       (a,b) => (a.gp?.redCards||0) - (b.gp?.redCards||0),
  };
  enriched.sort((a,b) => {
    const fn = sortFns[sortKey] || sortFns.date;
    return sortDir === 'asc' ? fn(a,b) : fn(b,a);
  });

  function thSort(key, label, extraClass='') {
    const active = sortKey === key;
    const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="matchLogSort(${playerId},'${key}')">${label}${arrow}</th>`;
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-title">${I18n.t('tp_card_match_by_match')} — ${esc(player.fullName)}</div>
      <div class="game-detail-table-wrap" style="margin-bottom:0">
        <table class="game-detail-table" style="min-width:980px">
          <thead><tr>
            ${thSort('date',I18n.t('tp_col_date'),'col-sticky-num')}
            ${thSort('opponent',I18n.t('tp_col_opponent'),'col-sticky-name')}
            ${thSort('result',I18n.t('tp_col_result'))}
            ${thSort('role',I18n.t('tp_col_role'))}
            ${thSort('position',I18n.t('tp_col_position'))}
            ${thSort('goals',I18n.t('tp_col_goals'))}
            ${thSort('assists',I18n.t('tp_col_assists'))}
            ${thSort('yc',I18n.t('tp_col_yc'))}
            ${thSort('rc',I18n.t('tp_col_rc'))}
            <th>${I18n.t('tp_col_mom')}</th><th>${I18n.t('tp_col_cap')}</th><th>${I18n.t('tp_col_notes')}</th>
          </tr></thead>
          <tbody>
          ${enriched.map(({game:g, gp, _our:our, _their:their, _res:res}) => {
            const resultVisible = isGameResultVisible(g);
            if (!gp||!gp.calledUp) return `<tr>
              <td class="col-sticky-num" style="min-width:60px">${g.date?fmtDate(g.date):'—'}</td>
              <td class="col-sticky-name">${esc(g.opponent)}</td>
              <td>${resultVisible?`<span class="badge badge-${res}">${res}</span>`:`<span class="td-muted" style="font-size:11px">${I18n.t('tp_form_upcoming')}</span>`}</td>
              <td colspan="9" class="td-muted">${I18n.t('tp_not_called_up')}</td></tr>`;
            return `<tr>
              <td class="col-sticky-num" style="min-width:60px">${g.date?fmtDate(g.date):'—'}</td>
              <td class="col-sticky-name">${esc(g.opponent)}</td>
              <td>${resultVisible?`<span class="badge badge-${res}">${res}</span> <small class="td-muted">${(()=>{const s=Calc.homeAwayScore(g.homeAway,our,their);return s.home+'-'+s.away;})()}</small>`:`<span class="td-muted" style="font-size:11px">${I18n.t('tp_form_upcoming')}</span>`}</td>
              <td><span class="badge ${gp.role==='Starter'?'badge-starter':'badge-sub'}">${gp.role==='Starter'?I18n.t('gd_role_starter'):(gp.role==='Sub'?I18n.t('gd_role_sub'):(gp.role||'—'))}</span></td>
