// FILE INPUT HANDLERS — using FileReader callbacks (no async/await in read)
// ══════════════════════════════════════════════════════════════════════════════
function onRestoreFileChange(input) {
  const file = input.files && input.files[0];
  dbgLog('Restore file input changed');
  if (!file) { dbgLog('No file selected'); return; }
  dbgLog('File selected: ' + file.name + ' | type: ' + file.type + ' | size: ' + file.size + ' bytes');
  const infoEl = document.getElementById('restoreFileInfo');
  if (infoEl) infoEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  const reader = new FileReader();
  reader.onerror = function() { dbgLog('FileReader error'); Toast.error(I18n.t('bk_err_read_file')); input.value=''; };
  reader.onload = function(e) {
    dbgLog('FileReader onload fired');
    const text = e.target.result;
    let parsed;
    try { parsed = JSON.parse(text); } catch(x) { dbgLog('JSON parse failed: ' + x.message); Toast.error(I18n.t('bk_err_invalid_json')); input.value=''; return; }
    if (!parsed.data || !Array.isArray(parsed.data.seasons)) {
      dbgLog('JSON missing required data'); Toast.error(I18n.t('bk_err_missing_data')); input.value=''; return;
    }
    dbgLog('JSON valid — seasons: ' + parsed.data.seasons.length + ' | players: ' + (parsed.data.players||[]).length);
    input.value = '';
    doRestore(parsed);
  };
  dbgLog('FileReader readAsText starting...');
  reader.readAsText(file);
}

function doRestore(parsed) {
  Confirm.show(I18n.t('bk_confirm_restore_title'), I18n.t('bk_confirm_restore_file_body'), async () => {
    dbgLog('Restore confirmed — starting...');
    try {
      await Backup.create('before-restore');
      await DB.restoreAllStores(parsed.data);
      await loadMeta();
      dbgLog('Restore complete.');
      Toast.show(I18n.t('bk_restored_success'));
      await Nav.go('home');
    } catch(err) { dbgLog('Restore error: ' + err.message); Toast.error(err.message); }
  });
}

function handlePasteRestore() {
  const text = (document.getElementById('pasteRestoreJSON')||{}).value||'';
  dbgLog('Paste restore triggered — length: ' + text.length);
  if (!text.trim()) { Toast.error(I18n.t('bk_err_nothing_pasted')); return; }
  let parsed;
  try { parsed = JSON.parse(text); } catch(x) { Toast.error(I18n.t('bk_err_invalid_json_short')); return; }
  if (!parsed.data || !Array.isArray(parsed.data.seasons)) { Toast.error(I18n.t('bk_err_missing_data')); return; }
  dbgLog('Pasted JSON valid — restoring...');
  doRestore(parsed);
}

function onImportFileChange(input, type) {
  const file = input.files && input.files[0];
  dbgLog(type + ' file input changed');
  if (!file) { dbgLog('No file selected'); return; }
  dbgLog('File: ' + file.name + ' | type: ' + file.type + ' | size: ' + file.size + ' bytes');
  const infoId = 'import' + type.charAt(0).toUpperCase() + type.slice(1) + 'FileInfo';
  const infoEl = document.getElementById(infoId);
  if (infoEl) infoEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'csv') { Toast.error(I18n.t('imp_csv_only')); input.value=''; return; }
  const reader = new FileReader();
  reader.onerror = function() { dbgLog('FileReader error for ' + type); Toast.error(I18n.t('bk_err_read_file')); input.value=''; };
  reader.onload = function(e) {
    dbgLog('FileReader onload for ' + type);
    const text = e.target.result;
    const rows = parseCSVText(text);
    dbgLog('Parse complete — rows found: ' + rows.length);
    input.value = '';
    processImportRows(rows, type);
  };
  reader.readAsText(file);
}

function handlePasteImport(type) {
  const pasteId = 'paste' + type.charAt(0).toUpperCase() + type.slice(1) + 'CSV';
  const text = (document.getElementById(pasteId)||{}).value||'';
  dbgLog('Paste import for ' + type + ' — length: ' + text.length);
  if (!text.trim()) { Toast.error(I18n.t('bk_err_nothing_pasted')); return; }
  const rows = parseCSVText(text);
  dbgLog('Paste parse complete — rows: ' + rows.length);
  processImportRows(rows, type);
}

// ══════════════════════════════════════════════════════════════════════════════
// SYNC MODULE
// ══════════════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════════
// AUTH — Supabase email/password authentication.
// Session (access token + user id) is cached in memory and persisted to
// IndexedDB appMeta so the person stays logged in across app restarts,
// fully offline-capable — login is only needed to enable cloud sync, never
// to use the app itself.
// ══════════════════════════════════════════════════════════════════════════════
const Auth = (() => {
  let _session = null; // { accessToken, refreshToken, userId, email, expiresAt }

  function isLoggedIn() { return !!_session; }
  function getUserId() { return _session?.userId || null; }
  function getAccessToken() { return _session?.accessToken || null; }
  function getEmail() { return _session?.email || null; }

  function _supabaseAuthBase() {
    const url = Sync.getRawConfig().url;
    if (!url) throw new Error('Sync not configured — set up Supabase URL first.');
    return url.replace(/\/$/, '') + '/auth/v1/';
  }

  async function _authRequest(path, body) {
    const anonKey = Sync.getRawConfig().anonKey;
    if (!anonKey) throw new Error('Sync not configured — set up Supabase anon key first.');
    const res = await fetch(_supabaseAuthBase() + path, {
      method: 'POST',
      headers: { 'apikey': anonKey, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const msg = data?.error_description || data?.msg || data?.message || ('Auth error ' + res.status);
      throw new Error(msg);
    }
    return data;
  }

  function _storeSession(data) {
    _session = {
      accessToken:  data.access_token,
      refreshToken: data.refresh_token,
      userId:       data.user?.id,
      email:        data.user?.email,
      expiresAt:    Date.now() + (data.expires_in || 3600) * 1000,
    };
    return DB.put('appMeta', { metaKey: 'authSession', value: _session });
  }

  async function loadSession() {
    const m = await DB.get('appMeta', 'authSession');
    if (m && m.value) {
      _session = m.value;
      // If the access token has expired, try to refresh it silently.
      if (_session.expiresAt && Date.now() > _session.expiresAt && _session.refreshToken) {
        try { await refresh(); } catch(e) { _session = null; await DB.del('appMeta','authSession').catch(()=>{}); }
      }
    }
  }

  async function signUp(email, password) {
    const data = await _authRequest('signup', { email, password });
    if (data.access_token) await _storeSession(data);
    return data;
  }

  async function login(email, password) {
    const data = await _authRequest('token?grant_type=password', { email, password });
    await _storeSession(data);
    return data;
  }

  async function refresh() {
    if (!_session?.refreshToken) throw new Error('No refresh token available.');
    const data = await _authRequest('token?grant_type=refresh_token', { refresh_token: _session.refreshToken });
    await _storeSession(data);
    return data;
  }

  async function logout() {
    _session = null;
    await DB.del('appMeta', 'authSession').catch(()=>{});
  }

  return { isLoggedIn, getUserId, getAccessToken, getEmail, loadSession, signUp, login, refresh, logout };
})();

const Sync = (() => {
  // Config loaded from IndexedDB appMeta
  let _cfg = { url:'', anonKey:'', familyId:'', deviceId:'', deviceName:'' };
  let _status = 'disconnected'; // disconnected | connected | syncing | error
  let _lastSync = null;
  let _pendingCount = 0;
  let _log = [];

  // Stores that sync to cloud (backups excluded — too large)
  // Fixed: this used to be its own separate, stale 8-store array that
  // predated the Training module and was never updated across Passes 1-4,
  // meaning trainingSessions/customDrills/drillFavourites/trainingPacks
  // were silently excluded from every push and pull cycle since they were
  // introduced. Now derived from the single authoritative SYNC_STORES_SET
  // (declared once, near the top of the file) so there is only one source
  // of truth for "which stores sync" going forward.
  const SYNC_STORES = [...SYNC_STORES_SET];

  function log(msg) {
    const line = new Date().toLocaleTimeString() + ' — ' + msg;
    _log.push(line);
    if (_log.length > 100) _log.shift();
    console.log('[Sync]', msg);
    const el = document.getElementById('syncLog');
    if (el) { el.innerHTML = _log.map(l=>`<div>${l}</div>`).join(''); el.scrollTop = el.scrollHeight; }
  }

  function isConfigured() {
    return !!((_cfg.url||'').trim() && (_cfg.anonKey||'').trim());
  }

  function getRawConfig() { return { url: _cfg.url, anonKey: _cfg.anonKey }; }

  function isOnline() { return navigator.onLine; }

  // ── PRE-CONFIGURED SUPABASE DEFAULTS ─────────────────────────────────────
  const DEFAULTS = {
    supabaseUrl:    'https://wicydcvdakqopodbxtrl.supabase.co',
    supabaseAnonKey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpY3lkY3ZkYWtxb3BvZGJ4dHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MDA5NTUsImV4cCI6MjA5NzE3Njk1NX0._sIaztNAGi9ffuL8qz84G-q_h5TIKTYbyjcnD9VwbE0',
    familyId:       'vmabere',
  };

  async function loadConfig() {
    // Seed defaults into DB if not already saved
    for (const [k, v] of Object.entries(DEFAULTS)) {
      const existing = await DB.get('appMeta', k);
      if (!existing || !existing.value) {
        await DB.put('appMeta', { metaKey: k, value: v });
      }
    }

    const keys = ['supabaseUrl','supabaseAnonKey','familyId','deviceId','deviceName'];
    for (const k of keys) {
      const m = await DB.get('appMeta', k);
      if (m) _cfg[k === 'supabaseUrl' ? 'url' : k === 'supabaseAnonKey' ? 'anonKey' : k] = m.value || '';
    }
    // Auto-generate deviceId if missing
    if (!_cfg.deviceId) {
      _cfg.deviceId = 'dev-' + Math.random().toString(36).slice(2,10);
      await DB.put('appMeta', { metaKey:'deviceId', value: _cfg.deviceId });
    }
    const lsm = await DB.get('appMeta', 'lastSyncAt');
    _lastSync = lsm ? lsm.value : null;
  }

  async function saveConfig(url, anonKey, familyId, deviceName) {
    _cfg.url = url.trim();
    _cfg.anonKey = anonKey.trim();
    _cfg.familyId = familyId.trim();
    _cfg.deviceName = deviceName.trim();
    await DB.put('appMeta', { metaKey:'supabaseUrl', value: _cfg.url });
    await DB.put('appMeta', { metaKey:'supabaseAnonKey', value: _cfg.anonKey });
    await DB.put('appMeta', { metaKey:'familyId', value: _cfg.familyId });
    await DB.put('appMeta', { metaKey:'deviceName', value: _cfg.deviceName });
  }

  // ── LOW-LEVEL SUPABASE REST ────────────────────────────────────────────────
  function storeToTable(store) {
    const map = {
      seasons: 'seasons',
      players: 'players',
      games: 'games',
      gamePlayers: 'game_players',
      achievements: 'achievements',
      clubHistory: 'club_history',
      globalPlayers: 'global_players',
      opponents: 'opponents',
      playerGameStats: 'player_game_stats',
      events: 'events',
      goalEvents: 'goal_events',
      injuries: 'injuries',
      trainingSessions: 'training_sessions',
      customDrills: 'custom_drills',
      drillFavourites: 'drill_favourites',
      trainingPacks: 'training_packs',
    };
    return map[store] || store;
  }

  async function supabaseRequest(method, table, body, params) {
    if (!isConfigured()) throw new Error('Sync not configured.');
    if (!Auth.isLoggedIn()) throw new Error('Not logged in — sign in to sync your data to the cloud.');
    const base = _cfg.url.replace(/\/rest\/v1\/?$/, '').replace(/\/$/, '') + '/rest/v1/';
    let url = base + table;
    const qs = params ? new URLSearchParams(params).toString() : '';
    if (qs) url += '?' + qs;

    // Prefer header per method
    // POST = insert, PATCH = update, GET = select
    const prefer = (method === 'POST' || method === 'PATCH')
      ? 'return=representation'
      : 'return=representation';

    // Use the logged-in user's real access token, never the anon key, for
    // any request that touches user data — this is what makes auth.uid()
    // resolve correctly in the RLS policies on the database side. The anon
    // key alone carries no user identity at all.
    const res = await fetch(url, {
      method,
      headers: {
        'apikey':        _cfg.anonKey,
        'Authorization': 'Bearer ' + Auth.getAccessToken(),
        'Content-Type':  'application/json',
        'Prefer':        prefer,
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error('Supabase error ' + res.status + ': ' + err.slice(0,200));
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  async function testConnection() {
    if (!isConfigured()) return { ok: false, msg: 'Missing URL or key.' };
    if (!Auth.isLoggedIn()) return { ok: false, msg: 'Not logged in.' };
    try {
      await supabaseRequest('GET', 'seasons', null, { user_id: 'eq.' + Auth.getUserId(), limit: '1' });
      _status = 'connected';
      return { ok: true, msg: 'Connection successful.' };
    } catch(e) {
      _status = 'error';
      return { ok: false, msg: e.message };
    }
  }

  // ── PUSH: local → cloud ────────────────────────────────────────────────────
  async function push() {
    if (!isConfigured() || !isOnline() || !Auth.isLoggedIn()) return 0;
    let pushed = 0;
    for (const store of SYNC_STORES) {
      let records;
      try { records = await DB.getAll(store); } catch(e) { continue; }
      const pending = records.filter(r => r.syncStatus === 'local' || r.syncStatus === 'modified');
      for (const record of pending) {
        const localId = String(record[getKey(store)]);
        const isUpdate = !!record.cloudId;
        const operation = isUpdate ? 'UPDATE' : 'INSERT';

        // Build cloud row — NEVER include local IndexedDB id as Supabase id
        // payload stores the full record but strip cloudId/syncStatus from it
        const payloadClean = { ...record };
        delete payloadClean.cloudId;
        delete payloadClean.syncStatus;

        const cloudRow = {
          user_id:    Auth.getUserId(),
          family_id:  _cfg.familyId || null,
          device_id:  _cfg.deviceId,
          local_id:   localId,
          payload:    payloadClean,
          updated_at: record.updatedAt || new Date().toISOString(),
          sync_status:'synced',
        };
        // Only include id when updating an existing cloud row
        if (isUpdate) cloudRow.id = record.cloudId;

        log(operation + ' | store:' + store + ' | local_id:' + localId + ' | cloudId:' + (record.cloudId||'none'));

        try {
          let result;
          if (isUpdate) {
            // PATCH existing row by cloudId
            result = await supabaseRequest(
              'PATCH',
              storeToTable(store),
              cloudRow,
              { id: 'eq.' + record.cloudId }
            );
            // A PATCH blocked by row-level security returns HTTP 200/204 with
            // an empty array, not an error — Postgres silently updated zero
            // rows rather than rejecting the request. This happens for old
            // rows still owned by no one (user_id is null), which the app
            // itself cannot fix — see data_migration_pass3.sql. Detect that
            // here instead of wrongly marking it as synced: fall back to
            // creating a fresh row owned by this account so the data is
            // never lost or stuck silently unsynced.
            if (!result || result.length === 0) {
              log('PATCH affected 0 rows (likely unowned old row, see Pass 3 migration) — inserting fresh instead | store:' + store);
              delete cloudRow.id;
              result = await supabaseRequest('POST', storeToTable(store), cloudRow);
            }
          } else {
            // INSERT new row — no id field sent, Supabase generates it
            result = await supabaseRequest('POST', storeToTable(store), cloudRow);
          }

          // Save returned Supabase id as cloudId in local record
          if (result && result[0] && result[0].id) {
            record.cloudId = result[0].id;
          }
          record.syncStatus = 'synced';
          await _origPut(store, record);
          pushed++;
          log('OK | store:' + store + ' | cloudId:' + (record.cloudId||'—'));
        } catch(e) {
          log('Push error | store:' + store + ' | local_id:' + localId + ' | ' + e.message);
        }
      }
    }
    log('Push complete: ' + pushed + ' records sent.');
    return pushed;
  }

  // ── PULL: cloud → local ────────────────────────────────────────────────────
  async function pull() {
    if (!isConfigured() || !isOnline() || !Auth.isLoggedIn()) return 0;
    let pulled = 0;
    const sinceParam = _lastSync ? { user_id: 'eq.'+Auth.getUserId(), updated_at: 'gt.'+_lastSync } : { user_id: 'eq.'+Auth.getUserId() };
    for (const store of SYNC_STORES) {
      let cloudRecords;
      try { cloudRecords = await supabaseRequest('GET', storeToTable(store), null, sinceParam); } catch(e) { log('Pull error '+store+': '+e.message); continue; }
      for (const cr of cloudRecords) {
        if (!cr.payload) continue;
        const payload = cr.payload;
        payload.cloudId = cr.id;
        payload.syncStatus = 'synced';
        // Check if local record exists
        const localKey = getKey(store);
        let existing = null;
        try {
          // Find by cloudId
          const all = await DB.getAll(store);
          existing = all.find(r => r.cloudId === cr.id);
        } catch(e) {}
        // Conflict: cloud wins if updatedAt is newer
        if (existing) {
          const localTime = new Date(existing.updatedAt||0).getTime();
          const cloudTime = new Date(cr.updated_at||0).getTime();
          if (cloudTime <= localTime) continue; // local is newer, skip
        }
        // Handle soft delete
        if (cr.deleted_at) {
          payload.deletedAt = cr.deleted_at;
          payload.syncStatus = 'deleted';
        }
        try { await _origPut(store, payload); pulled++; } catch(e) { log('Pull write error: '+e.message); }
      }
    }
    _lastSync = new Date().toISOString();
    await DB.put('appMeta', { metaKey:'lastSyncAt', value: _lastSync });
    log('Pull complete: ' + pulled + ' records received.');
    return pulled;
  }

  // ── FULL SYNC ──────────────────────────────────────────────────────────────
  async function run(silent=false) {
    if (!isConfigured()) { if (!silent) Toast.error(I18n.t('sync_err_not_configured')); return; }
    if (!isOnline()) { if (!silent) Toast.error(I18n.t('sync_err_no_internet')); return; }
    _status = 'syncing';
    updateSyncUI();
    if (!silent) log('Starting sync...');
    try {
      const pulled = await pull();
      const pushed = await push();
      _status = 'connected';
      if (!silent) {
        log('Sync complete — pulled: ' + pulled + ', pushed: ' + pushed);
        Toast.show(I18n.t('sync_complete', {pulled, pushed}));
      }
    } catch(e) {
      _status = 'error';
      log('Sync failed: ' + e.message);
      if (!silent) Toast.error(I18n.t('sync_err_failed', {msg: e.message}));
    }
    updateSyncUI();
  }

  // ── RESET CLOUD IDs — clears cloudId so next push is all INSERTs ──────────
  async function resetLocalCloudIds() {
    log('Resetting local cloudIds — next push will be clean INSERTs...');
    for (const store of SYNC_STORES) {
      try {
        const all = await DB.getAll(store);
        for (const r of all) {
          delete r.cloudId;
          r.syncStatus = 'local';
          r.updatedAt = r.updatedAt || new Date().toISOString();
          await _origPut(store, r);
        }
        log('Reset ' + all.length + ' records in ' + store);
      } catch(e) { log('Reset error ' + store + ': ' + e.message); }
    }
    log('Reset complete — ready for clean push.');
  }

  // ── UPLOAD ALL (full push regardless of syncStatus) ────────────────────────
  async function uploadAll() {
    if (!isConfigured() || !isOnline()) { Toast.error(I18n.t('sync_err_not_configured_or_offline')); return; }
    log('Uploading all local data...');
    // Mark everything as modified first
    for (const store of SYNC_STORES) {
      try {
        const all = await DB.getAll(store);
        for (const r of all) {
          if (!r.syncStatus || r.syncStatus === 'synced') {
            r.syncStatus = 'modified';
            r.updatedAt = r.updatedAt || new Date().toISOString();
            await _origPut(store, r); // bypass wrapper
          }
        }
      } catch(e) {}
    }
    await run();
  }

  // ── DOWNLOAD ALL (full pull, ignore lastSyncAt) ───────────────────────────
  async function downloadAll() {
    if (!isConfigured()) { Toast.error(I18n.t('sync_err_not_configured_short')); return; }
    if (!isOnline()) { Toast.error(I18n.t('sync_err_no_internet')); return; }
    _lastSync = null;
    await _origPut('appMeta', { metaKey:'lastSyncAt', value: null });
    log('Download all started — ignoring last sync timestamp...');
    _status = 'syncing';
    updateSyncUI();
    try {
      const pulled = await pull();
      _status = 'connected';
      log('Download all complete — ' + pulled + ' records received.');
    } catch(e) {
      _status = 'error';
      log('Download error: ' + e.message);
    }
    updateSyncUI();
  }

  // ── PENDING COUNT ──────────────────────────────────────────────────────────
  async function getPendingCount() {
    let count = 0;
    for (const store of SYNC_STORES) {
      try {
        const all = await DB.getAll(store);
        count += all.filter(r => r.syncStatus === 'local' || r.syncStatus === 'modified').length;
      } catch(e) {}
    }
    _pendingCount = count;
    return count;
  }

  function getKey(store) {
    const keys = {
      seasons:'seasonId', players:'playerId', games:'gameId', gamePlayers:'gamePlayerId',
      achievements:'achievementId', clubHistory:'clubHistoryId', globalPlayers:'globalPlayerId', opponents:'opponentId',
      playerGameStats:'pgsId', events:'eventId', goalEvents:'goalEventId', injuries:'injuryId',
      trainingSessions:'trainingSessionId', customDrills:'drillId', drillFavourites:'favouriteId',
      trainingPacks:'packId',
    };
    return keys[store] || 'id';
  }

  function updateSyncUI() {
    const bar = document.getElementById('syncStatusBar');
    if (!bar) return;
    const labels = { connected:'Connected', disconnected:'Not configured', error:'Sync error', syncing:'Syncing...' };
    const cls = { connected:'connected', disconnected:'disconnected', error:'error', syncing:'syncing' };
    bar.className = 'sync-status-bar ' + (cls[_status]||'disconnected');
    bar.innerHTML = `<div class="sync-dot${_status==='syncing'?' pulse':''}"></div><span>${labels[_status]||'—'}</span>${_lastSync?`<span style="margin-left:auto;font-size:10px;opacity:.7">Last sync: ${fmtDateTime(_lastSync)}</span>`:''}`;
  }

  function getStatus() { return { status:_status, lastSync:_lastSync, pendingCount:_pendingCount, configured:isConfigured(), online:isOnline() }; }
  function fmtDateTime(d) { if(!d)return'—'; return new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }

  // ── DELETE ALL CLOUD ROWS FOR THE LOGGED-IN USER ─────────────────────────
  async function supabaseDelete(table) {
    if (!Auth.isLoggedIn()) throw new Error('Not logged in.');
    const base = _cfg.url.replace(/\/rest\/v1\/?$/, '').replace(/\/$/, '') + '/rest/v1/';
    const url = base + table + '?' + new URLSearchParams({ user_id: 'eq.' + Auth.getUserId() }).toString();
    const res = await fetch(url, {
      method: 'DELETE',
      headers: {
        'apikey': _cfg.anonKey,
        'Authorization': 'Bearer ' + Auth.getAccessToken(),
        'Prefer': 'return=minimal',
      },
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error('Delete error ' + res.status + ': ' + err.slice(0,200));
    }
  }

  return { loadConfig, saveConfig, testConnection, run, uploadAll, downloadAll, resetLocalCloudIds, supabaseDelete, getPendingCount, getStatus, updateSyncUI, log, isConfigured, getRawConfig };
})();

function attachEvents() {

  // Nav links
  document.querySelectorAll('.nav-link').forEach(btn => {
    btn.addEventListener('click', () => Nav.go(btn.dataset.section));
  });

  // Hamburger
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.toggle('open');
  });

  // Close the mobile menu if the page scrolls while it's open — a menu
  // sitting fixed on top of content the person is actively scrolling past
  // reads as a stuck overlay rather than a deliberate choice to keep it open.
  window.addEventListener('scroll', () => {
    document.getElementById('mobileMenu')?.classList.remove('open');
  }, { passive: true });

  // Confirm dialog
  document.getElementById('dialogConfirm').addEventListener('click', () => Confirm.resolve(true));
  document.getElementById('dialogCancel').addEventListener('click', () => Confirm.resolve(false));

  // ── STATIC FILE INPUTS — wired here, once, at app start ─────────────────
  document.getElementById('fileInputRestore')?.addEventListener('change', function() {
    onRestoreFileChange(this);
  });
  document.getElementById('fileInputPlayers')?.addEventListener('change', function() {
    onImportFileChange(this, 'players');
  });
  document.getElementById('fileInputGames')?.addEventListener('change', function() {
    onImportFileChange(this, 'games');
  });
  document.getElementById('fileInputOpponents')?.addEventListener('change', function() {
    onImportFileChange(this, 'opponents');
  });

  // ── SQUAD ──────────────────────────────────────────────────────────────────
  document.getElementById('btnAddPlayer')?.addEventListener('click', () => {
    resetPlayerForm();
    document.getElementById('playerFormTitle').textContent = I18n.t('squad_form_add_title');
    document.getElementById('addPlayerPanel').classList.remove('panel-hidden');
    document.getElementById('addPlayerPanel').scrollIntoView({behavior:'smooth'});
  });
  document.getElementById('btnCancelPlayer')?.addEventListener('click', () => {
    document.getElementById('addPlayerPanel').classList.add('panel-hidden');
  });
  document.getElementById('btnSavePlayer')?.addEventListener('click', savePlayer);

  document.getElementById('squadSearch').addEventListener('input', () => {
    Render.squad(document.getElementById('squadSearch').value, document.getElementById('squadFilter').value);
  });
  document.getElementById('squadFilter').addEventListener('change', () => {
    Render.squad(document.getElementById('squadSearch').value, document.getElementById('squadFilter').value);
  });

  // ── GAMES ──────────────────────────────────────────────────────────────────
  document.getElementById('btnAddGame')?.addEventListener('click', () => {
    resetGameForm();
    document.getElementById('gameFormTitle').textContent = I18n.t('games_form_add_title');
    document.getElementById('gf-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('addGamePanel').classList.remove('panel-hidden');
    document.getElementById('addGamePanel').scrollIntoView({behavior:'smooth'});
    populateOpponentDatalist();
  });
  // Auto-calculate arrival time when game time or venue changes
  document.getElementById('gf-time')?.addEventListener('change', () => {
    const manual = document.getElementById('gf-arrivalTime').value;
    if (!manual) {
      const t = document.getElementById('gf-time').value;
      const ha = document.getElementById('gf-venue').value;
      if (t) document.getElementById('gf-arrivalTime').value = Calc.arrivalTime(t, ha);
    }
  });
  document.getElementById('gf-venue')?.addEventListener('change', () => {
    const t = document.getElementById('gf-time').value;
    const ha = document.getElementById('gf-venue').value;
    if (t) document.getElementById('gf-arrivalTime').value = Calc.arrivalTime(t, ha);
    autoFillHomeGround();
  });
  document.getElementById('btnCancelGame')?.addEventListener('click', () => {
    document.getElementById('addGamePanel').classList.add('panel-hidden');
  });
  document.getElementById('btnSaveGame')?.addEventListener('click', saveGame);

  document.getElementById('gamesSearch').addEventListener('input', () => {
    Render.gamesList(document.getElementById('gamesSearch').value, document.getElementById('gamesFilter').value);
  });
  document.getElementById('gamesFilter').addEventListener('change', () => {
    Render.gamesList(document.getElementById('gamesSearch').value, document.getElementById('gamesFilter').value);
  });

  document.getElementById('btnBackToGames')?.addEventListener('click', closeGameDetail);

  // ── ACHIEVEMENTS ───────────────────────────────────────────────────────────
  // Achievements and Club History now live inside tracked player tabs
  // Their buttons are handled via onclick — no top-level listeners needed
}

function resetPlayerForm() {
  ['pf-name','pf-num','pf-dob','pf-nat','pf-height','pf-weight','pf-notes','pf-id'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('pf-pos1').value = '';
  document.getElementById('pf-pos2').value = '';
  document.getElementById('pf-foot').value = 'Right';
  const pfTracked = document.getElementById('pf-tracked');
  if (pfTracked) pfTracked.value = '';
  const pfLabel = document.getElementById('pf-trackLabel');
  if (pfLabel) pfLabel.value = '';
  const pfRel = document.getElementById('pf-relationship');
  if (pfRel) pfRel.value = '';
}

async function savePlayer() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { Toast.error(I18n.t('pf_err_name')); return; }
  const pos1 = document.getElementById('pf-pos1').value;
  if (!pos1) { Toast.error(I18n.t('pf_err_pos')); return; }
  if (!State.currentSeasonId) { Toast.error(I18n.t('pf_err_no_season')); return; }

  const existingId = document.getElementById('pf-id').value;
  const trackingStatus = document.getElementById('pf-tracked')?.value || null;
  const trackingLabel  = document.getElementById('pf-trackLabel')?.value.trim() || null;
  const relationship   = document.getElementById('pf-relationship')?.value.trim() || null;

  const player = {
    seasonId: State.currentSeasonId,
    fullName: name,
    shirtNumber: parseInt(document.getElementById('pf-num').value)||null,
    dateOfBirth: document.getElementById('pf-dob').value||null,
    nationality: document.getElementById('pf-nat').value.trim()||null,
    primaryPosition: pos1,
    secondaryPosition: document.getElementById('pf-pos2').value||null,
    dominantFoot: document.getElementById('pf-foot').value,
    height: parseFloat(document.getElementById('pf-height').value)||null,
    weight: parseFloat(document.getElementById('pf-weight').value)||null,
    developmentNotes: document.getElementById('pf-notes').value.trim()||null,
    trackingStatus: trackingStatus || null,
    trackingLabel: trackingLabel || null,
    relationship: relationship || null,
    isActive: true,
  };

  if (existingId) player.playerId = parseInt(existingId);
  await Backup.create('before-save');
  await DB.put('players', player);
  await buildTrackedNav(); // rebuild nav in case tracking status changed
  Toast.show(existingId ? I18n.t('pf_updated') : I18n.t('pf_added'));
  document.getElementById('addPlayerPanel').classList.add('panel-hidden');
  resetPlayerForm();
  await Render.squad();
}

  allInjuries.sort((a,b) => new Date(b.startDate||0) - new Date(a.startDate||0));

  const seasons = await DB.getAll('seasons');
  const seasonName = (id) => seasons.find(s => s.seasonId === id)?.seasonName || I18n.t('inj_unknown_season');

  const overlay = document.createElement('div');
  overlay.className = 'rm-form-overlay open';
  overlay.id = 'injuryHistoryOverlay';
  overlay.innerHTML = `
    <div class="rm-form" style="max-width:480px">
      <h2>${I18n.t('inj_history_title')} — ${esc(shortName(p.fullName))}</h2>
      ${!allInjuries.length ? `<p style="font-size:13px;color:var(--muted);margin-top:8px">${I18n.t('inj_history_empty')}</p>` : `
      <div class="timeline-list" style="margin-top:12px;max-height:60vh;overflow-y:auto">
        ${allInjuries.map(inj => `
          <div class="timeline-item">
            <div class="ti-title">
              <span class="badge" style="background:${inj.status==='Injured'?'#fde8e8':'#e6f4ea'};color:${inj.status==='Injured'?'#b03030':'#2a7a3b'}">
                ${inj.status==='Injured'?I18n.t('inj_status_injured'):I18n.t('inj_status_recovered')}
              </span>
              ${inj.injuryType?`<span class="pos-pill">${esc(injuryTypeLabel(inj.injuryType))}</span>`:''}
            </div>
            <div class="ti-meta">${seasonName(inj.seasonId)} · ${inj.startDate?fmtDate(inj.startDate):'—'}${inj.endDate?' → '+fmtDate(inj.endDate):''}</div>
            ${inj.notes?`<div class="ti-desc">${esc(inj.notes)}</div>`:''}
          </div>`).join('')}
      </div>`}
      <div class="form-actions" style="margin-top:16px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="document.getElementById('injuryHistoryOverlay').remove()">${I18n.t('inj_btn_close')}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function saveInjury(playerId, existingInjuryId) {
  const status = document.getElementById('inj-status').value;
  const startDate = document.getElementById('inj-start').value || new Date().toISOString().split('T')[0];
  const endDate = document.getElementById('inj-end').value || null;
  const injuryType = document.getElementById('inj-type').value || null;
  const notes = document.getElementById('inj-notes').value.trim() || null;

  const record = { playerId, status, startDate, endDate, injuryType, notes };
  if (existingInjuryId) {
    record.injuryId = existingInjuryId;
    // Preserve the season this injury originally belonged to — editing it
    // later (e.g. marking recovered) should never move it to whichever
    // season happens to be active at the moment of the edit.
    const existing = await DB.get('injuries', existingInjuryId);
    record.seasonId = existing?.seasonId ?? State.currentSeasonId;
  } else {
    record.seasonId = State.currentSeasonId;
  }

  try {
    await DB.put('injuries', record);
    document.getElementById('injuryModalOverlay')?.remove();
    Toast.show(status === 'Injured' ? I18n.t('inj_marked_injured') : I18n.t('inj_marked_recovered'));
    await Render.squad(document.getElementById('squadSearch')?.value||'', document.getElementById('squadFilter')?.value||'');
  } catch(err) {
    Toast.error(I18n.t('gd_could_not_save', {msg: err.message}));
  }
}

function resetGameForm() {
  ['gf-time','gf-arrivalTime','gf-opp','gf-compName','gf-ground','gf-notes','gf-id'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('gf-venue').value='Home';
  document.getElementById('gf-compType').value='League';
  autoFillHomeGround();
}

// Auto-fill the Venue/Ground field from the season's Home Ground when Home is selected.
// Only overwrites if the ground field is currently empty, so manual edits are never lost.
// Always shows a visible hint explaining what happened, so this never fails silently.
function autoFillHomeGround() {
  const venueSel = document.getElementById('gf-venue');
  const groundEl = document.getElementById('gf-ground');
  const hint = document.getElementById('gf-ground-hint');
  if (!venueSel || !groundEl) return;

  if (venueSel.value !== 'Home') {
    if (hint) hint.style.display = 'none';
    return;
  }

  const homeGround = State.currentSeason?.homeGround;
  if (!homeGround) {
    if (hint) {
      hint.style.display = '';
      hint.innerHTML = I18n.t('games_no_home_ground_set');
    }
    return;
  }

  if (!groundEl.value.trim()) {
    groundEl.value = homeGround;
  }
  if (hint) {
    hint.style.display = '';
    hint.textContent = I18n.t('games_ground_autofilled', {ground: homeGround});
  }
}

async function saveGame() {
  const opp = document.getElementById('gf-opp').value.trim();
  const date = document.getElementById('gf-date').value;
  const gameTime = document.getElementById('gf-time')?.value || null;
  const manualArrival = document.getElementById('gf-arrivalTime')?.value || null;
  const arrivalTime = manualArrival || (gameTime ? Calc.arrivalTime(gameTime, document.getElementById('gf-venue').value) : null);
  if (!opp) { Toast.error(I18n.t('game_err_opponent')); return; }
  if (!date) { Toast.error(I18n.t('game_err_date')); return; }
  if (!State.currentSeasonId) { Toast.error(I18n.t('pf_err_no_season')); return; }

  const existingId = document.getElementById('gf-id').value;
  let game = {
    seasonId: State.currentSeasonId,
    date,
    gameTime: gameTime || null,
    arrivalTime: arrivalTime || null,
    opponent: opp,
    homeAway: document.getElementById('gf-venue').value,
    competitionType: document.getElementById('gf-compType').value,
    competitionName: document.getElementById('gf-compName').value.trim()||null,
    venue: document.getElementById('gf-ground').value.trim()||null,
    teamNotes: document.getElementById('gf-notes').value.trim()||null,
    createdAt: new Date().toISOString(),
  };
  if (existingId) {
    game.gameId = parseInt(existingId);
    // Preserve the opponent score already recorded via the Goals tab —
    // this form no longer has an Opponent Score field, so never reset it.
    const existingGame = await DB.get('games', game.gameId);
    game.opponentScore = existingGame ? (existingGame.opponentScore||0) : 0;
  } else {
    game.opponentScore = 0;
  }
  await Backup.create('before-save');
  await DB.put('games', game);
  Toast.show(existingId ? I18n.t('game_updated') : I18n.t('game_added'));
  document.getElementById('addGamePanel').classList.add('panel-hidden');
  resetGameForm();
  await Render.gamesList();
}

// ── SIMPLE GAME TABLE HANDLERS — every change re-renders the whole table ────
// ── ONE SIMPLE TABLE — Called Up / Starter-Sub / Goals / Assists ────────────
// No tabs. No multi-step flow. Everything visible at once. Re-renders the
// whole table after every change so the UI can never go stale.
// ── DEBUG LOG ─────────────────────────────────────────────────────────────────
// ── GLOBAL DEBUG MODE ─────────────────────────────────────────────────────────
// Toggled from Admin. When ON, a floating log panel appears on EVERY page,
// not just Game Detail. Persisted in appMeta so it survives reloads until
// explicitly turned off.
let _debugLines = [];
let _debugModeCache = null;

async function isDebugModeOn() {
  if (_debugModeCache !== null) return _debugModeCache;
  const meta = await DB.get('appMeta', 'debugMode');
  _debugModeCache = !!(meta && meta.value);
  return _debugModeCache;
}

async function setDebugMode(on) {
  await DB.put('appMeta', { metaKey: 'debugMode', value: on });
  _debugModeCache = on;
  if (on) ensureDebugPanel(); else removeDebugPanel();
}

function ensureDebugPanel() {
  if (document.getElementById('globalDebugPanel')) return;
  const panel = document.createElement('div');
  panel.id = 'globalDebugPanel';
  panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;max-height:160px;overflow-y:auto;background:#111;color:#0f0;font-family:monospace;font-size:10px;padding:8px 10px;white-space:pre-wrap;line-height:1.5;z-index:9999;border-top:2px solid #0f0';
  panel.textContent = I18n.t('dbg_panel_waiting');
  document.body.appendChild(panel);
}

function removeDebugPanel() {
  document.getElementById('globalDebugPanel')?.remove();
}

function gdDebugLog(msg) {
  const ts = new Date().toLocaleTimeString();
  _debugLines.unshift(`[${ts}] ${msg}`);
  if (_debugLines.length > 20) _debugLines = _debugLines.slice(0, 20);
  console.log('[DEBUG]', msg);
  if (_debugModeCache !== true) return; // debug mode off — skip DOM writes
  ensureDebugPanel();
  const panel = document.getElementById('globalDebugPanel');
  if (panel) panel.textContent = _debugLines.join('\n');
  // Also update the old in-page panel if present (Game Detail still has one)
  const oldPanel = document.getElementById('gdDebugPanel');
  if (oldPanel) oldPanel.textContent = _debugLines.slice(0,8).join('\n');
}

async function getOrCreateGP(gameId, playerId) {
  const all = await DB.getAll('gamePlayers','gameId',gameId);
  let gp = all.find(r => r.playerId === playerId);
  if (!gp) {
    gp = {
      gameId, playerId, seasonId: State.currentSeasonId,
      calledUp: false, role: 'Sub', playedFullGame: false,
      positionPlayed: null, goals: 0, assists: 0,
      yellowCards: 0, redCards: 0, playerOfTheMatch: false, captain: false,
      performanceNotes: null,
    };
  }
  return gp;
}

function countStarters(allGP, excludePlayerId) {
  return allGP.filter(r => r.role === 'Starter' && r.calledUp && r.playerId !== excludePlayerId).length;
}

async function switchSimpleTab(gameId, tab) {
  gdDebugLog(`switchSimpleTab -> ${tab}`);
  State.gameDetailTab = tab;
  try { sessionStorage.setItem('squadTracker_gameDetailTab', tab); } catch(e) {}
  ['squad','xi','goals'].forEach(t => {
    const panel = document.getElementById(`gdPanel-${t}`);
    const btn   = document.getElementById(`gdtab-${t}`);
    if (panel) panel.style.display = t === tab ? '' : 'none';
    if (btn)   btn.classList.toggle('active-tab', t === tab);
  });
  if (tab === 'squad') await renderSquadListTab(gameId);
  if (tab === 'xi')    await renderStartingXITab(gameId);
  if (tab === 'goals') await renderSimpleGoalsTab(gameId);
}

// ── TAB 1 — SQUAD LIST ───────────────────────────────────────────────────────
async function renderSquadListTab(gameId) {
  const el = document.getElementById('gdPanel-squad');
  gdDebugLog(`renderSquadListTab START, el found=${!!el}`);
  if (!el) { gdDebugLog('ABORTED: #gdPanel-squad not found'); return; }
  try {
    if (!window._gdPlayers || !window._gdPlayers.length) {
      window._gdPlayers = (await DB.getAll('players','seasonId', State.currentSeasonId)).filter(p=>p.isActive).sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99));
    }
    const players = window._gdPlayers;
    const existingGP = await DB.getAll('gamePlayers','gameId',gameId);
    const calledUpCount = existingGP.filter(r=>r.calledUp).length;
    gdDebugLog(`squad tab: ${players.length} players, ${calledUpCount} called up`);

    // Find most recent previous game (by date, before this game's date) to offer copy
    const thisGame = await DB.get('games', gameId);
    const allGames = (await DB.getAll('games','seasonId', State.currentSeasonId))
      .filter(g => g.gameId !== gameId && g.date && (!thisGame?.date || g.date <= thisGame.date))
      .sort((a,b) => new Date(b.date) - new Date(a.date));
    const prevGame = allGames[0] || null;

    el.innerHTML = `
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">${I18n.t('gd_squad_hint')}</p>
      ${(prevGame && calledUpCount===0) ? `<button class="btn btn-secondary btn-sm" style="margin-bottom:10px" onclick="copySquadFromPreviousGame(${gameId},${prevGame.gameId})">&#128203; ${I18n.t('gd_btn_copy_squad',{opponent:esc(prevGame.opponent),date:fmtDate(prevGame.date)})}</button>` : ''}
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">${I18n.t('gd_squad_in_squad')} <strong style="color:var(--dark)" id="gdSquadCount">${calledUpCount}</strong> / ${players.length}</div>
      <div class="who-played-list">
        ${players.map(p => {
          const gp = existingGP.find(r=>r.playerId===p.playerId) || {};
          const calledUp = !!gp.calledUp;
          return `<div class="wp-row ${calledUp?'wp-active':''}" id="sql-${p.playerId}" onclick="simpleToggleSquad(${gameId},${p.playerId})">
            <div class="wp-info">
              <span class="wp-num">${p.shirtNumber||'—'}</span>
              <span class="wp-name" title="${esc(p.fullName)}">${esc(shortName(p.fullName))} ${p.trackingStatus==='tracked'?`<span class="badge badge-lor">${esc(p.trackingLabel||'★')}</span>`:''}</span>
              ${calledUp&&p.primaryPosition?`<span class="pos-pill" style="margin-left:auto;font-size:8px;padding:1px 5px">${esc(p.primaryPosition)}</span>`:''}
              ${calledUp?'<span style="margin-left:6px;color:#2a7a3b;font-size:16px">&#10003;</span>':''}
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
    gdDebugLog(`squad tab: innerHTML written, ${el.querySelectorAll('.wp-row').length} rows`);
  } catch(err) {
    gdDebugLog(`SQUAD TAB ERROR: ${err.message}`);
    el.innerHTML = `<div class="empty"><strong>Display error</strong><p style="color:#b03030;font-family:monospace;font-size:11px;white-space:pre-wrap">${esc(err.message)}</p></div>`;
  }
}

async function copySquadFromPreviousGame(gameId, prevGameId) {
  Confirm.show(I18n.t('gd_copy_confirm_title'), I18n.t('gd_copy_confirm_body'), async () => {
    try {
      const prevGP = await DB.getAll('gamePlayers','gameId', prevGameId);
      const calledUpPrev = prevGP.filter(r => r.calledUp);
      for (const prev of calledUpPrev) {
        const gp = await getOrCreateGP(gameId, prev.playerId);
        gp.calledUp = true;
        gp.role = prev.role || 'Sub';
        gp.playedFullGame = (gp.role === 'Starter');
        await DB.put('gamePlayers', gp);
      }
      Toast.show(I18n.t('gd_copy_done', {n: calledUpPrev.length}));
      await renderSquadListTab(gameId);
      await refreshGameHeaderScore(gameId);
    } catch(err) {
      Toast.error(I18n.t('gd_copy_error', {msg: err.message}));
    }
  });
}

async function simpleToggleSquad(gameId, playerId) {
  gdDebugLog(`CLICK squad row player=${playerId}`);
  try {
    const gp = await getOrCreateGP(gameId, playerId);
    gp.calledUp = !gp.calledUp;
    if (!gp.calledUp) { gp.role = 'Sub'; gp.playedFullGame = false; }
    const key = await DB.put('gamePlayers', gp);
    gdDebugLog(`DB.put OK key=${key} calledUp now=${gp.calledUp}`);
  } catch(err) {
    gdDebugLog(`ERROR: ${err.message}`);
    Toast.error(I18n.t('gd_could_not_save', {msg: err.message}));
  } finally {
    gdDebugLog('re-rendering squad tab...');
    await renderSquadListTab(gameId);
    await refreshGameHeaderScore(gameId);
    gdDebugLog('squad tab re-render complete');
  }
}

// ── TAB 2 — STARTING XI ──────────────────────────────────────────────────────
async function renderStartingXITab(gameId) {

  gdDebugLog(`renderStartingXITab START, el found=${!!el}`);
  if (!el) { gdDebugLog('ABORTED: #gdPanel-xi not found'); return; }

    const allPlayers = window._gdPlayers || [];
    const existingGP = await DB.getAll('gamePlayers','gameId',gameId);

      const gp = existingGP.find(r=>r.playerId===p.playerId);
      return gp && gp.calledUp;
    });

    if (!squad.length) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('gd_xi_no_squad_title')}</strong><p>${I18n.t('gd_xi_no_squad_desc')}</p><button class="btn btn-primary" onclick="switchSimpleTab(${gameId},'squad')">${I18n.t('gd_btn_go_to_squad')}</button></div>`;
      return;
    }

    const starterCount = existingGP.filter(r=>r.calledUp && r.role==='Starter').length;

    el.innerHTML = `
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px">${I18n.t('gd_xi_hint')}</p>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">${I18n.t('gd_xi_starters')} <strong style="color:var(--dark)" id="gdStarterCount">${starterCount}</strong> / 11</div>
      <div class="who-played-list">
        ${squad.map(p => {
          const gp = existingGP.find(r=>r.playerId===p.playerId) || {};
          const isStarter = gp.role === 'Starter';
          return `<div class="wp-row ${isStarter?'wp-active':''}" id="xi-${p.playerId}" onclick="simpleToggleStarter(${gameId},${p.playerId})">
            <div class="wp-info">
              <span class="wp-num">${p.shirtNumber||'—'}</span>

              ${p.primaryPosition?`<span class="pos-pill" style="margin-left:auto;font-size:8px;padding:1px 5px">${esc(p.primaryPosition)}</span>`:''}
              <span class="wp-role-pill ${isStarter?'wp-role-starter':'wp-role-sub'}" style="margin-left:${p.primaryPosition?'6px':'auto'}">${isStarter?I18n.t('gd_role_starter'):I18n.t('gd_role_sub')}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
    gdDebugLog(`xi tab: innerHTML written, ${el.querySelectorAll('.wp-row').length} rows`);
  } catch(err) {
    gdDebugLog(`XI TAB ERROR: ${err.message}`);
    el.innerHTML = `<div class="empty"><strong>Display error</strong><p style="color:#b03030;font-family:monospace;font-size:11px;white-space:pre-wrap">${esc(err.message)}</p></div>`;
  }
}

async function simpleToggleStarter(gameId, playerId) {
  gdDebugLog(`CLICK xi row player=${playerId}`);
  try {
    const allGP = await DB.getAll('gamePlayers','gameId',gameId);
    const gp = await getOrCreateGP(gameId, playerId);
    if (!gp.calledUp) { gdDebugLog('skipped: not in squad'); return; }

    if (gp.role === 'Starter') {
      gp.role = 'Sub';
      gp.playedFullGame = false;
    } else {
      const starterCount = countStarters(allGP, playerId);
      if (starterCount >= 11) {
        gdDebugLog('REJECTED: 11 starters already');
        Toast.error(I18n.t('gd_max_starters_error'));
        return;
      }
      gp.role = 'Starter';
      gp.playedFullGame = true;
    }
    const key = await DB.put('gamePlayers', gp);
    gdDebugLog(`DB.put OK key=${key} role now=${gp.role}`);
  } catch(err) {
    gdDebugLog(`ERROR: ${err.message}`);
    Toast.error(I18n.t('gd_could_not_save', {msg: err.message}));
  } finally {
    gdDebugLog('re-rendering xi tab...');
    await renderStartingXITab(gameId);
    gdDebugLog('xi tab re-render complete');
  }
}

    const game = await DB.get('games', gameId);
    const allPlayers = window._gdPlayers || [];
    const existingGP = await DB.getAll('gamePlayers','gameId',gameId);
    const squad = allPlayers.filter(p => {
      const gp = existingGP.find(r=>r.playerId===p.playerId);
      return gp && gp.calledUp;
    });
    gdDebugLog(`goals tab: squad size=${squad.length}`);

    const oppScoreField = `
      <div class="card" style="margin-bottom:14px;padding:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div>
            <div style="font-weight:700;font-size:13px">${esc(game?.opponent||I18n.t('games_lbl_opponent'))}</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">${I18n.t('gd_their_score')}</div>
          </div>
          <input type="number" min="0" max="30" value="${game?.opponentScore||0}" style="width:64px;font-size:18px;font-weight:700;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px" onchange="simpleSetOpponentScore(${gameId},this.value)">
        </div>
      </div>`;

    if (!squad.length) {
      el.innerHTML = oppScoreField + `<div class="empty"><strong>${I18n.t('gd_xi_no_squad_title')}</strong><p>${I18n.t('gd_goals_no_squad_desc')}</p><button class="btn btn-primary" onclick="switchSimpleTab(${gameId},'squad')">${I18n.t('gd_btn_go_to_squad')}</button></div>`;
      return;
    }

    el.innerHTML = `
      ${oppScoreField}
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px">${I18n.t('gd_goals_hint')}</p>
      <div class="goals-list">
        ${squad.map(p => {
          const gp = existingGP.find(r=>r.playerId===p.playerId) || {};
          return `<div class="goal-row" id="gl-${p.playerId}">
            <div class="goal-info">
              <span class="wp-num">${p.shirtNumber||'—'}</span>
              <span class="wp-name" title="${esc(p.fullName)}">${esc(shortName(p.fullName))}</span>
            </div>
            <div class="wp-stats-row" style="padding:0">
              <div class="wp-stat-field">
                <label>${I18n.t('gd_lbl_goals')}</label>
                <input type="number" min="0" max="20" value="${gp.goals||0}" onchange="simpleSetField(${gameId},${p.playerId},'goals',this.value)">
              </div>
              <div class="wp-stat-field">
                <label>${I18n.t('gd_lbl_assists')}</label>
                <input type="number" min="0" max="20" value="${gp.assists||0}" onchange="simpleSetField(${gameId},${p.playerId},'assists',this.value)">
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
    gdDebugLog(`goals tab: innerHTML written, ${el.querySelectorAll('.goal-row').length} rows`);
  } catch(err) {
    gdDebugLog(`GOALS TAB ERROR: ${err.message}`);
    el.innerHTML = `<div class="empty"><strong>Display error</strong><p style="color:#b03030;font-family:monospace;font-size:11px;white-space:pre-wrap">${esc(err.message)}</p></div>`;
  }
}

async function simpleSetField(gameId, playerId, field, value) {
  gdDebugLog(`CHANGE ${field} player=${playerId} value=${value}`);
  try {
    const gp = await getOrCreateGP(gameId, playerId);
    gp[field] = parseInt(value) || 0;
    const key = await DB.put('gamePlayers', gp);
    gdDebugLog(`DB.put OK key=${key} ${field} now=${gp[field]}`);
    await refreshGameHeaderScore(gameId);
  } catch(err) {
    gdDebugLog(`ERROR: ${err.message}`);
    Toast.error(I18n.t('gd_could_not_save', {msg: err.message}));
  }
}

async function simpleSetOpponentScore(gameId, value) {
  gdDebugLog(`CHANGE opponentScore value=${value}`);
  try {
    const game = await DB.get('games', gameId);
    if (!game) return;
    game.opponentScore = parseInt(value) || 0;
    const key = await DB.put('games', game);
    gdDebugLog(`DB.put OK key=${key} opponentScore now=${game.opponentScore}`);
    await refreshGameHeaderScore(gameId);
  } catch(err) {
    gdDebugLog(`ERROR: ${err.message}`);
    Toast.error(I18n.t('gd_could_not_save', {msg: err.message}));
  }
}

async function refreshGameHeaderScore(gameId) {
  const existingGP = await DB.getAll('gamePlayers','gameId',gameId);
  const game = await DB.get('games', gameId);
  if (!game) return;
  const ourScore = Calc.teamGoals(existingGP);
  const theirScore = parseInt(game.opponentScore)||0;
  const res = Calc.result(ourScore, theirScore);
  const s = Calc.homeAwayScore(game.homeAway, ourScore, theirScore);
  const scoreEl = document.getElementById('liveScore');
  const resultEl = document.getElementById('liveResult');
  if (scoreEl) scoreEl.textContent = `${s.home} — ${s.away}`;
  if (resultEl) { resultEl.textContent = res; resultEl.className = `badge badge-${res}`; }
}

document.addEventListener('click', async e => {

    // Update all nav link labels and rebuild tracked-player tab bars

    // applyStaticTranslations only covers elements already in the DOM).
    applyNavLabels();

    await buildTrackedNav();

  if (t.id==='btnCreateSeason') {

      createdAt: new Date().toISOString(),
    };
    await Backup.create('before-save');
    const id = await DB.put('seasons', season);
    await DB.put('appMeta', { metaKey:'currentSeason', value: id });
    await loadMeta();
    Toast.show(I18n.t('set_season_created', {name}));
    await buildTrackedNav();
    await Render.settings();
  }

  if (t.id==='btnSaveOpponent') {
    await saveOpponentFromForm();
  }

  if (t.id==='btnSaveSeasonEdit') {
    if (!State.currentSeasonId) { Toast.error(I18n.t('set_err_no_active_season')); return; }
    const editShirtInput = document.getElementById('sf-edit-shirtcolor');

      clubName:   document.getElementById('sf-edit-club')?.value.trim()||null,

    await DB.put('seasons', updated);
    await loadMeta();
    Toast.show(I18n.t('set_season_updated'));
    await Render.settings();

    Toast.show(I18n.t('set_season_switched'));
    await Nav.go('home');
  }

  if (t.id==='btnClearSeason') {
    if (!State.currentSeasonId) { Toast.error(I18n.t('set_err_no_active_season')); return; }
    Confirm.show(I18n.t('set_confirm_clear_season_title'), I18n.t('set_confirm_clear_season_body'), async () => {

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    await DB.open();

    // ── Verify schema upgrade actually completed ──────────────────────────────
    // If a store is missing, the IndexedDB upgrade didn't run (version mismatch
    // or interrupted upgrade). Force a clean reopen rather than running silently
    // broken for the rest of the session.
    const requiredStores = ['appMeta','seasons','players','games','gamePlayers','goalEvents','events','playerGameStats','achievements','clubHistory','injuries','opponents','trainingSessions','customDrills','drillFavourites','trainingPacks'];
    const missing = requiredStores.filter(s => !DB.hasStore(s));
    if (missing.length) {
      console.error('[init] Missing IndexedDB stores after open:', missing);
      document.getElementById('loading').innerHTML = `
        <div style="text-align:center;padding:24px;max-width:340px">
          <p style="color:#b03030;font-weight:700;margin-bottom:10px">Database needs an update</p>
          <p style="font-size:12px;color:#666;margin-bottom:16px">A new version added features that need a one-time database upgrade. Missing: ${missing.join(', ')}</p>
          <button class="btn btn-primary" onclick="location.reload(true)">Reload App</button>
        </div>`;
      return;
    }

    await loadMeta();
    await Sync.loadConfig();
    await Auth.loadSession();

    // ── PLAYER PORTAL SESSION CHECK ──────────────────────────────────────────
    // A player who logged in with their PIN stays logged in across a refresh
    // too, exactly like the guardian's session — checked first since a
    // device showing the player portal should never silently drop back to
    // the guardian gate just because the page reloaded.
    const portalMeta = await DB.get('appMeta', 'portalPlayerId');
    if (portalMeta && portalMeta.value) {
      const portalPlayer = await DB.get('players', portalMeta.value);
      if (portalPlayer) {
        State.portalPlayerId = portalPlayer.playerId;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('playerPortal').style.display = 'flex';
        document.getElementById('playerPortalName').textContent = shortName(portalPlayer.fullName);
        const portalInfoEl2 = document.getElementById('portalMobileAccountInfo');
        if (portalInfoEl2) portalInfoEl2.textContent = I18n.t('acc_logged_in_as') + ': ' + shortName(portalPlayer.fullName);
        setupPlayerPortalNav();
        let restoredPortalSection = 'home';
        try {
          const savedPortalSection = sessionStorage.getItem('squadTracker_lastPortalSection');
          if (savedPortalSection && document.getElementById(`pp-sec-${savedPortalSection}`)) {
            restoredPortalSection = savedPortalSection;
          }
        } catch(e) {}
        await Nav.goPortal(restoredPortalSection);
        return; // stop here — never fall through to the guardian gate or app
      } else {
        // The player record this PIN pointed to no longer exists — clear
        // the stale session rather than getting stuck.
        await DB.del('appMeta', 'portalPlayerId').catch(()=>{});
      }
    }

    // ── AUTH GATE ──────────────────────────────────────────────────────────
    // No saved session at all means this device/browser has never logged in
    // successfully — show the login/signup screen instead of any app data.
    // Once logged in here (requires internet, just this first time), the
    // session is saved locally and every later visit skips straight past
    // this gate, online or offline, until the person explicitly logs out.
    if (!Auth.isLoggedIn()) {
      document.getElementById('loading').style.display = 'none';
      renderAuthGate();
      document.getElementById('authGate').style.display = 'flex';
      return; // stop here — do not load or show any app data
    }

    await continueAppLoadAfterLogin();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p style="color:red;padding:20px">Error loading app: ${e.message}</p>`;
    console.error(e);
  }
}

// Everything that happens once we know someone is logged in — runs either
// from a normal app load (already had a saved session) or right after a
// fresh login/signup from the auth gate, so both paths land in exactly the
// same place with no duplicated logic.
async function continueAppLoadAfterLogin() {
  try {
    // One-time migration: stamp seasonId onto any injury records saved before
    // injuries were season-tracked, using the current season as a reasonable
    // assumption since they were created while it was active.
    const injuryMigrationDone = await DB.get('appMeta', 'injurySeasonMigrationDone');
    if (!injuryMigrationDone && State.currentSeasonId) {
      try {
        const allInjuries = await DB.getAll('injuries');
        const toFix = allInjuries.filter(i => !i.seasonId);
        for (const inj of toFix) {
          inj.seasonId = State.currentSeasonId;
          await DB.put('injuries', inj);
        }
        await _origPut('appMeta', { metaKey: 'injurySeasonMigrationDone', value: true });
      } catch(e) { console.error('[init] injury season migration failed:', e); }
    }

    // Seed the opponents catalogue once, only if it's genuinely empty —
    // never overwrites or duplicates anything the user has already added.
    try { await seedOpponentsIfEmpty(); } catch(e) { console.error('[init] opponent seed failed:', e); }

    // Backup at most once per 24 hours
    const lastBackupMeta = await DB.get('appMeta', 'lastAutoBackupAt');
    const lastAutoBackup = lastBackupMeta ? new Date(lastBackupMeta.value) : null;
    const now = new Date();
    const hoursSinceBackup = lastAutoBackup ? (now - lastAutoBackup) / 36e5 : 999;
    if (hoursSinceBackup >= 24) {
      await Backup.create('auto-daily');
      await _origPut('appMeta', { metaKey: 'lastAutoBackupAt', value: now.toISOString() });
    }

    attachEvents();
    await buildTrackedNav();
    await initAdmin();
    if (await isDebugModeOn()) { ensureDebugPanel(); gdDebugLog('App loaded — debug mode active'); }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    updateNavAccountIndicator();

    // ── Restore last visited page after refresh ──────────────────────────────
    let restoredSection = 'home';
    try {
      const saved = sessionStorage.getItem('squadTracker_lastSection');
      // Only restore if the section element actually exists in the DOM
      if (saved && document.getElementById(`sec-${saved}`)) {
        restoredSection = saved;
      }
    } catch(e) {}

    await Nav.go(restoredSection);

    // Restore sub-tab state for Settings or Tracked Player pages
    try {
      if (restoredSection === 'settings') {
        const savedTab = sessionStorage.getItem('squadTracker_settingsTab');
        if (savedTab) {
          switchSettingsTab(savedTab);
          if (savedTab === 'import') {
            const savedImportTab = sessionStorage.getItem('squadTracker_importTab');
            if (savedImportTab) switchImportTab(savedImportTab);
          }
        }
      } else if (restoredSection.startsWith('tracked-')) {
        const pid = parseInt(restoredSection.replace('tracked-',''));
        const savedTab = sessionStorage.getItem('squadTracker_trackedTab');
        if (savedTab) switchTrackedTab(pid, savedTab);
      } else if (restoredSection === 'games') {
        // If a specific game was open, reopen it directly instead of the list
        const savedGameId = sessionStorage.getItem('squadTracker_openGameId');
        if (savedGameId) {
          const gameExists = await DB.get('games', parseInt(savedGameId));
          if (gameExists) await openGameDetail(parseInt(savedGameId));
        }
      }
    } catch(e) {}

    // Sync immediately on open if configured, logged in, and online
    if (Sync.isConfigured() && Auth.isLoggedIn() && navigator.onLine) {
      await Sync.run(true);
      // Refresh current section to show updated sync status
      if (Nav.current() === 'home') await Render.home();
      if (Nav.current() === 'dashboard') await Render.dashboard();
    }
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p style="color:red;padding:20px">Error loading app: ${e.message}</p>`;
    console.error(e);
  }
}

// ── LIVE RESULT VISIBILITY REFRESH ───────────────────────────────────────────
// isGameResultVisible() is a pure calculation re-evaluated on every render —
// it does not update itself while a page is just sitting open. If you load
// Home while a game is still in progress and then never navigate away, the
// page keeps showing "in progress" even after the cutoff passes, because
// nothing re-renders it. This timer re-renders Home/Dashboard/Team Summary
// every 2 minutes if one of them is the currently open page, so a finished
// game's result and season totals update on their own without needing to
// leave and come back.
setInterval(() => {
  if (!Auth.isLoggedIn()) return;
  const current = Nav.current();
  if (current === 'home') Render.home();
  if (current === 'dashboard') Render.dashboard();
  if (current === 'teamSummary') Render.teamSummary();
  // Player portal — same staleness risk applies there too.
  if (State.portalPlayerId && document.getElementById('playerPortal')?.style.display !== 'none') {
    if (State.currentPortalSection === 'home') renderPlayerPortalHome();

let _sheetjsLoaded = false;
let _importTab = 'players';
let _previewData = [];

const PLAYER_HEADERS = ['Full Name','Shirt Number','Date of Birth','Nationality','Primary Position','Secondary Position','Dominant Foot','Height (cm)','Weight (kg)','Development Notes'];
const GAME_HEADERS = ['Date','Opponent','Home/Away','Competition Type','Competition Name','Venue','Opponent Score','Team Notes'];

async function loadSheetJS() {
  if (_sheetjsLoaded || window.XLSX) { _sheetjsLoaded = true; return Promise.resolve(); }
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => { _sheetjsLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Could not load Excel library. Check internet connection.'));
    document.head.appendChild(s);
  });
}

function downloadImportTemplate(type, format) {
  const headers = type === 'players' ? PLAYER_HEADERS : GAME_HEADERS;
  const example = type === 'players'
    ? [['Jo\u00e3o Silva','10','2013-05-14','Portuguese','Left Winger','Right Winger','Right','145','38','Good dribbler']]
    : [['2025-09-14','Sporting CP B','Home','League','Liga Revela\u00e7\u00e3o','Est\u00e1dio Municipal','1','Good performance']];
  if (format === 'csv') {
    const rows = [headers, ...example].map(r => r.map(c => `"${c}"`).join(',')).join('\r\n');
    const blob = new Blob([rows], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${type}-template.csv`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  } else {
    loadSheetJS().then(() => {
      const wb = window.XLSX.utils.book_new();
      const ws = window.XLSX.utils.aoa_to_sheet([headers, ...example]);
      window.XLSX.utils.book_append_sheet(wb, ws, type === 'players' ? 'Players' : 'Games');
      window.XLSX.writeFile(wb, `${type}-template.xlsx`);
    }).catch(e => Toast.show(e.message, true));
  }
}

function parseCSVImport(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim(); });
    return obj;
  });
}

async function parseImportFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const text = await file.text();
    return parseCSVImport(text);
  } else if (ext === 'xlsx' || ext === 'xls') {
    await loadSheetJS();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = window.XLSX.read(e.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          resolve(window.XLSX.utils.sheet_to_json(ws, { defval: '' }));
        } catch(err) { reject(new Error(I18n.t('import_invalid_file'))); }
      };
      reader.onerror = () => reject(new Error(I18n.t('import_invalid_file')));
      reader.readAsBinaryString(file);
    });
  } else {
    throw new Error(I18n.t('import_invalid_file'));
  }
}

async function validateImportPlayers(rows) {
  if (!State.currentSeasonId) throw new Error(I18n.t('import_no_season'));
  const existing = await DB.getAll('players', 'seasonId', State.currentSeasonId);
  return rows.map((row, i) => {
    const name = (row['Full Name'] || '').trim();
    const dob = (row['Date of Birth'] || '').trim();
    const pos = (row['Primary Position'] || '').trim();
    let status = 'ok', reason = '';
    if (!name) {
      status = 'skip'; reason = I18n.t('import_missing_name');
    } else if (!pos) {
      status = 'skip'; reason = I18n.t('import_missing_pos');
    } else if (dob) {
      // Option 2: Name + DOB = unique key. If both match → skip as duplicate.
      const dup = existing.find(p =>
        p.fullName.trim().toLowerCase() === name.toLowerCase() &&
        p.dateOfBirth && p.dateOfBirth === dob
      );
      if (dup) { status = 'skip'; reason = I18n.t('import_dup_name_dob'); }
    } else {
      // No DOB: always import but flag for manual review
      status = 'warn'; reason = I18n.t('import_no_dob_flag');
    }
    return {
      rowNum: i + 2, status, reason,
      data: {
        fullName: name,
        shirtNumber: parseInt(row['Shirt Number']) || null,
        dateOfBirth: dob || null,
        nationality: (row['Nationality'] || '').trim() || null,
        primaryPosition: pos,
        secondaryPosition: (row['Secondary Position'] || '').trim() || null,
        dominantFoot: (row['Dominant Foot'] || 'Right').trim(),
        height: parseFloat(row['Height (cm)']) || null,
        weight: parseFloat(row['Weight (kg)']) || null,
        developmentNotes: (row['Development Notes'] || '').trim() || null,
        trackingStatus: null, trackingLabel: null, relationship: null, isActive: true, seasonId: State.currentSeasonId
      }
    };
  });
}

// NOTE: this definition is currently unreachable — a second function with

async function validateImportGames(rows) {
  if (!State.currentSeasonId) throw new Error(I18n.t('import_no_season'));
  const existing = await DB.getAll('games', 'seasonId', State.currentSeasonId);
  const VALID_HOME_AWAY_LEGACY = ['Home', 'Away', 'Neutral'];
  return rows.map((row, i) => {
    const date = (row['Date'] || '').trim();
    const opp = (row['Opponent'] || '').trim();
    let status = 'ok', reason = '';
    if (!date) {
      status = 'skip'; reason = I18n.t('import_missing_date');
    } else if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
      status = 'skip'; reason = I18n.t('import_invalid_date');
    } else if (!opp) {
      status = 'skip'; reason = I18n.t('import_missing_opp');
    } else {
      const dup = existing.find(g => g.date === date && g.opponent.toLowerCase() === opp.toLowerCase());
      if (dup) { status = 'skip'; reason = I18n.t('import_dup_game'); }
    }
    const haRawLegacy = (row['Home/Away'] || 'Home').trim();
    const haMatchLegacy = VALID_HOME_AWAY_LEGACY.find(v => v.toLowerCase() === haRawLegacy.toLowerCase());
    return {
      rowNum: i + 2, status, reason,
      data: {
        date, opponent: opp,
        homeAway: haMatchLegacy || 'Home',
        competitionType: (row['Competition Type'] || 'League').trim(),
        competitionName: (row['Competition Name'] || '').trim() || null,
        venue: (row['Venue'] || '').trim() || null,
        opponentScore: parseInt(row['Opponent Score']) || 0,
        teamNotes: (row['Team Notes'] || '').trim() || null,
        seasonId: State.currentSeasonId, createdAt: new Date().toISOString()
      }
    };
  });
}
