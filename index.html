// ── Render roadmap table ───────────────────────────────────────────────────────
async function renderRoadmapTable() {
  const el = document.getElementById('admin-panel-roadmap');

  // Read current filter values BEFORE showing the loading spinner —
  // the spinner replaces el.innerHTML, which destroys the filter <select>
  // elements, so reading them afterward always returns empty/undefined.
  const typeFilter   = document.getElementById('rm-filter-type')?.value   || '';
  const statusFilter = document.getElementById('rm-filter-status')?.value || '';
  const phaseFilter  = document.getElementById('rm-filter-phase')?.value  || '';
  const search       = document.getElementById('rm-search')?.value?.toLowerCase() || '';
  const searchRaw    = document.getElementById('rm-search')?.value || '';

  el.innerHTML = `<div class="empty"><div class="spinner"></div><p>${I18n.t('rm_loading')}</p></div>`;
  let items;
  try { items = await Roadmap.getAll(); }
  catch(e) { el.innerHTML = `<div class="empty"><strong>${I18n.t('rm_could_not_load')}</strong><p>${e.message}</p></div>`; return; }

  const phases = [...new Set(items.map(i=>i.phase))].sort((a,b)=>a-b);

  let filtered = items.filter(i => {
    if (typeFilter   && i.type !== typeFilter)     return false;
    if (statusFilter && i.status !== statusFilter) return false;
    if (phaseFilter  && String(i.phase) !== phaseFilter) return false;
    if (search && !i.title?.toLowerCase().includes(search) && !i.description?.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sorting
  const sortKey = el.dataset.sortKey || 'phase';
  const sortDir = el.dataset.sortDir || 'asc';
  const sortFns = {
    title:    (a,b) => (a.title||'').localeCompare(b.title||''),
    type:     (a,b) => (a.type||'').localeCompare(b.type||''),
    phase:    (a,b) => (a.phase||0) - (b.phase||0),
    version:  (a,b) => (a.version||'').localeCompare(b.version||''),
    priority: (a,b) => (a.priority||'').localeCompare(b.priority||''),
    status:   (a,b) => (a.status||'').localeCompare(b.status||''),
    test:     (a,b) => (a.test_status||'').localeCompare(b.test_status||''),
    target:   (a,b) => new Date(a.target_date||0) - new Date(b.target_date||0),
    visible:  (a,b) => (a.is_visible_to_users?1:0) - (b.is_visible_to_users?1:0),
  };
  filtered.sort((a,b) => {
    const fn = sortFns[sortKey] || sortFns.phase;
    return sortDir === 'asc' ? fn(a,b) : fn(b,a);
  });

  function thSort(key, label, extra='') {
    const active = sortKey === key;
    const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<th style="${extra}cursor:pointer;user-select:none" onclick="roadmapTableSort('${key}')">${label}${arrow}</th>`;
  }

  const typeLabel = {'Bug':I18n.t('rm_type_bug'),'Feature':I18n.t('rm_type_feature'),'Improvement':I18n.t('rm_type_improvement'),'Technical Debt':I18n.t('rm_type_techdebt'),'Security':I18n.t('rm_type_security'),'Release':I18n.t('rm_type_release')};
  const statusLabel = {'Backlog':I18n.t('rm_status_backlog'),'In Progress':I18n.t('rm_status_inprogress'),'Testing':I18n.t('rm_status_testing'),'Deployed':I18n.t('rm_status_deployed'),'Cancelled':I18n.t('rm_status_cancelled')};

  el.innerHTML = `
    <!-- Filters -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <input id="rm-search" type="text" placeholder="${I18n.t('rm_search_placeholder')}" value="${esc(searchRaw)}"
        style="flex:1;min-width:140px;border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:13px"
        oninput="renderRoadmapTable()">
      <select id="rm-filter-type" onchange="renderRoadmapTable()" style="border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:12px">
        <option value="">${I18n.t('rm_all_types')}</option>
        ${['Bug','Feature','Improvement','Technical Debt','Security','Release'].map(t=>`<option value="${t}"${typeFilter===t?' selected':''}>${typeLabel[t]}</option>`).join('')}
      </select>
      <select id="rm-filter-status" onchange="renderRoadmapTable()" style="border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:12px">
        <option value="">${I18n.t('rm_all_statuses')}</option>
        ${['Backlog','In Progress','Testing','Deployed','Cancelled'].map(s=>`<option value="${s}"${statusFilter===s?' selected':''}>${statusLabel[s]}</option>`).join('')}
      </select>
      <select id="rm-filter-phase" onchange="renderRoadmapTable()" style="border:1px solid #ddd;border-radius:3px;padding:7px 10px;font-size:12px">
        <option value="">${I18n.t('rm_all_phases')}</option>
        ${phases.map(p=>`<option value="${p}"${phaseFilter===String(p)?' selected':''}>${I18n.t('rm_phase_prefix')} ${p}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:#999">${filtered.length} / ${items.length} ${I18n.t('rm_items_suffix')}</span>
    </div>

    <!-- Table -->
    <div class="game-detail-table-wrap">
    <table class="game-detail-table" style="min-width:900px">
      <thead><tr>
        ${thSort('title',I18n.t('rm_col_title'),'min-width:220px;')}
        ${thSort('type',I18n.t('rm_col_type'))}
        ${thSort('phase',I18n.t('rm_col_phase'))}
        ${thSort('version',I18n.t('rm_col_version'))}
        ${thSort('priority',I18n.t('rm_col_priority'))}
        ${thSort('status',I18n.t('rm_col_status'))}
        ${thSort('test',I18n.t('rm_col_test'))}
        ${thSort('target',I18n.t('rm_col_target'))}
        ${thSort('visible',I18n.t('rm_col_visible'))}
        <th></th>
      </tr></thead>
      <tbody>
      ${filtered.length ? filtered.map(item => `
        <tr style="cursor:pointer" onclick="openRoadmapForm('${item.id}')">
          <td style="min-width:220px">
            <div style="font-weight:700;font-size:12px">${esc(item.title)}</div>
            ${item.description?`<div style="font-size:10px;color:#999;margin-top:2px">${esc(item.description.slice(0,80))}${item.description.length>80?'...':''}</div>`:''}
          </td>
          <td><span class="type-badge type-${(item.type||'').replace(' ','')}">${typeLabel[item.type]||item.type||'—'}</span></td>
          <td class="td-center">${item.phase}</td>
          <td style="font-size:11px;color:#666">${item.version||'—'}</td>
          <td class="td-center"><span class="priority-${item.priority}">${item.priority||'—'}</span></td>
          <td>${statusBadge(item.status)}</td>
          <td style="font-size:11px;color:#666">${item.test_status||'—'}</td>
          <td style="font-size:11px;color:#666">${item.target_date?fmtDate(item.target_date):'—'}</td>
          <td class="td-center">${item.is_visible_to_users?'&#10003;':''}</td>
          <td onclick="event.stopPropagation()">
            <div style="display:flex;gap:4px">
              <button class="btn btn-secondary btn-sm" onclick="openRoadmapForm('${item.id}')">${I18n.t('common_edit')}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteRoadmapItem('${item.id}')">${I18n.t('common_delete')}</button>
            </div>
          </td>
        </tr>`).join('') : `<tr><td colspan="10" style="text-align:center;color:#999;padding:32px">${I18n.t('rm_no_items_match')}</td></tr>`}
      </tbody>
    </table></div>`;
}

function roadmapTableSort(key) {
  const el = document.getElementById('admin-panel-roadmap');
  if (!el) return;
  const current = el.dataset.sortKey;
  const dir     = el.dataset.sortDir;
  el.dataset.sortKey = key;
  el.dataset.sortDir = (current === key && dir === 'asc') ? 'desc' : 'asc';
  renderRoadmapTable();
}

async function openRoadmapForm(id) {
  document.getElementById('rm-id').value = id || '';
  document.getElementById('rmFormTitle').textContent = id ? I18n.t('rm_form_edit_title') : I18n.t('rm_form_add_title');

  // Reset form
  ['rm-title','rm-desc','rm-version','rm-problem','rm-benefit','rm-release','rm-notes'].forEach(fid => {
    const el = document.getElementById(fid); if(el) el.value='';
  });
  document.getElementById('rm-type').value     = 'Feature';
  document.getElementById('rm-priority').value = 'P3';
  document.getElementById('rm-status').value   = 'Backlog';
  document.getElementById('rm-phase').value    = '1';
  document.getElementById('rm-testStatus').value = '';
  document.getElementById('rm-visible').value  = 'false';
  document.getElementById('rm-target').value   = '';

  if (id) {
    // Load existing item
    try {
      const items = await Roadmap.getAll();
      const item = items.find(i => i.id === id);
      if (item) {
        document.getElementById('rm-title').value    = item.title || '';
        document.getElementById('rm-desc').value     = item.description || '';
        document.getElementById('rm-type').value     = item.type || 'Feature';
        document.getElementById('rm-priority').value = item.priority || 'P3';
        document.getElementById('rm-status').value   = item.status || 'Backlog';
        document.getElementById('rm-phase').value    = String(item.phase || 1);
        document.getElementById('rm-version').value  = item.version || '';
        document.getElementById('rm-target').value   = item.target_date || '';
        document.getElementById('rm-testStatus').value = item.test_status || '';
        document.getElementById('rm-visible').value  = String(item.is_visible_to_users || false);
        document.getElementById('rm-problem').value  = item.user_problem || '';
        document.getElementById('rm-benefit').value  = item.expected_benefit || '';
        document.getElementById('rm-release').value  = item.release_note || '';
        document.getElementById('rm-notes').value    = item.internal_notes || '';
      }
    } catch(e) { Toast.error(I18n.t('rm_err_could_not_load_item', {msg: e.message})); return; }
  }

  document.getElementById('roadmapFormOverlay').classList.add('open');
}

function closeRoadmapForm() {
  document.getElementById('roadmapFormOverlay').classList.remove('open');
}

async function saveRoadmapItem() {
  const title = document.getElementById('rm-title').value.trim();
  if (!title) { Toast.error(I18n.t('rm_err_title_required')); return; }

  const id = document.getElementById('rm-id').value;
  const item = {
    title,
    description:        document.getElementById('rm-desc').value.trim() || null,
    type:               document.getElementById('rm-type').value,
    priority:           document.getElementById('rm-priority').value,
    status:             document.getElementById('rm-status').value,
    phase:              parseInt(document.getElementById('rm-phase').value) || 0,
    version:            document.getElementById('rm-version').value.trim() || null,
    target_date:        document.getElementById('rm-target').value || null,
    test_status:        document.getElementById('rm-testStatus').value || null,
    is_visible_to_users: document.getElementById('rm-visible').value === 'true',
    user_problem:       document.getElementById('rm-problem').value.trim() || null,
    expected_benefit:   document.getElementById('rm-benefit').value.trim() || null,
    release_note:       document.getElementById('rm-release').value.trim() || null,
    internal_notes:     document.getElementById('rm-notes').value.trim() || null,
  };
  if (id) item.id = id;

  try {
    await Roadmap.save(item);
    closeRoadmapForm();
    Toast.show(id ? I18n.t('rm_item_updated') : I18n.t('rm_item_added'));
    // Refresh current admin tab
    const kanbanVisible = document.getElementById('admin-panel-kanban').style.display !== 'none';
    if (kanbanVisible) renderKanban(); else renderRoadmapTable();
  } catch(e) { Toast.error(I18n.t('rm_err_save_failed', {msg: e.message})); }
}

async function deleteRoadmapItem(id) {
  Confirm.show(I18n.t('rm_confirm_delete_title'), I18n.t('rm_confirm_delete_body'), async () => {
    try {
      await Roadmap.remove(id);
      Toast.show(I18n.t('ch_deleted'));
      renderRoadmapTable();
    } catch(e) { Toast.error(I18n.t('rm_err_delete_failed', {msg: e.message})); }
  });
}

function updateDashSyncStatus() {
  const dot   = document.getElementById('dashSyncDot');
  const label = document.getElementById('dashSyncLabel');
  const time  = document.getElementById('dashSyncTime');
  if (!dot || !label) return;

  const s = Sync.getStatus();
  const colors  = { connected:'#2a7a3b', disconnected:'#ccc', error:'#b03030', syncing:'#1a56c4' };
  const labels  = { connected:'Synced', disconnected:'Not configured', error:'Sync error', syncing:'Syncing...' };

  dot.style.background = colors[s.status] || '#ccc';
  label.textContent    = labels[s.status]  || '—';

  if (s.lastSync) {
    const d = new Date(s.lastSync);
    time.textContent = 'Last sync: ' + d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  } else {
    time.textContent = s.configured ? 'Never synced' : '';
  }
}

    clubs:    `tracked-clubs-${playerId}`,
    ach:      `tracked-ach-${playerId}`,
    events:   `tracked-events-${playerId}`,
  };
  const btnMap = {
    overview: `tab-overview-${playerId}`,
    stats:    `tab-stats-${playerId}`,
    log:      `tab-log-${playerId}`,
    clubs:    `tab-clubs-${playerId}`,
    ach:      `tab-ach-${playerId}`,
    events:   `tab-events-${playerId}`,
  };
  Object.keys(tabMap).forEach(t => {
    const el  = document.getElementById(tabMap[t]);
    const btn = document.getElementById(btnMap[t]);
    if (el)  el.style.display  = t === tab ? '' : 'none';
    if (btn) btn.classList.toggle('active-tab', t === tab);
  });
  if (tab === 'stats')  renderExtendedStats(playerId);
  if (tab === 'log')    renderMatchLog(playerId);
  if (tab === 'clubs')  renderPlayerClubHistory(playerId);
  if (tab === 'ach')    renderPlayerAchievements(playerId);
  if (tab === 'events') renderPlayerEvents(playerId);
}

// ── FIELD VISIBILITY CONFIG ──────────────────────────────────────────────────
// Stored in appMeta as a single JSON object. Defaults to everything visible
// if no config exists, so nothing changes until the admin disables something.
let _fieldVisibilityCache = null;

async function getFieldVisibility() {
  if (_fieldVisibilityCache) return _fieldVisibilityCache;
  const meta = await DB.get('appMeta', 'fieldVisibility');
  const config = meta?.value || {};
  // Build defaults (true) for any field not explicitly set
  const defaults = {};
  EXT_STAT_FIELDS.forEach(section => section.fields.forEach(f => {
    defaults[f.key] = config.hasOwnProperty(f.key) ? config[f.key] : true;
  }));
  _fieldVisibilityCache = defaults;
  return defaults;
}

async function saveFieldVisibility(config) {
  await DB.put('appMeta', { metaKey: 'fieldVisibility', value: config });
  _fieldVisibilityCache = config;
}

function isFieldVisible(key) {
  if (!_fieldVisibilityCache) return true; // not loaded yet, fail open
  return _fieldVisibilityCache[key] !== false;
}

function isSectionFullyHidden(section) {
  if (!_fieldVisibilityCache) return false;
  return section.fields.every(f => _fieldVisibilityCache[f.key] === false);
}

async function renderFieldVisibilityTab() {
  const el = document.getElementById('admin-panel-fields');
  if (!el) return;
  await getFieldVisibility(); // ensure cache loaded

  el.innerHTML = `
    <div class="card" style="margin-bottom:14px">
      <p style="font-size:12px;color:var(--muted);margin-bottom:0">${I18n.t('fv_desc')}</p>
    </div>
    ${EXT_STAT_FIELDS.map(section => {
      const allOff = isSectionFullyHidden(section);
      return `
      <div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
          <div class="card-title" style="margin-bottom:0">${extSectionLabel(section)}</div>
          <button class="btn btn-secondary btn-sm" onclick="toggleEntireSection('${section.section}', ${!allOff})">${allOff ? I18n.t('fv_btn_show_all') : I18n.t('fv_btn_hide_all')}</button>
        </div>
        ${section.fields.map(f => `
          <div class="info-row">
            <span class="ir-label">${extFieldLabel(f)}</span>
            <label class="fv-switch">
              <input type="checkbox" ${isFieldVisible(f.key)?'checked':''} onchange="toggleFieldVisibility('${f.key}', this.checked)">
              <span class="fv-slider"></span>
            </label>
          </div>`).join('')}
      </div>`;
    }).join('')}
  `;
}

async function toggleFieldVisibility(key, visible) {
  const config = await getFieldVisibility();
  config[key] = visible;
  await saveFieldVisibility(config);
  Toast.show(visible ? I18n.t('fv_field_shown') : I18n.t('fv_field_hidden'));
  await renderFieldVisibilityTab();
}

async function toggleEntireSection(sectionName, makeVisible) {
  const section = EXT_STAT_FIELDS.find(s => s.section === sectionName);
  if (!section) return;
  const config = await getFieldVisibility();
  section.fields.forEach(f => { config[f.key] = makeVisible; });
  await saveFieldVisibility(config);
  Toast.show(makeVisible ? `${sectionName} shown.` : `${sectionName} hidden.`);
  await renderFieldVisibilityTab();
}

    </div>

    ${accuracyRows.length ? `
    <!-- Accuracy percentages -->
    <div class="card">
      <div class="card-title">${I18n.t('ext_accuracy_title')}</div>
      ${accuracyRows.map(([label, pctVal, made, total]) => `
        <div class="prog-wrap">
          <div class="prog-label">
            <span>${label}</span>

// ── EXTENDED STATS — LIVE AUTO-FILL LOGIC ────────────────────────────────────
// Cross is a type of pass: logging a cross adds the same amount onto the pass
// field, live, while typing. The pass field stays fully editable afterward —
// this is a starting suggestion, not a locked value.
// "Completed implies Attempted": if Won/Completed exceeds Attempted, bump
// Attempted up to match, for Tackles, Duels, and Dribbles.
// Shots Total is purely calculated (On Target + Off Target + Blocked) — no
// input field, no override needed, just a live running sum.
const EXT_STAT_CROSS_TO_PASS = { crossesAttempted: 'passesAttempted', crossesCompleted: 'passesCompleted' };
const EXT_STAT_COMPLETED_IMPLIES_ATTEMPTED = {
  tacklesWon: 'tacklesAttempted',
  duelsWon: 'duelsAttempted',
  dribblesCompleted: 'dribblesAttempted',
};

function getExtStatInputEl(playerId, gameId, key) {
  return document.getElementById(`ext-${playerId}-${gameId}-${key}`);
}

let _prevExtStatValues = {}; // tracks last value per field key so we add only the delta, not the full new value each keystroke

function handleExtStatInput(playerId, gameId, key, rawValue) {
  const value = parseInt(rawValue) || 0;
  const trackKey = `${playerId}-${gameId}-${key}`;
  const prevValue = _prevExtStatValues[trackKey] || 0;
  const delta = value - prevValue;
  _prevExtStatValues[trackKey] = value;

  // Rule 1: Cross -> Pass (add the delta, don't overwrite — respects manual pass edits)
  if (EXT_STAT_CROSS_TO_PASS[key] && delta !== 0) {
    const passKey = EXT_STAT_CROSS_TO_PASS[key];
    const passEl = getExtStatInputEl(playerId, gameId, passKey);
    if (passEl) {
      const newPassVal = Math.max(0, (parseInt(passEl.value)||0) + delta);
      passEl.value = newPassVal;
      _prevExtStatValues[`${playerId}-${gameId}-${passKey}`] = newPassVal;
    }
  }

  // Rule 2: Completed/Won implies Attempted — bump up if needed, never down
  if (EXT_STAT_COMPLETED_IMPLIES_ATTEMPTED[key]) {
    const attemptedKey = EXT_STAT_COMPLETED_IMPLIES_ATTEMPTED[key];
    const attemptedEl = getExtStatInputEl(playerId, gameId, attemptedKey);
    if (attemptedEl) {
      const attemptedVal = parseInt(attemptedEl.value)||0;
      if (value > attemptedVal) {
        attemptedEl.value = value;
        _prevExtStatValues[`${playerId}-${gameId}-${attemptedKey}`] = value;
      }
    }
  }

  // Shots Total — pure live sum, always recalculated, never stored as input
  if (['shotsOnTarget','shotsOffTarget','shotsBlocked'].includes(key)) {
    const onT = parseInt(getExtStatInputEl(playerId,gameId,'shotsOnTarget')?.value)||0;
    const offT = parseInt(getExtStatInputEl(playerId,gameId,'shotsOffTarget')?.value)||0;
    const blocked = parseInt(getExtStatInputEl(playerId,gameId,'shotsBlocked')?.value)||0;
    const totalEl = document.getElementById(`ext-${playerId}-${gameId}-shotsTotal`);
    if (totalEl) totalEl.textContent = onT + offT + blocked;
  }
}

function toggleExtStatForm(playerId, gameId) {
  const el = document.getElementById(`ext-form-${playerId}-${gameId}`);
  if (!el) return;
  const opening = el.style.display === 'none';
  el.style.display = opening ? '' : 'none';
  if (opening) {
    // Seed delta-tracking with whatever values are already in the inputs,
    // so the first edit after opening calculates a correct delta instead
    // of treating the existing saved value as a jump from zero.
    const allFields = EXT_STAT_FIELDS.flatMap(s => s.fields);
    allFields.forEach(f => {
      const input = getExtStatInputEl(playerId, gameId, f.key);
      if (input) _prevExtStatValues[`${playerId}-${gameId}-${f.key}`] = parseInt(input.value)||0;
    });
  }
}


async function saveExtStats(playerId, gameId) {
  const allFields = EXT_STAT_FIELDS.flatMap(s => s.fields);

  // Check if record exists — start from existing values so hidden fields
  // (no input on screen) keep their previously recorded data, not zeroed.
  const existing = await DB.getAll('playerGameStats','gameId',gameId);
  const prev = existing.find(r => r.playerId === playerId);

  const record = { playerId, gameId, seasonId: State.currentSeasonId };
  if (prev) record.pgsId = prev.pgsId;

  allFields.forEach(f => {
    const el = document.getElementById(`ext-${playerId}-${gameId}-${f.key}`);
    if (el) {
      record[f.key] = parseInt(el.value)||0;
    } else {
      // Field is hidden — preserve whatever was already stored, default to 0 if none
      record[f.key] = prev ? (prev[f.key]||0) : 0;
    }
  });

  await DB.put('playerGameStats', record);
  Toast.show(I18n.t('ext_stats_saved'));
  // Close form, re-render
  const formEl = document.getElementById(`ext-form-${playerId}-${gameId}`);
  if (formEl) formEl.style.display = 'none';
  await renderExtendedStats(playerId);
}

async function renderMatchLog(playerId) {
  const el = document.getElementById(`tracked-log-${playerId}`);
  if (!el) return;

  const players = await DB.getAll('players','seasonId',State.currentSeasonId);
  const player = players.find(p => p.playerId === playerId);
  if (!player) return;

  const games = await DB.getAll('games','seasonId',State.currentSeasonId);
  const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);
  const lorGP = allGP.filter(r => r.playerId === playerId);

  // Pre-compute everything needed for sorting
  const enriched = games.map(g => {
    const gp = lorGP.find(r => r.gameId === g.gameId);
    const gps = allGP.filter(r => r.gameId === g.gameId);
    const our = Calc.teamGoals(gps);
    const their = parseInt(g.opponentScore)||0;
    return { game: g, gp, _our: our, _their: their, _res: Calc.result(our,their) };
  });

  const sortKey = el.dataset.sortKey || 'date';
  const sortDir = el.dataset.sortDir || 'desc';
  const sortFns = {
    date:     (a,b) => new Date(a.game.date||0) - new Date(b.game.date||0),
    opponent: (a,b) => (a.game.opponent||'').localeCompare(b.game.opponent||''),
    result:   (a,b) => (a._res||'').localeCompare(b._res||''),
    role:     (a,b) => (a.gp?.role||'').localeCompare(b.gp?.role||''),
    position: (a,b) => (a.gp?.positionPlayed||'').localeCompare(b.gp?.positionPlayed||''),
    goals:    (a,b) => (a.gp?.goals||0) - (b.gp?.goals||0),
    assists:  (a,b) => (a.gp?.assists||0) - (b.gp?.assists||0),
    yc:       (a,b) => (a.gp?.yellowCards||0) - (b.gp?.yellowCards||0),
    rc:       (a,b) => (a.gp?.redCards||0) - (b.gp?.redCards||0),
  };
  enriched.sort((a,b) => {
    const fn = sortFns[sortKey] || sortFns.date;
    return sortDir === 'asc' ? fn(a,b) : fn(b,a);
  });

  function thSort(key, label, extraClass='') {
    const active = sortKey === key;
    const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="matchLogSort(${playerId},'${key}')">${label}${arrow}</th>`;
  }

  el.innerHTML = `
    <div class="card">
      <div class="card-title">${I18n.t('tp_card_match_by_match')} — ${esc(player.fullName)}</div>
      <div class="game-detail-table-wrap" style="margin-bottom:0">
        <table class="game-detail-table" style="min-width:980px">
          <thead><tr>
            ${thSort('date',I18n.t('tp_col_date'),'col-sticky-num')}
            ${thSort('opponent',I18n.t('tp_col_opponent'),'col-sticky-name')}
            ${thSort('result',I18n.t('tp_col_result'))}
            ${thSort('role',I18n.t('tp_col_role'))}
            ${thSort('position',I18n.t('tp_col_position'))}
            ${thSort('goals',I18n.t('tp_col_goals'))}
            ${thSort('assists',I18n.t('tp_col_assists'))}
            ${thSort('yc',I18n.t('tp_col_yc'))}
            ${thSort('rc',I18n.t('tp_col_rc'))}
            <th>${I18n.t('tp_col_mom')}</th><th>${I18n.t('tp_col_cap')}</th><th>${I18n.t('tp_col_notes')}</th>
          </tr></thead>
          <tbody>
          ${enriched.map(({game:g, gp, _our:our, _their:their, _res:res}) => {
            const resultVisible = isGameResultVisible(g);
            if (!gp||!gp.calledUp) return `<tr>
              <td class="col-sticky-num" style="min-width:60px">${g.date?fmtDate(g.date):'—'}</td>
              <td class="col-sticky-name">${esc(g.opponent)}</td>
              <td>${resultVisible?`<span class="badge badge-${res}">${res}</span>`:`<span class="td-muted" style="font-size:11px">${I18n.t('tp_form_upcoming')}</span>`}</td>
              <td colspan="9" class="td-muted">${I18n.t('tp_not_called_up')}</td></tr>`;
            return `<tr>
              <td class="col-sticky-num" style="min-width:60px">${g.date?fmtDate(g.date):'—'}</td>
              <td class="col-sticky-name">${esc(g.opponent)}</td>
              <td>${resultVisible?`<span class="badge badge-${res}">${res}</span> <small class="td-muted">${(()=>{const s=Calc.homeAwayScore(g.homeAway,our,their);return s.home+'-'+s.away;})()}</small>`:`<span class="td-muted" style="font-size:11px">${I18n.t('tp_form_upcoming')}</span>`}</td>

// ══════════════════════════════════════════════════════════════════════════════
// DB PUT WRAPPER — marks records as modified for sync
// ══════════════════════════════════════════════════════════════════════════════
const _origPut = DB.put.bind(DB);
const SYNC_STORES_SET = new Set(['seasons','players','games','gamePlayers','achievements','clubHistory','globalPlayers','opponents','playerGameStats','events','goalEvents','injuries']);

DB.put = async function(store, obj) {
  if (SYNC_STORES_SET.has(store) && obj) {
    const now = new Date().toISOString();
    if (!obj.createdAt) obj.createdAt = now;
    obj.updatedAt = now;
    if (!obj.syncStatus) {
      obj.syncStatus = 'local';
    } else if (obj.syncStatus === 'synced') {
      obj.syncStatus = 'modified';
    }
  }
  if (typeof gdDebugLog === 'function') {
    const idField = Object.keys(obj||{}).find(k => /Id$/.test(k) && k.toLowerCase().startsWith(store.toLowerCase().replace(/s$/,'')));
    gdDebugLog(`DB.put(${store}) key=${obj && (obj[idField]||'(new)')}`);
  }
  return _origPut(store, obj);
};

async function loadMeta() {
  const m = await DB.get('appMeta', 'currentSeason');
  if (m) { State.currentSeasonId = m.value; }
  // EN and PT are fully supported. IT/FR/ES are not translated yet — force-
  // correct any stale saved value for those back to EN so the app never
  // silently shows a half-translated language across different screens.
  const SUPPORTED_LANGS = ['EN', 'PT'];
  const langM = await DB.get('appMeta', 'language');
  if (langM && !SUPPORTED_LANGS.includes(langM.value)) {
    await DB.put('appMeta', { metaKey: 'language', value: 'EN' });
    I18n.set('EN');
  } else if (langM) {
    I18n.set(langM.value);
  }
  applyNavLabels();
  applyStaticTranslations();
  const season = State.currentSeasonId ? await DB.get('seasons', State.currentSeasonId) : null;
  State.currentSeason = season || null;
  document.getElementById('navSeason').textContent = season ? season.seasonName : 'No season';
}

  // ── SQUAD ──────────────────────────────────────────────────────────────────
  async function squad(search='', posFilter='') {
    const el = document.getElementById('squadContent');
    const sub = document.getElementById('squadSubtitle');

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }
    sub.textContent = State.currentSeason.seasonName;

    let players = await DB.getAll('players','seasonId',State.currentSeasonId);
    const allInjuries = await DB.getAll('injuries');
    const activeInjuryByPlayer = {};
    allInjuries.forEach(inj => {
      if (inj.status === 'Injured') activeInjuryByPlayer[inj.playerId] = inj;
    });
    players.sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99)||(a.fullName||'').localeCompare(b.fullName||''));

    if (search) players = players.filter(p=>p.fullName.toLowerCase().includes(search.toLowerCase()));
    if (posFilter) players = players.filter(p=>p.primaryPosition===posFilter);

    if (!players.length) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('squad_no_players_title')}</strong><p>${I18n.t('squad_no_players_desc')}</p></div>`;
      return;
    }

    // Sort state stored on element to persist across re-renders
    const sortKey   = el.dataset.sortKey   || 'shirtNumber';
    const sortDir   = el.dataset.sortDir   || 'asc';

    const sortFns = {
      shirtNumber: (a,b) => (parseInt(a.shirtNumber)||999) - (parseInt(b.shirtNumber)||999),
      fullName:    (a,b) => (a.fullName||'').localeCompare(b.fullName||''),
      primaryPosition: (a,b) => (a.primaryPosition||'').localeCompare(b.primaryPosition||''),
      secondaryPosition: (a,b) => (a.secondaryPosition||'').localeCompare(b.secondaryPosition||''),
      dominantFoot:(a,b) => (a.dominantFoot||'').localeCompare(b.dominantFoot||''),
      dateOfBirth: (a,b) => (a.dateOfBirth||'').localeCompare(b.dateOfBirth||''),
    };

    players.sort((a,b) => {
      const fn = sortFns[sortKey] || sortFns.shirtNumber;
      return sortDir === 'asc' ? fn(a,b) : fn(b,a);
    });

    function thSort(key, label, extraClass='') {
      const active = sortKey === key;
      const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="squadSort('${key}')">${label}${arrow}</th>`;
    }

    const rows = players.map(p => {
      const injury = activeInjuryByPlayer[p.playerId];
      const rowBg = injury ? '#fbeaea' : '';
      const rowStyle = injury ? `style="background:${rowBg}"` : '';
      const stickyBg = injury ? `style="background:${rowBg}"` : '';
      return `
      <tr ${rowStyle} class="${injury?'row-injured':''}">
        <td class="col-sticky-num" ${stickyBg}>${p.shirtNumber||'—'}</td>
        <td class="col-sticky-name" title="${esc(p.fullName)}" style="${injury?`background:${rowBg};`:''}${p.trackingStatus==='tracked'?'cursor:pointer;text-decoration:underline;text-decoration-color:#ccc':''}" ${p.trackingStatus==='tracked'?`onclick="openPlayerCardPopup(${p.playerId})"`:''}>${esc(shortName(p.fullName))} ${p.trackingStatus==='tracked'?`<span class="badge badge-lor" title="${esc(p.trackingLabel||I18n.t('squad_tracked_label_default'))}">${esc(p.trackingLabel||'★')}</span>`:''} ${!p.isActive?`<span class="badge-nc badge" style="font-size:9px">${I18n.t('squad_archived_badge')}</span>`:''}</td>
        <td><span class="pos-pill">${p.primaryPosition||'—'}</span></td>
        <td>${p.secondaryPosition||'—'}</td>
        <td>${p.dominantFoot||'—'}</td>
        <td>${p.dateOfBirth?fmtDate(p.dateOfBirth):'—'}</td>
        <td>${injury?`<span class="badge" style="background:#fde8e8;color:#b03030" title="${esc(injury.injuryType||'')} ${esc(injury.notes||'')}">&#129460; ${I18n.t('squad_status_injured')}</span>`:`<span style="color:#2a7a3b;font-size:11px">&#10003; ${I18n.t('squad_status_fit')}</span>`}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="editPlayer(${p.playerId})">${I18n.t('common_edit')}</button>
          <button class="btn btn-secondary btn-sm" onclick="archivePlayer(${p.playerId},${!p.isActive})" style="margin-left:4px">${p.isActive?I18n.t('common_archive'):I18n.t('common_restore')}</button>
          <button class="btn ${injury?'btn-danger':'btn-secondary'} btn-sm" onclick="openInjuryModal(${p.playerId})" style="margin-left:4px">${injury?I18n.t('squad_btn_manage_injury'):I18n.t('squad_btn_add_injury')}</button>
        </td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="game-detail-table-wrap">
        <table class="game-detail-table">
          <thead><tr>
            ${thSort('shirtNumber',I18n.t('squad_col_num'),'col-sticky-num')}
            ${thSort('fullName',I18n.t('squad_col_name'),'col-sticky-name')}
            ${thSort('primaryPosition',I18n.t('squad_col_position'))}
            ${thSort('secondaryPosition',I18n.t('squad_col_pos2'))}
            ${thSort('dominantFoot',I18n.t('squad_col_foot'))}
            ${thSort('dateOfBirth',I18n.t('squad_col_dob'))}
            <th>${I18n.t('squad_col_status')}</th>
            <th>${I18n.t('squad_col_actions')}</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── GAMES LIST ─────────────────────────────────────────────────────────────
  async function gamesList(search='', compFilter='') {
    const el = document.getElementById('gamesContent');
    const sub = document.getElementById('gamesSubtitle');

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }
    sub.textContent = State.currentSeason.seasonName;

    let games = await DB.getAll('games','seasonId',State.currentSeasonId);
    if (search) games = games.filter(g=>g.opponent.toLowerCase().includes(search.toLowerCase()));
    if (compFilter) games = games.filter(g=>g.competitionType===compFilter);

    if (!games.length) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('games_no_games_title')}</strong><p>${I18n.t('games_no_games_desc')}</p></div>`;
      return;
    }

    const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);

    // Pre-compute score/result for sorting
    const enriched = games.map(g => {
      const gps = allGP.filter(r=>r.gameId===g.gameId);
      const our = Calc.teamGoals(gps);
      const their = parseInt(g.opponentScore)||0;
      return { ...g, _our: our, _their: their, _res: Calc.result(our, their) };
    });

    const sortKey = el.dataset.sortKey || 'date';
    const sortDir = el.dataset.sortDir || 'desc';
    const sortFns = {
      date:            (a,b) => new Date(a.date||0) - new Date(b.date||0),
      opponent:        (a,b) => (a.opponent||'').localeCompare(b.opponent||''),
      homeAway:        (a,b) => (a.homeAway||'').localeCompare(b.homeAway||''),
      competitionType: (a,b) => (a.competitionType||'').localeCompare(b.competitionType||''),
      score:           (a,b) => (a._our - a._their) - (b._our - b._their),
      result:          (a,b) => (a._res||'').localeCompare(b._res||''),
    };
    enriched.sort((a,b) => {
      const fn = sortFns[sortKey] || sortFns.date;
      return sortDir === 'asc' ? fn(a,b) : fn(b,a);
    });

    function thSort(key, label, extraClass='') {
      const active = sortKey === key;
      const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="gamesSort('${key}')">${label}${arrow}</th>`;
    }

    const rows = enriched.map(g => {
      const gVisible = isGameResultVisible(g);
      return `<tr style="cursor:pointer" onclick="openGameDetail(${g.gameId})">
        <td class="col-sticky-num" style="min-width:60px">${g.date?fmtDate(g.date):'—'}</td>
        <td class="col-sticky-name">${esc(g.opponent)}</td>
        <td>${g.homeAway||'—'}</td>
        <td><span style="font-size:11px;color:var(--muted)">${g.competitionType||'—'}</span></td>
        <td class="td-bold">${gVisible?(()=>{const s=Calc.homeAwayScore(g.homeAway,g._our,g._their);return s.home+' — '+s.away;})():'<span class="td-muted" style="font-weight:400;font-size:11px">—</span>'}</td>
        <td>${gVisible?`<span class="badge badge-${g._res}">${g._res}</span>`:`<span class="td-muted" style="font-size:11px">${I18n.t('games_status_upcoming')}</span>`}</td>
        <td onclick="event.stopPropagation()">
          <button class="btn btn-secondary btn-sm" onclick="editGame(${g.gameId})">${I18n.t('common_edit')}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteGame(${g.gameId})" style="margin-left:4px">${I18n.t('common_delete')}</button>
        </td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="game-detail-table-wrap">
        <table class="game-detail-table">
          <thead><tr>
            ${thSort('date',I18n.t('games_col_date'),'col-sticky-num')}
            ${thSort('opponent',I18n.t('games_col_opponent'),'col-sticky-name')}
            ${thSort('homeAway',I18n.t('games_col_homeaway'))}
            ${thSort('competitionType',I18n.t('games_col_competition'))}
            ${thSort('score',I18n.t('games_col_score'))}
            ${thSort('result',I18n.t('games_col_result'))}
            <th>${I18n.t('squad_col_actions')}</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── GAME DETAIL ────────────────────────────────────────────────────────────
  async function gameDetail(gameId) {
    const el = document.getElementById('gameDetailContent');
    const [game, players, existingGP] = await Promise.all([
      DB.get('games', gameId),
      DB.getAll('players','seasonId', State.currentSeasonId),
      DB.getAll('gamePlayers','gameId', gameId)
    ]);

    if (!game) { el.innerHTML = `<p>${I18n.t('games_not_found')}</p>`; return; }

    const activePlayers = players.filter(p=>p.isActive).sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99));
    window._gdPlayers = activePlayers;
    window._gdGameId = gameId;

    const ourScore = Calc.teamGoals(existingGP);
    const theirScore = parseInt(game.opponentScore)||0;
    const res = Calc.result(ourScore, theirScore);
    const displayScore = Calc.homeAwayScore(game.homeAway, ourScore, theirScore);
    const currentTab = State.gameDetailTab || 'squad';

    const debugOn = await isDebugModeOn();

    el.innerHTML = `
      <div class="game-header">
        <div class="game-header-top">
          <div>
            <div class="game-title">${esc(game.opponent)}</div>
            <div class="game-meta">${game.date?fmtDate(game.date):'—'} · ${game.homeAway||''} · ${game.competitionType||''} ${game.competitionName?'· '+esc(game.competitionName):''} ${game.venue?'· '+esc(game.venue):''}</div>
          </div>
          <div>
            <div class="game-score" id="liveScore">${displayScore.home} — ${displayScore.away}</div>
            <div class="game-score-sub"><span class="badge badge-${res}" id="liveResult">${res}</span></div>
          </div>
        </div>
        ${game.teamNotes?`<div style="margin-top:10px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:10px">${esc(game.teamNotes)}</div>`:''}
      </div>

      <div style="display:flex;gap:0;border-bottom:2px solid #ddd;margin-bottom:16px;overflow-x:auto">
        <button class="import-tab ${currentTab==='squad'?'active-tab':''}" id="gdtab-squad" onclick="switchSimpleTab(${gameId},'squad')">${I18n.t('gd_tab_squad')}</button>
        <button class="import-tab ${currentTab==='xi'?'active-tab':''}" id="gdtab-xi" onclick="switchSimpleTab(${gameId},'xi')">${I18n.t('gd_tab_xi')}</button>
        <button class="import-tab ${currentTab==='goals'?'active-tab':''}" id="gdtab-goals" onclick="switchSimpleTab(${gameId},'goals')">${I18n.t('gd_tab_goals')}</button>
      </div>
      <div style="font-size:11px;color:#2a7a3b;margin-bottom:10px">&#10003; ${I18n.t('gd_autosave_note')}</div>

      ${debugOn ? `<div id="gdDebugPanel" style="background:#111;color:#0f0;font-family:monospace;font-size:10px;padding:10px;border-radius:4px;margin-bottom:14px;white-space:pre-wrap;line-height:1.5">DEBUG: waiting for first action...</div>` : ''}

      <div id="gdPanel-squad" style="${currentTab==='squad'?'':'display:none'}"></div>
      <div id="gdPanel-xi" style="${currentTab==='xi'?'':'display:none'}"></div>
      <div id="gdPanel-goals" style="${currentTab==='goals'?'':'display:none'}"></div>

      <div style="margin-top:10px">
        <button class="btn btn-secondary" onclick="closeGameDetail()">&#8592; ${I18n.t('gd_btn_back')}</button>
      </div>
    `;

    gdDebugLog('gameDetail() loaded for game ' + gameId + ', tab=' + currentTab);
    if (currentTab==='squad') await renderSquadListTab(gameId);
    if (currentTab==='xi')    await renderStartingXITab(gameId);
    if (currentTab==='goals') await renderSimpleGoalsTab(gameId);
  }

  // ── LORENZO ────────────────────────────────────────────────────────────────
  async function trackedPlayer(playerId) {
    const el = document.getElementById(`tracked-content-${playerId}`);
    const sub = document.getElementById(`tracked-subtitle-${playerId}`);
    if (!el) return;

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }

    const players = await DB.getAll('players','seasonId',State.currentSeasonId);
    const lor = players.find(p=>p.playerId===playerId && p.isActive);

    if (!lor) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('tp_not_found_title')}</strong><p>${I18n.t('tp_not_found_desc')}</p><button class="btn btn-primary" onclick="Nav.go('squad')">${I18n.t('tp_btn_go_squad')}</button></div>`;
      return;
    }

    if (sub) sub.textContent = `${lor.fullName} · ${State.currentSeason.seasonName}`;

    const games = await DB.getAll('games','seasonId',State.currentSeasonId);
    const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);
    const lorGP = allGP.filter(r=>r.playerId===lor.playerId);
    // Only count games whose result is actually visible (i.e. likely finished)
    // towards season totals — an in-progress game shouldn't inflate stats yet.
    const finishedGames = games.filter(g => isGameResultVisible(g));
    const s = Calc.lorenzoStats(finishedGames, lorGP);

    // Sorting for the Match by Match table on this Overview tab
    const ovSortKey = el.dataset.sortKey || 'date';
    const ovSortDir = el.dataset.sortDir || 'desc';
    const ovEnriched = games.map(g => {
      const gp = allGP.find(r=>r.gameId===g.gameId && r.playerId===playerId);
      const gps = allGP.filter(r=>r.gameId===g.gameId);
      const our = Calc.teamGoals(gps);
      const their = parseInt(g.opponentScore)||0;
      return { game:g, gp, _our:our, _their:their, _res:Calc.result(our,their) };
    });
    const ovSortFns = {
      date:     (a,b) => new Date(a.game.date||0) - new Date(b.game.date||0),
      opponent: (a,b) => (a.game.opponent||'').localeCompare(b.game.opponent||''),
      result:   (a,b) => (a._res||'').localeCompare(b._res||''),
      role:     (a,b) => (a.gp?.role||'').localeCompare(b.gp?.role||''),
      position: (a,b) => (a.gp?.positionPlayed||'').localeCompare(b.gp?.positionPlayed||''),
      goals:    (a,b) => (a.gp?.goals||0) - (b.gp?.goals||0),
      assists:  (a,b) => (a.gp?.assists||0) - (b.gp?.assists||0),
      yc:       (a,b) => (a.gp?.yellowCards||0) - (b.gp?.yellowCards||0),
      rc:       (a,b) => (a.gp?.redCards||0) - (b.gp?.redCards||0),
    };
    ovEnriched.sort((a,b) => {
      const fn = ovSortFns[ovSortKey] || ovSortFns.date;
      return ovSortDir === 'asc' ? fn(a,b) : fn(b,a);
    });
    function ovThSort(key, label, extraClass='') {
      const active = ovSortKey === key;
      const arrow  = active ? (ovSortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="overviewMatchSort(${playerId},'${key}')">${label}${arrow}</th>`;
    }

    const sortedGames = [...games].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const last5 = sortedGames.slice(0,5);

    // position breakdown
    const posEntries = Object.entries(s.positionBreakdown).sort((a,b)=>b[1]-a[1]);

    el.innerHTML = `
      <div class="print-header" style="display:none;margin-bottom:20px">
        <h2>${esc(lor.fullName)} — ${State.currentSeason.seasonName}</h2>
        <p style="color:var(--muted);font-size:13px">${State.currentSeason.seasonName} · ${State.currentSeason.clubName||''}</p>
      </div>

      <div class="stat-grid">
        <div class="stat-card"><div class="val">${s.calledUp}</div><div class="lbl">${I18n.t('tp_stat_appearances')}</div></div>
        <div class="stat-card"><div class="val">${s.started}</div><div class="lbl">${I18n.t('tp_stat_starts')}</div><div class="sub">${s.subbed} ${I18n.t('tp_stat_as_sub')}</div></div>
        <div class="stat-card"><div class="val">${s.goals}</div><div class="lbl">${I18n.t('tp_stat_goals')}</div></div>
        <div class="stat-card"><div class="val">${s.assists}</div><div class="lbl">${I18n.t('tp_stat_assists')}</div></div>
        <div class="stat-card"><div class="val">${s.contributions}</div><div class="lbl">${I18n.t('tp_stat_contributions')}</div></div>
        <div class="stat-card"><div class="val">${s.fullGames}</div><div class="lbl">${I18n.t('tp_stat_full_games')}</div></div>
        <div class="stat-card"><div class="val">${s.minutes}</div><div class="lbl">${I18n.t('tp_stat_est_minutes')}</div></div>
        <div class="stat-card"><div class="val">${s.mom}</div><div class="lbl">${I18n.t('tp_stat_mom')}</div></div>
        <div class="stat-card"><div class="val">${s.captain}</div><div class="lbl">${I18n.t('tp_stat_captain')}</div></div>
        <div class="stat-card"><div class="val">${s.yellow}</div><div class="lbl">${I18n.t('tp_stat_yellow')}</div></div>
        <div class="stat-card"><div class="val">${s.red}</div><div class="lbl">${I18n.t('tp_stat_red')}</div></div>
        <div class="stat-card"><div class="val">${s.availabilityPct}%</div><div class="lbl">${I18n.t('tp_stat_availability')}</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="card">
          <div class="card-title">${I18n.t('tp_card_percentages')}</div>
          <div class="prog-wrap">
            <div class="prog-label"><span>${I18n.t('tp_stat_availability')}</span><span>${s.availabilityPct}%</span></div>
            <div class="prog-bar"><div class="prog-fill" style="width:${s.availabilityPct}%"></div></div>
          </div>
          <div class="prog-wrap">
            <div class="prog-label"><span>${I18n.t('tp_starts_rate')}</span><span>${s.startsPct}%</span></div>
            <div class="prog-bar"><div class="prog-fill" style="width:${s.startsPct}%"></div></div>
          </div>
        </div>
        ${posEntries.length ? `
        <div class="card">
          <div class="card-title">${I18n.t('tp_card_position_breakdown')}</div>
          ${posEntries.map(([pos,cnt])=>`
            <div class="prog-wrap">
              <div class="prog-label"><span>${pos}</span><span>${cnt} ${I18n.t('tp_games_suffix')}</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(cnt/s.calledUp*100)||0}%"></div></div>
            </div>`).join('')}
        </div>` : '<div></div>'}
      </div>

      ${last5.length ? `
      <div class="card">
        <div class="card-title">${I18n.t('tp_card_recent_form')}</div>
        <div class="form-strip">
          ${last5.map(g=>{
            const gp = lorGP.find(r=>r.gameId===g.gameId);
            const gps = allGP.filter(r=>r.gameId===g.gameId);
            const our = Calc.teamGoals(gps);
            const their = parseInt(g.opponentScore)||0;
            const res = Calc.result(our,their);
            const visible = isGameResultVisible(g);
            if (!visible) return `<div class="form-badge"><div class="fb-result badge" style="background:#f0f0f0;color:#999">···</div><div class="fb-stat">${esc(g.opponent.substring(0,8))}</div><div class="fb-stat">${I18n.t('tp_form_upcoming')}</div></div>`;

            const fbs = Calc.homeAwayScore(g.homeAway, our, their);
            return `<div class="form-badge"><div class="fb-result badge badge-${res}">${res}</div><div class="fb-stat">${fbs.home}-${fbs.away}</div><div class="fb-stat">G:${gp.goals||0} A:${gp.assists||0}</div></div>`;

        </div>
      </div>` : ''}

      <div class="card">
        <div class="card-title">${I18n.t('tp_card_match_by_match')}</div>
        <div class="game-detail-table-wrap" style="margin-bottom:0">
          <table class="game-detail-table" style="min-width:980px">

              ${ovThSort('opponent',I18n.t('tp_col_opponent'),'col-sticky-name')}
              ${ovThSort('result',I18n.t('tp_col_result'))}
              ${ovThSort('role',I18n.t('tp_col_role'))}
              ${ovThSort('position',I18n.t('tp_col_position'))}
              ${ovThSort('goals',I18n.t('tp_col_goals'))}
              ${ovThSort('assists',I18n.t('tp_col_assists'))}
              ${ovThSort('yc',I18n.t('tp_col_yc'))}
              ${ovThSort('rc',I18n.t('tp_col_rc'))}
              <th>${I18n.t('tp_col_mom')}</th><th>${I18n.t('tp_col_cap')}</th><th>${I18n.t('tp_col_notes')}</th>

                <td><span class="pos-pill">${gp.positionPlayed||'—'}</span></td>
                <td class="td-center td-bold">${gp.goals||0}</td>
                <td class="td-center">${gp.assists||0}</td>
                <td class="td-center">${gp.yellowCards||0}</td>
                <td class="td-center">${gp.redCards||0}</td>

  // ── TEAM SUMMARY ───────────────────────────────────────────────────────────
  async function teamSummary() {
    const el = document.getElementById('teamSummaryContent');
    const sub = document.getElementById('teamSubtitle');

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }
    sub.textContent = State.currentSeason.seasonName;

    const [games, players, allGP] = await Promise.all([
      DB.getAll('games','seasonId',State.currentSeasonId),
      DB.getAll('players','seasonId',State.currentSeasonId),
      DB.getAll('gamePlayers','seasonId',State.currentSeasonId)
    ]);

    if (!games.length) {
      el.innerHTML = `<div class="empty"><strong>No games yet</strong><p>Add games to see team statistics.</p></div>`;
      return;
    }

    // Only finished games count towards team and player season totals —
    // a game still in progress shouldn't affect the table yet.
    const finishedGames = games.filter(g => isGameResultVisible(g));

    const ts = Calc.teamSeasonStats(finishedGames, allGP);

    // player stats
    const pStats = players.filter(p=>p.isActive).map(p => ({
      ...p, ...Calc.playerSeasonStats(p.playerId, finishedGames, allGP)
    }));

    const topScorers = [...pStats].sort((a,b)=>b.goals-a.goals).slice(0,5);
    const topAssisters = [...pStats].sort((a,b)=>b.assists-a.assists).slice(0,5);
    const mostApps = [...pStats].filter(p=>p.calledUp>0).sort((a,b)=>b.calledUp-a.calledUp).slice(0,5);
    const mostMoM = [...pStats].sort((a,b)=>b.mom-a.mom).filter(p=>p.mom>0).slice(0,5);

    window._teamSummaryAllStats = pStats; // store full dataset for re-sort

    // Most Used Lineup — best XI based on appearances per position this season
    const mostUsedLineup = buildMostUsedLineup(players, finishedGames, allGP);
    const shirtColor = State.currentSeason?.shirtColor || '#B23333';

    el.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="val">${ts.played}</div><div class="lbl">Played</div></div>
        <div class="stat-card"><div class="val">${ts.wins}</div><div class="lbl">Wins</div></div>

        <div class="stat-card"><div class="val">${ts.losses}</div><div class="lbl">Losses</div></div>
        <div class="stat-card"><div class="val">${ts.goalsFor}</div><div class="lbl">Goals For</div></div>
        <div class="stat-card"><div class="val">${ts.goalsAgainst}</div><div class="lbl">Goals Against</div></div>
        <div class="stat-card"><div class="val">${ts.goalDiff>0?'+':''}${ts.goalDiff}</div><div class="lbl">Goal Diff</div></div>
        <div class="stat-card"><div class="val">${ts.cleanSheets}</div><div class="lbl">Clean Sheets</div></div>
      </div>

      ${renderLineupPitch(mostUsedLineup, shirtColor)}

      <div class="card">
        <div class="card-title">Records</div>
        <div class="info-row"><span class="ir-label">Home</span><span class="ir-value">${ts.homeW}W ${ts.homeD}D ${ts.homeL}L</span></div>
        <div class="info-row"><span class="ir-label">Away</span><span class="ir-value">${ts.awayW}W ${ts.awayD}D ${ts.awayL}L</span></div>
        <div class="info-row"><span class="ir-label">Best Win Streak</span><span class="ir-value">${ts.bestStreak} games</span></div>
        <div class="info-row"><span class="ir-label">Best Unbeaten Run</span><span class="ir-value">${ts.bestUnbeaten} games</span></div>
        ${ts.biggestWin?`<div class="info-row"><span class="ir-label">Biggest Win</span><span class="ir-value">${ts.biggestWin.score} vs ${esc(ts.biggestWin.opp)}</span></div>`:''}
        ${ts.biggestLoss?`<div class="info-row"><span class="ir-label">Biggest Loss</span><span class="ir-value">${ts.biggestLoss.score} vs ${esc(ts.biggestLoss.opp)}</span></div>`:''}
      </div>

      <div class="leader-grid">
        ${leaderCard('Top Scorers', topScorers, 'goals', 'GOALS')}
        ${leaderCard('Top Assisters', topAssisters, 'assists', 'ASSISTS')}
      </div>
      <div class="leader-grid">

  }

  // ── LEADER CARD — featured top player + short ranked list, single stat ──────
  function leaderCard(title, players, statKey, statLabel) {
    if (!players.length) return '<div></div>';
    const leader = players[0];
    const rest = players.slice(1, 5);
    const initials = (leader.fullName||'').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
    return `
      <div class="leader-col">
        <div class="leader-col-title">${title.toUpperCase()}</div>
        <div class="card leader-feature-card">
          <div class="leader-feature">
            <div class="leader-feature-left">
              <div class="leader-name">${esc(shortName(leader.fullName))}</div>
              <div class="leader-stat-val">${leader[statKey]||0}</div>
              <div class="leader-stat-lbl">${statLabel}</div>
            </div>
            <div class="leader-feature-photo">
              ${leader.photoUrl
                ? `<img src="${esc(leader.photoUrl)}" onerror="this.outerHTML='<div class=&quot;leader-photo-fallback&quot;>${initials}</div>'">`
                : `<div class="leader-photo-fallback">${initials}</div>`}
            </div>
          </div>
        </div>
        ${rest.length ? `
        <div class="card leader-list-card">
          ${rest.map((p,i) => `
            <div class="leader-row">
              <span class="leader-rank">${i+2}</span>
              <span class="leader-row-name" title="${esc(p.fullName)}">${esc(shortName(p.fullName))}</span>
              <span class="leader-row-val">${p[statKey]||0}</span>
            </div>`).join('')}
        </div>` : ''}
      </div>`;
  }

  function playerTable(tableId, title, players, fields, headers) {
    if (!players.length) return '';
    const elId = `pt-${tableId}`;
    const sortKey = window[`_sortKey_${tableId}`] || fields[1]; // default: second field (the "top" metric)
    const sortDir = window[`_sortDir_${tableId}`] || 'desc';

    const sorted = [...players].sort((a,b) => {
      const av = a[sortKey]||0, bv = b[sortKey]||0;
      const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
      return sortDir === 'asc' ? cmp : -cmp;
    });

    return `
      <div class="card" id="${elId}" style="padding:14px 0 14px 14px">
        <div class="card-title" style="padding-right:14px">${title}</div>
        <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:280px">
          <thead><tr>${headers.map((h,i)=>{
            const key = fields[i];
            const active = sortKey === key;
            const arrow = active ? (sortDir==='asc'?' ▲':' ▼') : '';
            const stickyStyle = i===0 ? 'position:sticky;left:0;background:#fff;z-index:1;' : '';
            return `<th style="${stickyStyle}font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#999;padding:5px 8px;text-align:${i===0?'left':'center'};border-bottom:1px solid #ddd;white-space:nowrap;cursor:pointer;user-select:none" onclick="playerTableSort('${tableId}','${key}')">${h}${arrow}</th>`;
          }).join('')}</tr></thead>
          <tbody>${sorted.map((p,i)=>`<tr>${fields.map((f,fi)=>{
            const stickyStyle = fi===0 ? 'position:sticky;left:0;background:#fff;z-index:1;' : '';
            return `<td style="${stickyStyle}padding:7px 8px;font-size:12px;border-bottom:1px solid #eee;white-space:nowrap;${fi===0?'font-weight:700':'text-align:center'}" ${fi===0?`title="${esc(p[f])}"`:''}>${fi===0?`${i+1}. ${esc(shortName(p[f]))}`:p[f]||0}</td>`;
          }).join('')}</tr>`).join('')}</tbody>
        </table>
        </div>
      </div>`;
  }

  // playerTableSort moved to global scope below Render module (onclick needs global access)

const Nav = (() => {
  let current = 'dashboard';

  async function go(section) {
    if (typeof gdDebugLog === 'function') gdDebugLog(`Nav.go('${section}')`);
    // close game detail if open
    document.getElementById('gamesListView').style.display = 'block';
    document.getElementById('gameDetailView').style.display = 'none';

    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(`sec-${section}`)?.classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l=>{
      l.classList.toggle('active', l.dataset.section===section);
    });
    current = section;
    State.currentSection = section;
    try { sessionStorage.setItem('squadTracker_lastSection', section); } catch(e) {}

    // close mobile menu
    document.getElementById('mobileMenu').classList.remove('open');

    // render section
    await refresh(section);
    window.scrollTo(0,0);
  }

  async function refresh(section) {
    section = section || current;
    switch(section) {
      case 'home':         await Render.home(); break;
      case 'dashboard':    await Render.dashboard(); break;
      case 'squad':        await Render.squad(document.getElementById('squadSearch')?.value||'', document.getElementById('squadFilter')?.value||''); break;
      case 'games':        await Render.gamesList(document.getElementById('gamesSearch')?.value||'', document.getElementById('gamesFilter')?.value||''); break;
      case 'teamSummary':  await Render.teamSummary(); break;
      case 'settings':     await Render.settings(); break;
      case 'help':         Render.help(); break;
      case 'admin':
        switchAdminTab('roadmap');
        break;
      default:
        if (section.startsWith('tracked-')) {
          const pid = parseInt(section.replace('tracked-',''));
          await Render.trackedPlayer(pid);
        }
        break;
    }
  }

  return { go, refresh, current: () => current };
})();

const Toast = (() => {
  let timer;
  function show(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'show error' : 'show';
    clearTimeout(timer);
    timer = setTimeout(()=>t.className='', 2800);
  }
  function error(msg) { show(msg, true); }
  return { show, error };
})();

const Confirm = (() => {
  let _cb = null;
  function show(title, msg, cb) {
    _cb = cb;
    document.getElementById('dialogTitle').textContent = title;
    document.getElementById('dialogMsg').textContent = msg;
    document.getElementById('confirmDialog').classList.add('open');
  }
  function resolve(yes) {
    document.getElementById('confirmDialog').classList.remove('open');
    if (yes && _cb) _cb();
    _cb = null;
  }
  return { show, resolve };
})();

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Shortens a full name to "First Last" for compact table display.
// "Lorenzo Morenda Mabere" -> "Lorenzo Mabere". Names with 1-2 words pass through unchanged.
function shortName(fullName) {
  if (!fullName) return '';
  const parts = String(fullName).trim().split(/\s+/);
  if (parts.length <= 2) return fullName;
  return parts[0] + ' ' + parts[parts.length - 1];
}
function fmtDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

};

function getFlagsForNationality(nat) {
  if (!nat) return '';
  const parts = nat.split('/').map(s => s.trim().toLowerCase());
  const flags = parts.map(p => NATIONALITY_FLAGS[p] || '').filter(Boolean);
  return flags.length ? flags.join(' ') : '&#127760;'; // globe fallback
}

function calcAge(dob) {
  if (!dob) return null;
  const birth = new Date(dob);
  if (isNaN(birth)) return null;
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  const monthDiff = now.getMonth() - birth.getMonth();
  if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birth.getDate())) age--;
  return age;
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// CSV PARSER (synchronous — no async, no await)
// ══════════════════════════════════════════════════════════════════════════════
function parseCSVText(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase().replace(/\s+/g,''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  });
}

// FILE INPUT HANDLERS — using FileReader callbacks (no async/await in read)
// ══════════════════════════════════════════════════════════════════════════════
function onRestoreFileChange(input) {
  const file = input.files && input.files[0];
  dbgLog('Restore file input changed');
  if (!file) { dbgLog('No file selected'); return; }
  dbgLog('File selected: ' + file.name + ' | type: ' + file.type + ' | size: ' + file.size + ' bytes');
  const infoEl = document.getElementById('restoreFileInfo');
  if (infoEl) infoEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  const reader = new FileReader();
  reader.onerror = function() { dbgLog('FileReader error'); Toast.error(I18n.t('bk_err_read_file')); input.value=''; };
  reader.onload = function(e) {
    dbgLog('FileReader onload fired');
    const text = e.target.result;
    let parsed;
    try { parsed = JSON.parse(text); } catch(x) { dbgLog('JSON parse failed: ' + x.message); Toast.error(I18n.t('bk_err_invalid_json')); input.value=''; return; }
    if (!parsed.data || !Array.isArray(parsed.data.seasons)) {
      dbgLog('JSON missing required data'); Toast.error(I18n.t('bk_err_missing_data')); input.value=''; return;
    }
    dbgLog('JSON valid — seasons: ' + parsed.data.seasons.length + ' | players: ' + (parsed.data.players||[]).length);
    input.value = '';
    doRestore(parsed);
  };
  dbgLog('FileReader readAsText starting...');
  reader.readAsText(file);
}

function doRestore(parsed) {
  Confirm.show(I18n.t('bk_confirm_restore_title'), I18n.t('bk_confirm_restore_file_body'), async () => {
    dbgLog('Restore confirmed — starting...');
    try {
      await Backup.create('before-restore');
      await DB.restoreAllStores(parsed.data);
      await loadMeta();
      dbgLog('Restore complete.');
      Toast.show(I18n.t('bk_restored_success'));
      await Nav.go('home');
    } catch(err) { dbgLog('Restore error: ' + err.message); Toast.error(err.message); }
  });
}

function handlePasteRestore() {
  const text = (document.getElementById('pasteRestoreJSON')||{}).value||'';
  dbgLog('Paste restore triggered — length: ' + text.length);
  if (!text.trim()) { Toast.error(I18n.t('bk_err_nothing_pasted')); return; }
  let parsed;
  try { parsed = JSON.parse(text); } catch(x) { Toast.error(I18n.t('bk_err_invalid_json_short')); return; }
  if (!parsed.data || !Array.isArray(parsed.data.seasons)) { Toast.error(I18n.t('bk_err_missing_data')); return; }
  dbgLog('Pasted JSON valid — restoring...');
  doRestore(parsed);
}

function onImportFileChange(input, type) {
  const file = input.files && input.files[0];
  dbgLog(type + ' file input changed');
  if (!file) { dbgLog('No file selected'); return; }
  dbgLog('File: ' + file.name + ' | type: ' + file.type + ' | size: ' + file.size + ' bytes');
  const infoId = 'import' + type.charAt(0).toUpperCase() + type.slice(1) + 'FileInfo';
  const infoEl = document.getElementById(infoId);
  if (infoEl) infoEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'csv') { Toast.error(I18n.t('imp_csv_only')); input.value=''; return; }
  const reader = new FileReader();
  reader.onerror = function() { dbgLog('FileReader error for ' + type); Toast.error(I18n.t('bk_err_read_file')); input.value=''; };
  reader.onload = function(e) {
    dbgLog('FileReader onload for ' + type);
    const text = e.target.result;
    const rows = parseCSVText(text);
    dbgLog('Parse complete — rows found: ' + rows.length);
    input.value = '';
    processImportRows(rows, type);
  };
  reader.readAsText(file);
}

function handlePasteImport(type) {
  const pasteId = 'paste' + type.charAt(0).toUpperCase() + type.slice(1) + 'CSV';
  const text = (document.getElementById(pasteId)||{}).value||'';
  dbgLog('Paste import for ' + type + ' — length: ' + text.length);
  if (!text.trim()) { Toast.error(I18n.t('bk_err_nothing_pasted')); return; }
  const rows = parseCSVText(text);
  dbgLog('Paste parse complete — rows: ' + rows.length);
  processImportRows(rows, type);
}
