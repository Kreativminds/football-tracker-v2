async function processImportRows(rows, type) {
  dbgLog('processImportRows: type=' + type + ' rows=' + rows.length);
  if (!rows.length) { Toast.error(I18n.t('imp_no_rows')); return; }
  if (!State.currentSeasonId) { Toast.error(I18n.t('imp_no_season')); return; }

  let validated = [];
  if (type === 'players') validated = await validateImportPlayers(rows);
  else if (type === 'games') validated = await validateImportGames(rows);
  else if (type === 'opponents') validated = validateImportOpponents(rows);

  const ok = validated.filter(r=>r.status==='ok').length;
  const warn = validated.filter(r=>r.status==='warn').length;
  const skip = validated.filter(r=>r.status==='skip').length;
  const err = validated.filter(r=>r.status==='err').length;
  dbgLog('Validation: ok=' + ok + ' warn=' + warn + ' skip=' + skip + ' err=' + err);

  const previewId = 'import' + type.charAt(0).toUpperCase() + type.slice(1) + 'Preview';
  renderImportPreview(validated, previewId, type);
}

async function validateImportPlayers(rows) {
  const existing = await DB.getAll('players', 'seasonId', State.currentSeasonId);
  return rows.map(r => {
    const name = r.fullname || r['full name'] || r.name || '';
    const dob = r.dateofbirth || r['date of birth'] || r.dob || '';
    const pos = r.primaryposition || r['primary position'] || r.position || '';
    const shirt = r.shirtnumber || r['shirt number'] || r.number || '';
    if (!name.trim()) return { status:'err', reason:'Name required', display:[name||'—',dob,pos,shirt] };
    if (!pos.trim()) return { status:'err', reason:'Position required', display:[name,dob,pos,shirt] };
    const dup = existing.find(p =>
      p.fullName.toLowerCase()===name.toLowerCase().trim() && dob.trim() && p.dateOfBirth===dob.trim()
    );
    if (dup) return { status:'skip', reason:'Duplicate (same name + DOB)', display:[name,dob,pos,shirt] };
    const status = dob.trim() ? 'ok' : 'warn';
    const reason = dob.trim() ? '' : 'No DOB — verify manually';
    return {
      status, reason, display:[name,dob||'—',pos,shirt||'—'],
      data: {
        seasonId: State.currentSeasonId,
        fullName: name.trim(),
        shirtNumber: shirt ? parseInt(shirt)||null : null,
        dateOfBirth: dob.trim()||null,
        nationality: (r.nationality||'').trim()||null,
        primaryPosition: pos.trim(),
        secondaryPosition: (r.secondaryposition||r['secondary position']||'').trim()||null,
        dominantFoot: (r.dominantfoot||r['dominant foot']||'').trim()||null,
        height: r.height ? parseInt(r.height)||null : null,
        weight: r.weight ? parseInt(r.weight)||null : null,
        isActive: true,
        trackingStatus: null,
        developmentNotes: (r.notes||r.developmentnotes||'').trim()||null,
        createdAt: new Date().toISOString(),
      }
    };
  });
}

async function validateImportGames(rows) {
  const existing = await DB.getAll('games', 'seasonId', State.currentSeasonId);
  const VALID_HOME_AWAY = ['Home', 'Away', 'Neutral'];
  return rows.map(r => {
    const date = (r.date||'').trim();
    const opp = (r.opponent||r.opponentname||r['opponent name']||'').trim();
    const haRaw = (r.homeaway||r['home/away']||r.venue||'Home').trim();
    // Case-insensitive match against the 3 allowed values (Home/Away/
    // Neutral) so "neutral" or "AWAY" in a CSV still resolves correctly,
    // but anything else (a typo, a stray value) is caught here rather
    // than silently stored as-is, which is what happened before this fix.
    const haMatch = VALID_HOME_AWAY.find(v => v.toLowerCase() === haRaw.toLowerCase());
    const ha = haMatch || 'Home';
    const compType = (r.competitiontype||r['competition type']||'League').trim();
    const compName = (r.competitionname||r['competition name']||'').trim();
    const venue = (r.venue||r.ground||'').trim();
    const oppScore = parseInt(r.opponentscore||r['opponent score']||'0')||0;
    const notes = (r.notes||'').trim();
    if (!date) return { status:'err', reason:'Date required', display:[date,opp,ha] };
    if (!opp) return { status:'err', reason:'Opponent required', display:[date,opp,ha] };
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return { status:'err', reason:'Date must be YYYY-MM-DD', display:[date,opp,ha] };
    const dup = existing.find(g => g.date===date && (g.opponent||'').toLowerCase()===opp.toLowerCase());
    if (dup) return { status:'skip', reason:'Duplicate (same date + opponent)', display:[date,opp,ha] };
    // Neutral is a real, valid value (tournament matches at a neutral
    // venue) — this only warns when the CSV had something that matched
    // NONE of Home/Away/Neutral, defaulting to Home but flagging it so
    // it's not silently wrong.
    if (haRaw && !haMatch) {
      return {
        status:'warn', reason:`"${haRaw}" is not a valid Home/Away value — defaulted to Home. Valid values: Home, Away, Neutral.`, display:[date,opp,ha],
        data: {
          seasonId: State.currentSeasonId,
          date, opponent: opp, homeAway: ha,
          competitionType: compType, competitionName: compName||null,
          venue: venue||null, opponentScore: oppScore,
          teamNotes: notes||null, createdAt: new Date().toISOString(),
        }
      };
    }
    return {
      status:'ok', reason:'', display:[date,opp,ha],
      data: {
        seasonId: State.currentSeasonId,
        date, opponent: opp, homeAway: ha,
        competitionType: compType, competitionName: compName||null,
        venue: venue||null, opponentScore: oppScore,
        teamNotes: notes||null, createdAt: new Date().toISOString(),
      }
    };
  });
}

function validateImportOpponents(rows) {
  return rows.map(r => {
    const name = (r.opponentname||r.opponent||r.name||'').trim();
    if (!name) return { status:'err', reason:'Name required', display:['—','—','—'] };
    return {
      status:'ok', reason:'', display:[name, r.agegroup||'—', r.level||'—'],
      data: { opponentName: name, ageGroup: r.agegroup||null, level: r.level||null, notes: r.notes||null }
    };
  });
}

function renderImportPreview(validated, previewId, type) {
  const el = document.getElementById(previewId);
  if (!el) return;
  const ok = validated.filter(r=>r.status==='ok').length;
  const warn = validated.filter(r=>r.status==='warn').length;
  const skip = validated.filter(r=>r.status==='skip').length;
  const err = validated.filter(r=>r.status==='err').length;
  const canImport = ok + warn;
  el.innerHTML = `
    <div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span class="badge-ok">${ok} ready</span>
      ${warn?`<span class="badge-warn">${warn} flagged</span>`:''}
      ${skip?`<span class="badge-skip">${skip} skipped</span>`:''}
      ${err?`<span class="badge-err">${err} errors</span>`:''}
      ${canImport?`<button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="confirmImport('${type}',window._importData_${type})">Import ${canImport} rows</button>`:''}
    </div>
    <div style="overflow-x:auto"><table class="import-preview-table">
      <thead><tr><th>Status</th><th>Name / Date</th><th>Col 2</th><th>Col 3</th><th>Reason</th></tr></thead>
      <tbody>${validated.map(r=>`
        <tr class="row-${r.status}">
          <td><span class="badge-${r.status}">${r.status.toUpperCase()}</span></td>
          <td>${r.display[0]||'—'}</td><td>${r.display[1]||'—'}</td><td>${r.display[2]||'—'}</td>
          <td style="color:#999;font-size:10px">${r.reason}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  window['_importData_' + type] = validated;
}

async function confirmImport(type, validated) {
  if (!validated) return;
  const toImport = validated.filter(r => r.status==='ok' || r.status==='warn');
  if (!toImport.length) return;
  await Backup.create('before-import');
  let count = 0;
  let skippedDupes = 0;
  const existingOpponentNames = type === 'opponents'
    ? (await DB.getAll('opponents')).map(o => (o.opponentName||'').toLowerCase())
    : [];
  for (const r of toImport) {
    const store = type==='players' ? 'players' : type==='games' ? 'games' : 'opponents';
    if (store === 'opponents' && existingOpponentNames.includes((r.data.opponentName||'').toLowerCase())) {
      skippedDupes++;
      continue; // already in the catalogue — never create a duplicate entry
    }
    await DB.put(store, r.data);
    count++;
  }
  dbgLog('Import done: ' + count + ' rows written to ' + type + (skippedDupes ? `, ${skippedDupes} duplicate opponents skipped` : ''));
  Toast.show(count + ' ' + type + ' imported successfully.' + (skippedDupes ? ` (${skippedDupes} ${I18n.t('opp_import_dupes_skipped')})` : ''));
  const previewId = 'import' + type.charAt(0).toUpperCase() + type.slice(1) + 'Preview';
  const el = document.getElementById(previewId);
  if (el) el.innerHTML = '<div style="padding:10px;background:#f0faf2;border-radius:3px;font-size:13px;color:#2a7a3b;font-weight:600">&#10003; Import complete — ' + count + ' rows added.</div>';
  window['_importData_' + type] = null;
}

// Season name is always auto-generated from the start year as "YYYY/YY" —
// never freely typed, so it can never drift into an inconsistent format.
function buildSeasonName(startYear) {
  const y = parseInt(startYear);
  if (!y || isNaN(y)) return '';
  const endYY = String((y + 1) % 100).padStart(2, '0');
  return `${y}/${endYY}`;
}

function updateSeasonNamePreview() {
  const yearInput = document.getElementById('sf-startyear');
  const preview = document.getElementById('sf-name-preview');
  const hidden = document.getElementById('sf-name');
  if (!yearInput || !preview || !hidden) return;
  const name = buildSeasonName(yearInput.value);
  preview.textContent = name || '—';
  hidden.value = name;
}

function switchSettingsTab(tab) {
  State.currentSettingsTab = tab;
  try { sessionStorage.setItem('squadTracker_settingsTab', tab); } catch(e) {}
  ['seasons','opponents','import','sync','backup','danger'].forEach(t => {
    const panel = document.getElementById(`stab-panel-${t}`);
    const btn   = document.getElementById(`stab-${t}`);
    if (panel) panel.style.display = t === tab ? '' : 'none';
    if (btn)   btn.classList.toggle('active-tab', t === tab);
  });
  // If switching to import, ensure players tab is shown and subtitle is set
  if (tab === 'import') {
    switchImportTab('players');
    renderImportSection();
  }
  if (tab === 'opponents') {
    renderOpponentsTab();
  }
}

function switchImportTab(tab) {
  try { sessionStorage.setItem('squadTracker_importTab', tab); } catch(e) {}
  ['players','games','opponents'].forEach(t => {
    const panel = document.getElementById('import' + t.charAt(0).toUpperCase() + t.slice(1) + 'Panel');
    const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (panel) panel.style.display = t===tab ? 'block' : 'none';
    if (btn) { btn.classList.toggle('active-tab', t===tab); }
  });
}

function renderImportSection() {
  const sub = document.getElementById('importSubtitle');
  if (sub) sub.textContent = State.currentSeason ? State.currentSeason.seasonName : '';
}
