          const res = Calc.result(Calc.teamGoals(gps), g.opponentScore||0);
          if (!gp||!gp.calledUp) return `<span style="display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:2px;font-size:10px;font-weight:700;background:#f0f0f0;color:#999">—</span>`;
          const col = res==='W'?'#e6f4ea':res==='D'?'#fff8e1':'#fde8e8';
          const tc = res==='W'?'#2a7a3b':res==='D'?'#b07a00':'#b03030';
          return `<span style="display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:2px;font-size:10px;font-weight:700;background:${col};color:${tc}">${res}</span>`;
        }).join(' ');
        return `
        <div class="card" style="cursor:pointer" onclick="Nav.go('tracked-${tp.playerId}')">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
            <div>
              <div style="font-weight:700;font-size:14px">${esc(tp.fullName)}</div>
              <div style="font-size:11px;color:var(--muted)">${tp.primaryPosition||''}</div>
            </div>
            <span style="font-size:11px;color:var(--muted)">Tap for full stats →</span>
          </div>
          <div class="stat-grid" style="margin-bottom:10px">
            <div class="stat-card"><div class="val" style="font-size:22px">${tpStats.calledUp}</div><div class="lbl">Apps</div></div>
            <div class="stat-card"><div class="val" style="font-size:22px">${tpStats.goals}</div><div class="lbl">Goals</div></div>
            <div class="stat-card"><div class="val" style="font-size:22px">${tpStats.assists}</div><div class="lbl">Assists</div></div>
            <div class="stat-card"><div class="val" style="font-size:22px">${tpStats.goals+tpStats.assists}</div><div class="lbl">G+A</div></div>
          </div>
          <div style="display:flex;gap:4px;align-items:center">
            <span style="font-size:10px;color:var(--muted);margin-right:4px">Form:</span>
            ${formStrip}
          </div>
        </div>`;
      }).join('')}

      <!-- LINKS TO DETAILED PAGES -->
      <div class="card">
        <div class="card-title">Detailed Reports</div>
        <div class="btn-group" style="flex-wrap:wrap">
          <button class="btn btn-secondary" onclick="Nav.go('teamSummary')">&#128202; Team Summary</button>
          <button class="btn btn-secondary" onclick="Nav.go('games')">&#127944; All Games</button>
          <button class="btn btn-secondary" onclick="Nav.go('squad')">&#128101; Full Squad</button>
        </div>
      </div>
    `;

    } catch(err) {
      console.error('Dashboard render error:', err);
      el.innerHTML = `<div class="empty"><strong>Dashboard error</strong><p style="color:#b03030;font-family:monospace;font-size:11px;text-align:left;white-space:pre-wrap">${esc(err.message)}\n\n${esc(err.stack||'')}</p></div>`;
    }
  }

  // ── SQUAD ──────────────────────────────────────────────────────────────────
  async function squad(search='', posFilter='') {
    const el = document.getElementById('squadContent');
    const sub = document.getElementById('squadSubtitle');

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }
    sub.textContent = State.currentSeason.seasonName;

    let players = await DB.getAll('players','seasonId',State.currentSeasonId);
    players.sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99)||(a.fullName||'').localeCompare(b.fullName||''));

    if (search) players = players.filter(p=>p.fullName.toLowerCase().includes(search.toLowerCase()));
    if (posFilter) players = players.filter(p=>p.primaryPosition===posFilter);

    if (!players.length) {
      el.innerHTML = `<div class="empty"><strong>No players found</strong><p>Add your first player using the button above.</p></div>`;
      return;
    }

    // Sort state stored on element to persist across re-renders
    const sortKey   = el.dataset.sortKey   || 'shirtNumber';
    const sortDir   = el.dataset.sortDir   || 'asc';

    const sortFns = {
      shirtNumber: (a,b) => (parseInt(a.shirtNumber)||999) - (parseInt(b.shirtNumber)||999),
      fullName:    (a,b) => (a.fullName||'').localeCompare(b.fullName||''),
      primaryPosition: (a,b) => (a.primaryPosition||'').localeCompare(b.primaryPosition||''),
      secondaryPosition: (a,b) => (a.secondaryPosition||'').localeCompare(b.secondaryPosition||''),
      dominantFoot:(a,b) => (a.dominantFoot||'').localeCompare(b.dominantFoot||''),
      dateOfBirth: (a,b) => (a.dateOfBirth||'').localeCompare(b.dateOfBirth||''),
    };

    players.sort((a,b) => {
      const fn = sortFns[sortKey] || sortFns.shirtNumber;
      return sortDir === 'asc' ? fn(a,b) : fn(b,a);
    });

    function thSort(key, label, extraClass='') {
      const active = sortKey === key;
      const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="squadSort('${key}')">${label}${arrow}</th>`;
    }

    const rows = players.map(p => `
      <tr>
        <td class="col-sticky-num">${p.shirtNumber||'—'}</td>
        <td class="col-sticky-name" title="${esc(p.fullName)}" ${p.trackingStatus==='tracked'?`style="cursor:pointer;text-decoration:underline;text-decoration-color:#ccc" onclick="openPlayerCardPopup(${p.playerId})"`:''}>${esc(shortName(p.fullName))} ${p.trackingStatus==='tracked'?`<span class="badge badge-lor" title="${esc(p.trackingLabel||'Tracked')}">${esc(p.trackingLabel||'★')}</span>`:''} ${!p.isActive?'<span class="badge-nc badge" style="font-size:9px">Archived</span>':''}</td>
        <td><span class="pos-pill">${p.primaryPosition||'—'}</span></td>
        <td>${p.secondaryPosition||'—'}</td>
        <td>${p.dominantFoot||'—'}</td>
        <td>${p.dateOfBirth?fmtDate(p.dateOfBirth):'—'}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="editPlayer(${p.playerId})">Edit</button>
          <button class="btn btn-secondary btn-sm" onclick="archivePlayer(${p.playerId},${!p.isActive})" style="margin-left:4px">${p.isActive?'Archive':'Restore'}</button>
        </td>
      </tr>`).join('');

    el.innerHTML = `
      <div class="game-detail-table-wrap">
        <table class="game-detail-table">
          <thead><tr>
            ${thSort('shirtNumber','#','col-sticky-num')}
            ${thSort('fullName','Name','col-sticky-name')}
            ${thSort('primaryPosition','Position')}
            ${thSort('secondaryPosition','2nd Pos')}
            ${thSort('dominantFoot','Foot')}
            ${thSort('dateOfBirth','DOB')}
            <th>Actions</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── GAMES LIST ─────────────────────────────────────────────────────────────
  async function gamesList(search='', compFilter='') {
    const el = document.getElementById('gamesContent');
    const sub = document.getElementById('gamesSubtitle');

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }
    sub.textContent = State.currentSeason.seasonName;

    let games = await DB.getAll('games','seasonId',State.currentSeasonId);
    if (search) games = games.filter(g=>g.opponent.toLowerCase().includes(search.toLowerCase()));
    if (compFilter) games = games.filter(g=>g.competitionType===compFilter);

    if (!games.length) {
      el.innerHTML = `<div class="empty"><strong>No games logged yet</strong><p>Add your first game using the button above.</p></div>`;
      return;
    }

    const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);

    // Pre-compute score/result for sorting
    const enriched = games.map(g => {
      const gps = allGP.filter(r=>r.gameId===g.gameId);
      const our = Calc.teamGoals(gps);
      const their = parseInt(g.opponentScore)||0;
      return { ...g, _our: our, _their: their, _res: Calc.result(our, their) };
    });

    const sortKey = el.dataset.sortKey || 'date';
    const sortDir = el.dataset.sortDir || 'desc';
    const sortFns = {
      date:            (a,b) => new Date(a.date||0) - new Date(b.date||0),
      opponent:        (a,b) => (a.opponent||'').localeCompare(b.opponent||''),
      homeAway:        (a,b) => (a.homeAway||'').localeCompare(b.homeAway||''),
      competitionType: (a,b) => (a.competitionType||'').localeCompare(b.competitionType||''),
      score:           (a,b) => (a._our - a._their) - (b._our - b._their),
      result:          (a,b) => (a._res||'').localeCompare(b._res||''),
    };
    enriched.sort((a,b) => {
      const fn = sortFns[sortKey] || sortFns.date;
      return sortDir === 'asc' ? fn(a,b) : fn(b,a);
    });

    function thSort(key, label, extraClass='') {
      const active = sortKey === key;
      const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="gamesSort('${key}')">${label}${arrow}</th>`;
    }

    const rows = enriched.map(g => `<tr style="cursor:pointer" onclick="openGameDetail(${g.gameId})">
        <td class="col-sticky-num" style="min-width:60px">${g.date?fmtDate(g.date):'—'}</td>
        <td class="col-sticky-name">${esc(g.opponent)}</td>
        <td>${g.homeAway||'—'}</td>
        <td><span style="font-size:11px;color:var(--muted)">${g.competitionType||'—'}</span></td>
        <td class="td-bold">${(()=>{const s=Calc.homeAwayScore(g.homeAway,g._our,g._their);return s.home+' — '+s.away;})()}</td>
        <td><span class="badge badge-${g._res}">${g._res}</span></td>
        <td onclick="event.stopPropagation()">
          <button class="btn btn-secondary btn-sm" onclick="editGame(${g.gameId})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteGame(${g.gameId})" style="margin-left:4px">Delete</button>
        </td>
      </tr>`).join('');

    el.innerHTML = `
      <div class="game-detail-table-wrap">
        <table class="game-detail-table">
          <thead><tr>
            ${thSort('date','Date','col-sticky-num')}
            ${thSort('opponent','Opponent','col-sticky-name')}
            ${thSort('homeAway','H/A')}
            ${thSort('competitionType','Competition')}
            ${thSort('score','Score')}
            ${thSort('result','Result')}
            <th>Actions</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── GAME DETAIL ────────────────────────────────────────────────────────────
  async function gameDetail(gameId) {
    const el = document.getElementById('gameDetailContent');
    const [game, players, existingGP] = await Promise.all([
      DB.get('games', gameId),
      DB.getAll('players','seasonId', State.currentSeasonId),
      DB.getAll('gamePlayers','gameId', gameId)
    ]);

    if (!game) { el.innerHTML = '<p>Game not found.</p>'; return; }

    const activePlayers = players.filter(p=>p.isActive).sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99));
    window._gdPlayers = activePlayers;
    window._gdGameId = gameId;

    const ourScore = Calc.teamGoals(existingGP);
    const theirScore = parseInt(game.opponentScore)||0;
    const res = Calc.result(ourScore, theirScore);
    const displayScore = Calc.homeAwayScore(game.homeAway, ourScore, theirScore);

    el.innerHTML = `
      <div class="game-header">
        <div class="game-header-top">
          <div>
            <div class="game-title">${esc(game.opponent)}</div>
            <div class="game-meta">${game.date?fmtDate(game.date):'—'} · ${game.homeAway||''} · ${game.competitionType||''} ${game.competitionName?'· '+esc(game.competitionName):''} ${game.venue?'· '+esc(game.venue):''}</div>
          </div>
          <div>
            <div class="game-score" id="liveScore">${displayScore.home} — ${displayScore.away}</div>
            <div class="game-score-sub"><span class="badge badge-${res}" id="liveResult">${res}</span></div>
          </div>
        </div>
        ${game.teamNotes?`<div style="margin-top:10px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:10px">${esc(game.teamNotes)}</div>`:''}
      </div>

      <div style="font-size:11px;color:#2a7a3b;margin-bottom:14px">&#10003; Changes save automatically — no Save button needed.</div>

      <div id="gdSimpleTable"></div>

      <div style="margin-top:10px">
        <button class="btn btn-secondary" onclick="closeGameDetail()">&#8592; Back to Games</button>
      </div>
    `;

    await renderSimpleGameTable(gameId);
  }

  // ── ONE SIMPLE TABLE — Called Up / Starter-Sub / Goals / Assists ────────────
  // No tabs. No multi-step flow. Everything visible at once. Re-renders the
  // whole table after every change so the UI can never go stale.
  async function renderSimpleGameTable(gameId) {
    const el = document.getElementById('gdSimpleTable');
    if (!el) return;

    try {
      if (!window._gdPlayers || !window._gdPlayers.length) {
        window._gdPlayers = (await DB.getAll('players','seasonId', State.currentSeasonId)).filter(p=>p.isActive).sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99));
      }
      const players = window._gdPlayers;
      const existingGP = await DB.getAll('gamePlayers','gameId',gameId);
      const calledUpCount = existingGP.filter(r=>r.calledUp).length;
      const starterCount = existingGP.filter(r=>r.calledUp && r.role==='Starter').length;

      el.innerHTML = `
        <p style="font-size:12px;color:var(--muted);margin-bottom:10px">Tick <strong>Played</strong> for anyone in the squad. Choose Starter or Sub. Fill in Goals/Assists for anyone who scored.</p>
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Played: <strong style="color:var(--dark)">${calledUpCount}</strong> / ${players.length} &nbsp;·&nbsp; Starters: <strong style="color:var(--dark)">${starterCount}</strong> / 11</div>
        <div class="game-detail-table-wrap">
          <table class="game-detail-table">
            <thead><tr>
              <th class="col-sticky-num">#</th>
              <th class="col-sticky-name">Player</th>
              <th>Played</th>
              <th>Role</th>
              <th>Goals</th>
              <th>Assists</th>
            </tr></thead>
            <tbody>
            ${players.map(p => {
              const gp = existingGP.find(r=>r.playerId===p.playerId) || {};
              const calledUp = !!gp.calledUp;
              return `<tr id="sgr-${p.playerId}">
                <td class="col-sticky-num">${p.shirtNumber||'—'}</td>
                <td class="col-sticky-name" title="${esc(p.fullName)}">${esc(shortName(p.fullName))} ${p.trackingStatus==='tracked'?`<span class="badge badge-lor">${esc(p.trackingLabel||'★')}</span>`:''}</td>
                <td class="td-center">
                  <input type="checkbox" ${calledUp?'checked':''} onclick="simpleSetCalledUp(${gameId},${p.playerId},this.checked)">
                </td>
                <td>
                  <select onchange="simpleSetRole(${gameId},${p.playerId},this.value)" ${!calledUp?'disabled':''} style="width:80px">
                    <option value="Sub" ${gp.role!=='Starter'?'selected':''}>Sub</option>
                    <option value="Starter" ${gp.role==='Starter'?'selected':''}>Starter</option>
                  </select>
                </td>
                <td>
                  <input type="number" min="0" max="20" value="${gp.goals||0}" ${!calledUp?'disabled':''} style="width:50px" onchange="simpleSetField(${gameId},${p.playerId},'goals',this.value)">
                </td>
                <td>
                  <input type="number" min="0" max="20" value="${gp.assists||0}" ${!calledUp?'disabled':''} style="width:50px" onchange="simpleSetField(${gameId},${p.playerId},'assists',this.value)">
                </td>
              </tr>`;
            }).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch(err) {
      console.error('[renderSimpleGameTable] error:', err);
      el.innerHTML = `<div class="empty"><strong>Display error</strong><p style="color:#b03030;font-family:monospace;font-size:11px;text-align:left;white-space:pre-wrap">${esc(err.message)}</p></div>`;
    }
  }

  // ── LORENZO ────────────────────────────────────────────────────────────────
  async function trackedPlayer(playerId) {
    const el = document.getElementById(`tracked-content-${playerId}`);
    const sub = document.getElementById(`tracked-subtitle-${playerId}`);
    if (!el) return;

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }

    const players = await DB.getAll('players','seasonId',State.currentSeasonId);
    const lor = players.find(p=>p.playerId===playerId && p.isActive);

    if (!lor) {
      el.innerHTML = `<div class="empty"><strong>Player not found in current season</strong><p>Go to Squad and check this player is active.</p><button class="btn btn-primary" onclick="Nav.go('squad')">Go to Squad</button></div>`;
      return;
    }

    if (sub) sub.textContent = `${lor.fullName} · ${State.currentSeason.seasonName}`;

    const games = await DB.getAll('games','seasonId',State.currentSeasonId);
    const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);
    const lorGP = allGP.filter(r=>r.playerId===lor.playerId);
    const s = Calc.lorenzoStats(games, lorGP);

    // Sorting for the Match by Match table on this Overview tab
    const ovSortKey = el.dataset.sortKey || 'date';
    const ovSortDir = el.dataset.sortDir || 'desc';
    const ovEnriched = games.map(g => {
      const gp = allGP.find(r=>r.gameId===g.gameId && r.playerId===playerId);
      const gps = allGP.filter(r=>r.gameId===g.gameId);
      const our = Calc.teamGoals(gps);
      const their = parseInt(g.opponentScore)||0;
      return { game:g, gp, _our:our, _their:their, _res:Calc.result(our,their) };
    });
    const ovSortFns = {
      date:     (a,b) => new Date(a.game.date||0) - new Date(b.game.date||0),
      opponent: (a,b) => (a.game.opponent||'').localeCompare(b.game.opponent||''),
      result:   (a,b) => (a._res||'').localeCompare(b._res||''),
      role:     (a,b) => (a.gp?.role||'').localeCompare(b.gp?.role||''),
      position: (a,b) => (a.gp?.positionPlayed||'').localeCompare(b.gp?.positionPlayed||''),
      goals:    (a,b) => (a.gp?.goals||0) - (b.gp?.goals||0),
      assists:  (a,b) => (a.gp?.assists||0) - (b.gp?.assists||0),
      yc:       (a,b) => (a.gp?.yellowCards||0) - (b.gp?.yellowCards||0),
      rc:       (a,b) => (a.gp?.redCards||0) - (b.gp?.redCards||0),
    };
    ovEnriched.sort((a,b) => {
      const fn = ovSortFns[ovSortKey] || ovSortFns.date;
      return ovSortDir === 'asc' ? fn(a,b) : fn(b,a);
    });
    function ovThSort(key, label, extraClass='') {
      const active = ovSortKey === key;
      const arrow  = active ? (ovSortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="overviewMatchSort(${playerId},'${key}')">${label}${arrow}</th>`;
    }

    const sortedGames = [...games].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const last5 = sortedGames.slice(0,5);

    // position breakdown
    const posEntries = Object.entries(s.positionBreakdown).sort((a,b)=>b[1]-a[1]);

    el.innerHTML = `
      <div class="print-header" style="display:none;margin-bottom:20px">
        <h2>${esc(lor.fullName)} — ${State.currentSeason.seasonName}</h2>
        <p style="color:var(--muted);font-size:13px">${State.currentSeason.seasonName} · ${State.currentSeason.clubName||''}</p>
      </div>

      <div class="stat-grid">
        <div class="stat-card"><div class="val">${s.calledUp}</div><div class="lbl">Appearances</div></div>
        <div class="stat-card"><div class="val">${s.started}</div><div class="lbl">Starts</div><div class="sub">${s.subbed} as sub</div></div>
        <div class="stat-card"><div class="val">${s.goals}</div><div class="lbl">Goals</div></div>
        <div class="stat-card"><div class="val">${s.assists}</div><div class="lbl">Assists</div></div>
        <div class="stat-card"><div class="val">${s.contributions}</div><div class="lbl">Contributions</div></div>
        <div class="stat-card"><div class="val">${s.fullGames}</div><div class="lbl">Full Games</div></div>
        <div class="stat-card"><div class="val">${s.minutes}</div><div class="lbl">Est. Minutes</div></div>
        <div class="stat-card"><div class="val">${s.mom}</div><div class="lbl">Player of Match</div></div>
        <div class="stat-card"><div class="val">${s.captain}</div><div class="lbl">Captain</div></div>
        <div class="stat-card"><div class="val">${s.yellow}</div><div class="lbl">Yellow Cards</div></div>
        <div class="stat-card"><div class="val">${s.red}</div><div class="lbl">Red Cards</div></div>
        <div class="stat-card"><div class="val">${s.availabilityPct}%</div><div class="lbl">Availability</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="card">
          <div class="card-title">Percentages</div>
          <div class="prog-wrap">
            <div class="prog-label"><span>Availability</span><span>${s.availabilityPct}%</span></div>
            <div class="prog-bar"><div class="prog-fill" style="width:${s.availabilityPct}%"></div></div>
          </div>
          <div class="prog-wrap">
            <div class="prog-label"><span>Starts rate</span><span>${s.startsPct}%</span></div>
            <div class="prog-bar"><div class="prog-fill" style="width:${s.startsPct}%"></div></div>
          </div>
        </div>
        ${posEntries.length ? `
        <div class="card">
          <div class="card-title">Position Breakdown</div>
          ${posEntries.map(([pos,cnt])=>`
            <div class="prog-wrap">
              <div class="prog-label"><span>${pos}</span><span>${cnt} games</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(cnt/s.calledUp*100)||0}%"></div></div>
            </div>`).join('')}
        </div>` : '<div></div>'}
      </div>

      ${last5.length ? `
      <div class="card">
        <div class="card-title">Recent Form (last 5 games)</div>
        <div class="form-strip">
          ${last5.map(g=>{
            const gp = lorGP.find(r=>r.gameId===g.gameId);
            const gps = allGP.filter(r=>r.gameId===g.gameId);
            const our = Calc.teamGoals(gps);
            const their = parseInt(g.opponentScore)||0;
            const res = Calc.result(our,their);
            if (!gp||!gp.calledUp) return `<div class="form-badge"><div class="fb-result badge badge-${res}">${res}</div><div class="fb-stat">${esc(g.opponent.substring(0,8))}</div><div class="fb-stat">DNP</div></div>`;
            const fbs = Calc.homeAwayScore(g.homeAway, our, their);
            return `<div class="form-badge"><div class="fb-result badge badge-${res}">${res}</div><div class="fb-stat">${fbs.home}-${fbs.away}</div><div class="fb-stat">G:${gp.goals||0} A:${gp.assists||0}</div></div>`;
          }).join('')}
        </div>

  function playerTable(tableId, title, players, fields, headers) {
    if (!players.length) return '';
    const elId = `pt-${tableId}`;
    const sortKey = window[`_sortKey_${tableId}`] || fields[1]; // default: second field (the "top" metric)
    const sortDir = window[`_sortDir_${tableId}`] || 'desc';

    const sorted = [...players].sort((a,b) => {
      const av = a[sortKey]||0, bv = b[sortKey]||0;
      const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
      return sortDir === 'asc' ? cmp : -cmp;
    });

    return `
      <div class="card" id="${elId}">
        <div class="card-title">${title}</div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>${headers.map((h,i)=>{
            const key = fields[i];
            const active = sortKey === key;
            const arrow = active ? (sortDir==='asc'?' ▲':' ▼') : '';
            return `<th style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#999;padding:5px 8px;text-align:${i===0?'left':'center'};border-bottom:1px solid #ddd;cursor:pointer;user-select:none" onclick="playerTableSort('${tableId}','${key}')">${h}${arrow}</th>`;
          }).join('')}</tr></thead>
          <tbody>${sorted.map((p,i)=>`<tr>${fields.map((f,fi)=>`<td style="padding:7px 8px;font-size:12px;border-bottom:1px solid #eee;${fi===0?'font-weight:700':'text-align:center'}" ${fi===0?`title="${esc(p[f])}"`:''}>${fi===0?`${i+1}. ${esc(shortName(p[f]))}`:p[f]||0}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>`;
  }

const Nav = (() => {
  let current = 'dashboard';

  async function go(section) {
    // close game detail if open
    document.getElementById('gamesListView').style.display = 'block';
    document.getElementById('gameDetailView').style.display = 'none';

    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(`sec-${section}`)?.classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l=>{
      l.classList.toggle('active', l.dataset.section===section);
    });
    current = section;
    State.currentSection = section;
    try { sessionStorage.setItem('squadTracker_lastSection', section); } catch(e) {}

    // close mobile menu
    document.getElementById('mobileMenu').classList.remove('open');

    // render section
    await refresh(section);
    window.scrollTo(0,0);
  }

  async function refresh(section) {
    section = section || current;
    switch(section) {
      case 'home':         await Render.home(); break;
      case 'dashboard':    await Render.dashboard(); break;
      case 'squad':        await Render.squad(document.getElementById('squadSearch')?.value||'', document.getElementById('squadFilter')?.value||''); break;
      case 'games':        await Render.gamesList(document.getElementById('gamesSearch')?.value||'', document.getElementById('gamesFilter')?.value||''); break;
      case 'teamSummary':  await Render.teamSummary(); break;
      case 'settings':     await Render.settings(); break;
      case 'help':         Render.help(); break;
      case 'admin':
        switchAdminTab('roadmap');
        break;
      default:
        if (section.startsWith('tracked-')) {
          const pid = parseInt(section.replace('tracked-',''));
          await Render.trackedPlayer(pid);
        }
        break;
    }
  }

  return { go, refresh, current: () => current };
})();

const Toast = (() => {
  let timer;
  function show(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'show error' : 'show';
    clearTimeout(timer);
    timer = setTimeout(()=>t.className='', 2800);
  }
  function error(msg) { show(msg, true); }
  return { show, error };
})();

const Confirm = (() => {
  let _cb = null;
  function show(title, msg, cb) {
    _cb = cb;
    document.getElementById('dialogTitle').textContent = title;
    document.getElementById('dialogMsg').textContent = msg;
    document.getElementById('confirmDialog').classList.add('open');
  }
  function resolve(yes) {
    document.getElementById('confirmDialog').classList.remove('open');
    if (yes && _cb) _cb();
    _cb = null;
  }
  return { show, resolve };
})();

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Shortens a full name to "First Last" for compact table display.
// "Lorenzo Morenda Mabere" -> "Lorenzo Mabere". Names with 1-2 words pass through unchanged.
function shortName(fullName) {
  if (!fullName) return '';
  const parts = String(fullName).trim().split(/\s+/);
  if (parts.length <= 2) return fullName;
  return parts[0] + ' ' + parts[parts.length - 1];
}
function fmtDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

};

function getFlagsForNationality(nat) {
  if (!nat) return '';
  const parts = nat.split('/').map(s => s.trim().toLowerCase());
  const flags = parts.map(p => NATIONALITY_FLAGS[p] || '').filter(Boolean);
  return flags.length ? flags.join(' ') : '&#127760;'; // globe fallback

function calcAge(dob) {
  if (!dob) return null;
  const birth = new Date(dob);
  if (isNaN(birth)) return null;
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  const monthDiff = now.getMonth() - birth.getMonth();
  if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birth.getDate())) age--;
  return age;
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// CSV PARSER (synchronous — no async, no await)
// ══════════════════════════════════════════════════════════════════════════════
function parseCSVText(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase().replace(/\s+/g,''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  });
}

// FILE INPUT HANDLERS — using FileReader callbacks (no async/await in read)
// ══════════════════════════════════════════════════════════════════════════════
function onRestoreFileChange(input) {
  const file = input.files && input.files[0];
  dbgLog('Restore file input changed');
  if (!file) { dbgLog('No file selected'); return; }
  dbgLog('File selected: ' + file.name + ' | type: ' + file.type + ' | size: ' + file.size + ' bytes');
  const infoEl = document.getElementById('restoreFileInfo');
  if (infoEl) infoEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  const reader = new FileReader();
  reader.onerror = function() { dbgLog('FileReader error'); Toast.error('Could not read file.'); input.value=''; };
  reader.onload = function(e) {
    dbgLog('FileReader onload fired');
    const text = e.target.result;
    let parsed;
    try { parsed = JSON.parse(text); } catch(x) { dbgLog('JSON parse failed: ' + x.message); Toast.error('Invalid JSON file.'); input.value=''; return; }
    if (!parsed.data || !Array.isArray(parsed.data.seasons)) {
      dbgLog('JSON missing required data'); Toast.error('File is missing required data.'); input.value=''; return;
    }
    dbgLog('JSON valid — seasons: ' + parsed.data.seasons.length + ' | players: ' + (parsed.data.players||[]).length);
    input.value = '';
    doRestore(parsed);
  };
  dbgLog('FileReader readAsText starting...');
  reader.readAsText(file);
}

function doRestore(parsed) {
  Confirm.show('Restore Backup', 'This will overwrite ALL current data. Are you sure?', async () => {
    dbgLog('Restore confirmed — starting...');
    try {
      await Backup.create('before-restore');
      await DB.restoreAllStores(parsed.data);
      await loadMeta();
      dbgLog('Restore complete.');
      Toast.show('Data restored successfully.');
      await Nav.go('home');
    } catch(err) { dbgLog('Restore error: ' + err.message); Toast.error(err.message); }
  });
}

function handlePasteRestore() {
  const text = (document.getElementById('pasteRestoreJSON')||{}).value||'';
  dbgLog('Paste restore triggered — length: ' + text.length);
  if (!text.trim()) { Toast.error('Nothing pasted.'); return; }
  let parsed;
  try { parsed = JSON.parse(text); } catch(x) { Toast.error('Invalid JSON.'); return; }
  if (!parsed.data || !Array.isArray(parsed.data.seasons)) { Toast.error('JSON missing required data.'); return; }
  dbgLog('Pasted JSON valid — restoring...');
  doRestore(parsed);
}

function onImportFileChange(input, type) {
  const file = input.files && input.files[0];
  dbgLog(type + ' file input changed');
  if (!file) { dbgLog('No file selected'); return; }
  dbgLog('File: ' + file.name + ' | type: ' + file.type + ' | size: ' + file.size + ' bytes');
  const infoId = 'import' + type.charAt(0).toUpperCase() + type.slice(1) + 'FileInfo';
  const infoEl = document.getElementById(infoId);
  if (infoEl) infoEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'csv') { Toast.error('Only CSV files are supported in Phase 1. Excel coming soon.'); input.value=''; return; }
  const reader = new FileReader();
  reader.onerror = function() { dbgLog('FileReader error for ' + type); Toast.error('Could not read file.'); input.value=''; };
  reader.onload = function(e) {
    dbgLog('FileReader onload for ' + type);
    const text = e.target.result;
    const rows = parseCSVText(text);
    dbgLog('Parse complete — rows found: ' + rows.length);
    input.value = '';
    processImportRows(rows, type);
  };
  reader.readAsText(file);
}

function handlePasteImport(type) {
  const pasteId = 'paste' + type.charAt(0).toUpperCase() + type.slice(1) + 'CSV';
  const text = (document.getElementById(pasteId)||{}).value||'';
  dbgLog('Paste import for ' + type + ' — length: ' + text.length);
  if (!text.trim()) { Toast.error('Nothing pasted.'); return; }
  const rows = parseCSVText(text);
  dbgLog('Paste parse complete — rows: ' + rows.length);
  processImportRows(rows, type);
}

// SYNC MODULE
// ══════════════════════════════════════════════════════════════════════════════
const Sync = (() => {
  // Config loaded from IndexedDB appMeta
  let _cfg = { url:'', anonKey:'', familyId:'', deviceId:'', deviceName:'' };
  let _status = 'disconnected'; // disconnected | connected | syncing | error
  let _lastSync = null;
  let _pendingCount = 0;
  let _log = [];

  // Stores that sync to cloud (backups excluded — too large)
  const SYNC_STORES = ['seasons','players','games','gamePlayers','achievements','clubHistory','globalPlayers','opponents'];

  function log(msg) {
    const line = new Date().toLocaleTimeString() + ' — ' + msg;
    _log.push(line);
    if (_log.length > 100) _log.shift();
    console.log('[Sync]', msg);
    const el = document.getElementById('syncLog');
    if (el) { el.innerHTML = _log.map(l=>`<div>${l}</div>`).join(''); el.scrollTop = el.scrollHeight; }
  }

  function isConfigured() {
    return !!((_cfg.url||'').trim() && (_cfg.anonKey||'').trim() && (_cfg.familyId||'').trim());
  }

  function isOnline() { return navigator.onLine; }

  // ── PRE-CONFIGURED SUPABASE DEFAULTS ─────────────────────────────────────
  const DEFAULTS = {
    supabaseUrl:    'https://wicydcvdakqopodbxtrl.supabase.co',
    supabaseAnonKey:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpY3lkY3ZkYWtxb3BvZGJ4dHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MDA5NTUsImV4cCI6MjA5NzE3Njk1NX0._sIaztNAGi9ffuL8qz84G-q_h5TIKTYbyjcnD9VwbE0',
    familyId:       'vmabere',
  };

  async function loadConfig() {
    // Seed defaults into DB if not already saved
    for (const [k, v] of Object.entries(DEFAULTS)) {
      const existing = await DB.get('appMeta', k);
      if (!existing || !existing.value) {
        await DB.put('appMeta', { metaKey: k, value: v });
      }
    }

    const keys = ['supabaseUrl','supabaseAnonKey','familyId','deviceId','deviceName'];
    for (const k of keys) {
      const m = await DB.get('appMeta', k);
      if (m) _cfg[k === 'supabaseUrl' ? 'url' : k === 'supabaseAnonKey' ? 'anonKey' : k] = m.value || '';
    }
    // Auto-generate deviceId if missing
    if (!_cfg.deviceId) {
      _cfg.deviceId = 'dev-' + Math.random().toString(36).slice(2,10);
      await DB.put('appMeta', { metaKey:'deviceId', value: _cfg.deviceId });
    }
    const lsm = await DB.get('appMeta', 'lastSyncAt');
    _lastSync = lsm ? lsm.value : null;
  }

  async function saveConfig(url, anonKey, familyId, deviceName) {
    _cfg.url = url.trim();
    _cfg.anonKey = anonKey.trim();
    _cfg.familyId = familyId.trim();
    _cfg.deviceName = deviceName.trim();
    await DB.put('appMeta', { metaKey:'supabaseUrl', value: _cfg.url });
    await DB.put('appMeta', { metaKey:'supabaseAnonKey', value: _cfg.anonKey });
    await DB.put('appMeta', { metaKey:'familyId', value: _cfg.familyId });
    await DB.put('appMeta', { metaKey:'deviceName', value: _cfg.deviceName });
  }

  // ── LOW-LEVEL SUPABASE REST ────────────────────────────────────────────────
  function storeToTable(store) {
    const map = {
      seasons: 'seasons',
      players: 'players',
      games: 'games',
      gamePlayers: 'game_players',
      achievements: 'achievements',
      clubHistory: 'club_history',
      globalPlayers: 'global_players',
      opponents: 'opponents',
    };
    return map[store] || store;
  }

  async function supabaseRequest(method, table, body, params) {
    if (!isConfigured()) throw new Error('Sync not configured.');
    const base = _cfg.url.replace(/\/rest\/v1\/?$/, '').replace(/\/$/, '') + '/rest/v1/';
    let url = base + table;
    const qs = params ? new URLSearchParams(params).toString() : '';
    if (qs) url += '?' + qs;

    // Prefer header per method
    // POST = insert, PATCH = update, GET = select
    const prefer = (method === 'POST' || method === 'PATCH')
      ? 'return=representation'
      : 'return=representation';

    const res = await fetch(url, {
      method,
      headers: {
        'apikey':        _cfg.anonKey,
        'Authorization': 'Bearer ' + _cfg.anonKey,
        'Content-Type':  'application/json',
        'Prefer':        prefer,
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error('Supabase error ' + res.status + ': ' + err.slice(0,200));
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  async function testConnection() {
    if (!isConfigured()) return { ok: false, msg: 'Missing URL, key, or family ID.' };
    try {
      await supabaseRequest('GET', 'seasons', null, { family_id: 'eq.' + _cfg.familyId, limit: '1' });
      _status = 'connected';
      return { ok: true, msg: 'Connection successful.' };
    } catch(e) {
      _status = 'error';
      return { ok: false, msg: e.message };
    }
  }

  // ── PUSH: local → cloud ────────────────────────────────────────────────────
  async function push() {
    if (!isConfigured() || !isOnline()) return 0;
    let pushed = 0;
    for (const store of SYNC_STORES) {
      let records;
      try { records = await DB.getAll(store); } catch(e) { continue; }
      const pending = records.filter(r => r.syncStatus === 'local' || r.syncStatus === 'modified');
      for (const record of pending) {
        const localId = String(record[getKey(store)]);
        const isUpdate = !!record.cloudId;
        const operation = isUpdate ? 'UPDATE' : 'INSERT';

        // Build cloud row — NEVER include local IndexedDB id as Supabase id
        // payload stores the full record but strip cloudId/syncStatus from it
        const payloadClean = { ...record };
        delete payloadClean.cloudId;
        delete payloadClean.syncStatus;

        const cloudRow = {
          family_id:  _cfg.familyId,
          device_id:  _cfg.deviceId,
          local_id:   localId,
          payload:    payloadClean,
          updated_at: record.updatedAt || new Date().toISOString(),
          sync_status:'synced',
        };
        // Only include id when updating an existing cloud row
        if (isUpdate) cloudRow.id = record.cloudId;

        log(operation + ' | store:' + store + ' | local_id:' + localId + ' | cloudId:' + (record.cloudId||'none'));

        try {
          let result;
          if (isUpdate) {
            // PATCH existing row by cloudId
            result = await supabaseRequest(
              'PATCH',
              storeToTable(store),
              cloudRow,
              { id: 'eq.' + record.cloudId }
            );
          } else {
            // INSERT new row — no id field sent, Supabase generates it
            result = await supabaseRequest('POST', storeToTable(store), cloudRow);
          }

          // Save returned Supabase id as cloudId in local record
          if (result && result[0] && result[0].id) {
            record.cloudId = result[0].id;
          }
          record.syncStatus = 'synced';
          await _origPut(store, record);
          pushed++;
          log('OK | store:' + store + ' | cloudId:' + (record.cloudId||'—'));
        } catch(e) {
          log('Push error | store:' + store + ' | local_id:' + localId + ' | ' + e.message);
        }
      }
    }
    log('Push complete: ' + pushed + ' records sent.');
    return pushed;
  }

  // ── PULL: cloud → local ────────────────────────────────────────────────────
  async function pull() {
    if (!isConfigured() || !isOnline()) return 0;
    let pulled = 0;
    const sinceParam = _lastSync ? { family_id: 'eq.'+_cfg.familyId, updated_at: 'gt.'+_lastSync } : { family_id: 'eq.'+_cfg.familyId };
    for (const store of SYNC_STORES) {
      let cloudRecords;
      try { cloudRecords = await supabaseRequest('GET', storeToTable(store), null, sinceParam); } catch(e) { log('Pull error '+store+': '+e.message); continue; }
      for (const cr of cloudRecords) {
        if (!cr.payload) continue;
        const payload = cr.payload;
        payload.cloudId = cr.id;
        payload.syncStatus = 'synced';
        // Check if local record exists
        const localKey = getKey(store);
        let existing = null;
        try {
          // Find by cloudId
          const all = await DB.getAll(store);
          existing = all.find(r => r.cloudId === cr.id);
        } catch(e) {}
        // Conflict: cloud wins if updatedAt is newer
        if (existing) {
          const localTime = new Date(existing.updatedAt||0).getTime();
          const cloudTime = new Date(cr.updated_at||0).getTime();
          if (cloudTime <= localTime) continue; // local is newer, skip
        }
        // Handle soft delete
        if (cr.deleted_at) {
          payload.deletedAt = cr.deleted_at;
          payload.syncStatus = 'deleted';
        }
        try { await _origPut(store, payload); pulled++; } catch(e) { log('Pull write error: '+e.message); }
      }
    }
    _lastSync = new Date().toISOString();
    await DB.put('appMeta', { metaKey:'lastSyncAt', value: _lastSync });
    log('Pull complete: ' + pulled + ' records received.');
    return pulled;
  }

  // ── FULL SYNC ──────────────────────────────────────────────────────────────
  async function run(silent=false) {
    if (!isConfigured()) { if (!silent) Toast.error('Sync not configured. Add Supabase settings first.'); return; }
    if (!isOnline()) { if (!silent) Toast.error('No internet connection.'); return; }
    _status = 'syncing';
    updateSyncUI();
    if (!silent) log('Starting sync...');
    try {
      const pulled = await pull();
      const pushed = await push();
      _status = 'connected';
      if (!silent) {
        log('Sync complete — pulled: ' + pulled + ', pushed: ' + pushed);
        Toast.show('Sync complete. ' + pulled + ' received, ' + pushed + ' sent.');
      }
    } catch(e) {
      _status = 'error';
      log('Sync failed: ' + e.message);
      if (!silent) Toast.error('Sync failed: ' + e.message);
    }
    updateSyncUI();
  }

  // ── RESET CLOUD IDs — clears cloudId so next push is all INSERTs ──────────
  async function resetLocalCloudIds() {
    log('Resetting local cloudIds — next push will be clean INSERTs...');
    for (const store of SYNC_STORES) {
      try {
        const all = await DB.getAll(store);
        for (const r of all) {
          delete r.cloudId;
          r.syncStatus = 'local';
          r.updatedAt = r.updatedAt || new Date().toISOString();
          await _origPut(store, r);
        }
        log('Reset ' + all.length + ' records in ' + store);
      } catch(e) { log('Reset error ' + store + ': ' + e.message); }
    }
    log('Reset complete — ready for clean push.');
  }

  // ── UPLOAD ALL (full push regardless of syncStatus) ────────────────────────
  async function uploadAll() {
    if (!isConfigured() || !isOnline()) { Toast.error('Not configured or offline.'); return; }
    log('Uploading all local data...');
    // Mark everything as modified first
    for (const store of SYNC_STORES) {
      try {
        const all = await DB.getAll(store);
        for (const r of all) {
          if (!r.syncStatus || r.syncStatus === 'synced') {
            r.syncStatus = 'modified';
            r.updatedAt = r.updatedAt || new Date().toISOString();
            await _origPut(store, r); // bypass wrapper
          }
        }
      } catch(e) {}
    }
    await run();
  }

  // ── DOWNLOAD ALL (full pull, ignore lastSyncAt) ───────────────────────────
  async function downloadAll() {
    if (!isConfigured()) { Toast.error('Sync not configured.'); return; }
    if (!isOnline()) { Toast.error('No internet connection.'); return; }
    _lastSync = null;
    await _origPut('appMeta', { metaKey:'lastSyncAt', value: null });
    log('Download all started — ignoring last sync timestamp...');
    _status = 'syncing';
    updateSyncUI();
    try {
      const pulled = await pull();
      _status = 'connected';
      log('Download all complete — ' + pulled + ' records received.');
    } catch(e) {
      _status = 'error';
      log('Download error: ' + e.message);
    }
    updateSyncUI();
  }

  // ── PENDING COUNT ──────────────────────────────────────────────────────────
  async function getPendingCount() {
    let count = 0;
    for (const store of SYNC_STORES) {
      try {
        const all = await DB.getAll(store);
        count += all.filter(r => r.syncStatus === 'local' || r.syncStatus === 'modified').length;
      } catch(e) {}
    }
    _pendingCount = count;
    return count;
  }

  function getKey(store) {
    const keys = { seasons:'seasonId', players:'playerId', games:'gameId', gamePlayers:'gamePlayerId', achievements:'achievementId', clubHistory:'clubHistoryId', globalPlayers:'globalPlayerId', opponents:'opponentId' };
    return keys[store] || 'id';
  }

  function updateSyncUI() {
    const bar = document.getElementById('syncStatusBar');
    if (!bar) return;
    const labels = { connected:'Connected', disconnected:'Not configured', error:'Sync error', syncing:'Syncing...' };
    const cls = { connected:'connected', disconnected:'disconnected', error:'error', syncing:'syncing' };
    bar.className = 'sync-status-bar ' + (cls[_status]||'disconnected');
    bar.innerHTML = `<div class="sync-dot${_status==='syncing'?' pulse':''}"></div><span>${labels[_status]||'—'}</span>${_lastSync?`<span style="margin-left:auto;font-size:10px;opacity:.7">Last sync: ${fmtDateTime(_lastSync)}</span>`:''}`;
  }

  function getStatus() { return { status:_status, lastSync:_lastSync, pendingCount:_pendingCount, configured:isConfigured(), online:isOnline() }; }
  function fmtDateTime(d) { if(!d)return'—'; return new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }

  // ── DELETE ALL CLOUD ROWS FOR FAMILY ─────────────────────────────────────
  async function supabaseDelete(table) {
    const base = _cfg.url.replace(/\/rest\/v1\/?$/, '').replace(/\/$/, '') + '/rest/v1/';
    const url = base + table + '?' + new URLSearchParams({ family_id: 'eq.' + _cfg.familyId }).toString();
    const res = await fetch(url, {
      method: 'DELETE',
      headers: {
        'apikey': _cfg.anonKey,
        'Authorization': 'Bearer ' + _cfg.anonKey,
        'Prefer': 'return=minimal',
      },
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error('Delete error ' + res.status + ': ' + err.slice(0,200));
    }
  }

  return { loadConfig, saveConfig, testConnection, run, uploadAll, downloadAll, resetLocalCloudIds, supabaseDelete, getPendingCount, getStatus, updateSyncUI, log, isConfigured };
})();

function resetPlayerForm() {

async function savePlayer() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) { Toast.error('Player name is required.'); return; }
  const pos1 = document.getElementById('pf-pos1').value;
  if (!pos1) { Toast.error('Primary position is required.'); return; }
  if (!State.currentSeasonId) { Toast.error('No active season. Create one in Settings.'); return; }

  const existingId = document.getElementById('pf-id').value;
  const trackingStatus = document.getElementById('pf-tracked')?.value || null;
  const trackingLabel  = document.getElementById('pf-trackLabel')?.value.trim() || null;
  const relationship   = document.getElementById('pf-relationship')?.value.trim() || null;

  const player = {
    seasonId: State.currentSeasonId,
    fullName: name,
    shirtNumber: parseInt(document.getElementById('pf-num').value)||null,
    dateOfBirth: document.getElementById('pf-dob').value||null,
    nationality: document.getElementById('pf-nat').value.trim()||null,
    primaryPosition: pos1,
    secondaryPosition: document.getElementById('pf-pos2').value||null,
    dominantFoot: document.getElementById('pf-foot').value,
    height: parseFloat(document.getElementById('pf-height').value)||null,
    weight: parseFloat(document.getElementById('pf-weight').value)||null,
    developmentNotes: document.getElementById('pf-notes').value.trim()||null,
    trackingStatus: trackingStatus || null,
    trackingLabel: trackingLabel || null,
    relationship: relationship || null,
    isActive: true,
  };

  if (existingId) player.playerId = parseInt(existingId);
  await Backup.create('before-save');
  await DB.put('players', player);
  await buildTrackedNav(); // rebuild nav in case tracking status changed
  Toast.show(existingId ? 'Player updated.' : 'Player added.');
  document.getElementById('addPlayerPanel').classList.add('panel-hidden');
  resetPlayerForm();
  await Render.squad();
}

async function editPlayer(id) {

// ── SIMPLE GAME TABLE HANDLERS — every change re-renders the whole table ────
async function getOrCreateGP(gameId, playerId) {
  const all = await DB.getAll('gamePlayers','gameId',gameId);
  let gp = all.find(r => r.playerId === playerId);
  if (!gp) {
    gp = {
      gameId, playerId, seasonId: State.currentSeasonId,
      calledUp: false, role: 'Sub', playedFullGame: false,
      positionPlayed: null, goals: 0, assists: 0,
      yellowCards: 0, redCards: 0, playerOfTheMatch: false, captain: false,
      performanceNotes: null,
    };
  }
  return gp;
}

function countStarters(allGP, excludePlayerId) {
  return allGP.filter(r => r.role === 'Starter' && r.calledUp && r.playerId !== excludePlayerId).length;
}

// Checkbox: mark player as called up / not. Unticking clears role.
async function simpleSetCalledUp(gameId, playerId, checked) {
  try {
    const gp = await getOrCreateGP(gameId, playerId);
    gp.calledUp = checked;
    if (!checked) {
      gp.role = 'Sub';
      gp.playedFullGame = false;
    } else if (!gp.role) {
      gp.role = 'Sub';
    }
    await DB.put('gamePlayers', gp);
    Toast.show(checked ? 'Added to squad' : 'Removed from squad');
  } catch(err) {
    console.error('[simpleSetCalledUp] error:', err);
    Toast.error('Could not save: ' + err.message);
  } finally {
    await renderSimpleGameTable(gameId);
    await refreshGameHeaderScore(gameId);
  }
}

// Dropdown: Starter / Sub, max 11 starters.
async function simpleSetRole(gameId, playerId, role) {
  try {
    const allGP = await DB.getAll('gamePlayers','gameId',gameId);
    if (role === 'Starter') {
      const starterCount = countStarters(allGP, playerId);
      if (starterCount >= 11) {
        Toast.error('Maximum 11 Starters. Switch another Starter to Sub first.');
        await renderSimpleGameTable(gameId); // revert the dropdown
        return;
      }
    }
    const gp = await getOrCreateGP(gameId, playerId);
    gp.calledUp = true;
    gp.role = role;
    gp.playedFullGame = (role === 'Starter');
    await DB.put('gamePlayers', gp);
  } catch(err) {
    console.error('[simpleSetRole] error:', err);
    Toast.error('Could not save: ' + err.message);
  } finally {
    await renderSimpleGameTable(gameId);
  }
}

async function simpleSetField(gameId, playerId, field, value) {
  try {
    const gp = await getOrCreateGP(gameId, playerId);
    gp[field] = parseInt(value) || 0;
    await DB.put('gamePlayers', gp);
    await refreshGameHeaderScore(gameId);
  } catch(err) {
    console.error('[simpleSetField] error:', err);
    Toast.error('Could not save: ' + err.message);
  }
}

async function refreshGameHeaderScore(gameId) {
  const existingGP = await DB.getAll('gamePlayers','gameId',gameId);
  const game = await DB.get('games', gameId);
  if (!game) return;
  const ourScore = Calc.teamGoals(existingGP);
  const theirScore = parseInt(game.opponentScore)||0;
  const res = Calc.result(ourScore, theirScore);
  const s = Calc.homeAwayScore(game.homeAway, ourScore, theirScore);
  const scoreEl = document.getElementById('liveScore');
  const resultEl = document.getElementById('liveResult');
  if (scoreEl) scoreEl.textContent = `${s.home} — ${s.away}`;
  if (resultEl) { resultEl.textContent = res; resultEl.className = `badge badge-${res}`; }
}

// INIT
// ══════════════════════════════════════════════════════════════════════════════
async function init() {
  try {
    await DB.open();

    // ── Verify schema upgrade actually completed ──────────────────────────────
    // If a store is missing, the IndexedDB upgrade didn't run (version mismatch
    // or interrupted upgrade). Force a clean reopen rather than running silently
    // broken for the rest of the session.
    const requiredStores = ['appMeta','seasons','players','games','gamePlayers','goalEvents','events','playerGameStats','achievements','clubHistory'];
    const missing = requiredStores.filter(s => !DB.hasStore(s));
    if (missing.length) {
      console.error('[init] Missing IndexedDB stores after open:', missing);
      document.getElementById('loading').innerHTML = `
        <div style="text-align:center;padding:24px;max-width:340px">
          <p style="color:#b03030;font-weight:700;margin-bottom:10px">Database needs an update</p>
          <p style="font-size:12px;color:#666;margin-bottom:16px">A new version added features that need a one-time database upgrade. Missing: ${missing.join(', ')}</p>
          <button class="btn btn-primary" onclick="location.reload(true)">Reload App</button>
        </div>`;
      return;
    }

    await loadMeta();
    await Sync.loadConfig();

    // Backup at most once per 24 hours
    const lastBackupMeta = await DB.get('appMeta', 'lastAutoBackupAt');
    const lastAutoBackup = lastBackupMeta ? new Date(lastBackupMeta.value) : null;
    const now = new Date();
    const hoursSinceBackup = lastAutoBackup ? (now - lastAutoBackup) / 36e5 : 999;
    if (hoursSinceBackup >= 24) {
      await Backup.create('auto-daily');
      await _origPut('appMeta', { metaKey: 'lastAutoBackupAt', value: now.toISOString() });
    }

    attachEvents();
    await buildTrackedNav();
    await initAdmin();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // ── Restore last visited page after refresh ──────────────────────────────
    let restoredSection = 'home';
    try {
      const saved = sessionStorage.getItem('squadTracker_lastSection');
      // Only restore if the section element actually exists in the DOM
      if (saved && document.getElementById(`sec-${saved}`)) {
        restoredSection = saved;
      }
    } catch(e) {}

    await Nav.go(restoredSection);

    // Restore sub-tab state for Settings or Tracked Player pages
    try {
      if (restoredSection === 'settings') {
        const savedTab = sessionStorage.getItem('squadTracker_settingsTab');
        if (savedTab) {
          switchSettingsTab(savedTab);
          if (savedTab === 'import') {
            const savedImportTab = sessionStorage.getItem('squadTracker_importTab');
            if (savedImportTab) switchImportTab(savedImportTab);
          }
        }
      } else if (restoredSection.startsWith('tracked-')) {
        const pid = parseInt(restoredSection.replace('tracked-',''));
        const savedTab = sessionStorage.getItem('squadTracker_trackedTab');
        if (savedTab) switchTrackedTab(pid, savedTab);
      } else if (restoredSection === 'games') {
        // If a specific game was open, reopen it directly instead of the list
        const savedGameId = sessionStorage.getItem('squadTracker_openGameId');
        if (savedGameId) {
          const gameExists = await DB.get('games', parseInt(savedGameId));
          if (gameExists) await openGameDetail(parseInt(savedGameId));
        }
      }
    } catch(e) {}

    // Sync immediately on open if configured and online
    if (Sync.isConfigured() && navigator.onLine) {
      await Sync.run(true);
      // Refresh current section to show updated sync status
      if (Nav.current() === 'home') await Render.home();
      if (Nav.current() === 'dashboard') await Render.dashboard();
    }
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p style="color:red;padding:20px">Error loading app: ${e.message}</p>`;
    console.error(e);
  }
}

async function loadSheetJS() {
  if (_sheetjsLoaded || window.XLSX) { _sheetjsLoaded = true; return Promise.resolve(); }
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = () => { _sheetjsLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Could not load Excel library. Check internet connection.'));
    document.head.appendChild(s);
  });
}

function downloadImportTemplate(type, format) {
  const headers = type === 'players' ? PLAYER_HEADERS : GAME_HEADERS;
  const example = type === 'players'
    ? [['Jo\u00e3o Silva','10','2013-05-14','Portuguese','Left Winger','Right Winger','Right','145','38','Good dribbler']]
    : [['2025-09-14','Sporting CP B','Home','League','Liga Revela\u00e7\u00e3o','Est\u00e1dio Municipal','1','Good performance']];
  if (format === 'csv') {
    const rows = [headers, ...example].map(r => r.map(c => `"${c}"`).join(',')).join('\r\n');
    const blob = new Blob([rows], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${type}-template.csv`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  } else {
    loadSheetJS().then(() => {
      const wb = window.XLSX.utils.book_new();
      const ws = window.XLSX.utils.aoa_to_sheet([headers, ...example]);
      window.XLSX.utils.book_append_sheet(wb, ws, type === 'players' ? 'Players' : 'Games');
      window.XLSX.writeFile(wb, `${type}-template.xlsx`);
    }).catch(e => Toast.show(e.message, true));
  }
}

function parseCSVImport(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim(); });
    return obj;
  });
}

async function parseImportFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const text = await file.text();
    return parseCSVImport(text);
  } else if (ext === 'xlsx' || ext === 'xls') {
    await loadSheetJS();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = window.XLSX.read(e.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          resolve(window.XLSX.utils.sheet_to_json(ws, { defval: '' }));
        } catch(err) { reject(new Error(I18n.t('import_invalid_file'))); }
      };
      reader.onerror = () => reject(new Error(I18n.t('import_invalid_file')));
      reader.readAsBinaryString(file);
    });
  } else {
    throw new Error(I18n.t('import_invalid_file'));
  }
}

async function validateImportPlayers(rows) {
  if (!State.currentSeasonId) throw new Error(I18n.t('import_no_season'));
  const existing = await DB.getAll('players', 'seasonId', State.currentSeasonId);
  return rows.map((row, i) => {
    const name = (row['Full Name'] || '').trim();
    const dob = (row['Date of Birth'] || '').trim();
    const pos = (row['Primary Position'] || '').trim();
    let status = 'ok', reason = '';
    if (!name) {
      status = 'skip'; reason = I18n.t('import_missing_name');
    } else if (!pos) {
      status = 'skip'; reason = I18n.t('import_missing_pos');
    } else if (dob) {
      // Option 2: Name + DOB = unique key. If both match → skip as duplicate.
      const dup = existing.find(p =>
        p.fullName.trim().toLowerCase() === name.toLowerCase() &&
        p.dateOfBirth && p.dateOfBirth === dob
      );
      if (dup) { status = 'skip'; reason = I18n.t('import_dup_name_dob'); }
    } else {
      // No DOB: always import but flag for manual review
      status = 'warn'; reason = I18n.t('import_no_dob_flag');
    }
    return {
      rowNum: i + 2, status, reason,
      data: {
        fullName: name,
        shirtNumber: parseInt(row['Shirt Number']) || null,
        dateOfBirth: dob || null,
        nationality: (row['Nationality'] || '').trim() || null,
        primaryPosition: pos,
        secondaryPosition: (row['Secondary Position'] || '').trim() || null,
        dominantFoot: (row['Dominant Foot'] || 'Right').trim(),
        height: parseFloat(row['Height (cm)']) || null,
        weight: parseFloat(row['Weight (kg)']) || null,
        developmentNotes: (row['Development Notes'] || '').trim() || null,
        trackingStatus: null, trackingLabel: null, relationship: null, isActive: true, seasonId: State.currentSeasonId
      }
    };
  });
}

async function validateImportGames(rows) {
  if (!State.currentSeasonId) throw new Error(I18n.t('import_no_season'));
  const existing = await DB.getAll('games', 'seasonId', State.currentSeasonId);
  return rows.map((row, i) => {
    const date = (row['Date'] || '').trim();
    const opp = (row['Opponent'] || '').trim();
    let status = 'ok', reason = '';
    if (!date) {
      status = 'skip'; reason = I18n.t('import_missing_date');
    } else if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
      status = 'skip'; reason = I18n.t('import_invalid_date');
    } else if (!opp) {
      status = 'skip'; reason = I18n.t('import_missing_opp');
    } else {
      const dup = existing.find(g => g.date === date && g.opponent.toLowerCase() === opp.toLowerCase());
      if (dup) { status = 'skip'; reason = I18n.t('import_dup_game'); }
    }
    return {
      rowNum: i + 2, status, reason,
      data: {
        date, opponent: opp,
        homeAway: (row['Home/Away'] || 'Home').trim(),
        competitionType: (row['Competition Type'] || 'League').trim(),
        competitionName: (row['Competition Name'] || '').trim() || null,
        venue: (row['Venue'] || '').trim() || null,
        opponentScore: parseInt(row['Opponent Score']) || 0,
        teamNotes: (row['Team Notes'] || '').trim() || null,
        seasonId: State.currentSeasonId, createdAt: new Date().toISOString()
      }
    };
  });
}

function renderImportPreview(validated, containerId, type) {
  _previewData = validated;
  const el = document.getElementById(containerId);
  if (!validated.length) {
    el.innerHTML = '<p style="color:#999;font-size:12px;margin-top:12px">No data rows found in file.</p>';
    return;
  }
  const ok = validated.filter(r => r.status === 'ok').length;
  const skip = validated.filter(r => r.status === 'skip').length;
  const warn = validated.filter(r => r.status === 'warn').length;
  const toImport = ok + warn;

  const headers = type === 'players'
    ? ['Row','Name','Shirt #','DOB','Nationality','Position','Status']
    : ['Row','Date','Opponent','Venue','Competition','Status'];

  const rows = validated.map(r => {
    const cls = r.status === 'skip' ? 'row-skip' : r.status === 'warn' ? 'row-warn' : '';
    const badge = r.status === 'ok'
      ? `<span class="badge badge-W">${I18n.t('status_ok')}</span>`
      : r.status === 'warn'
        ? `<span class="badge badge-warn">${I18n.t('status_warn')}: ${r.reason}</span>`
        : `<span class="badge badge-L">${I18n.t('status_skip')}: ${r.reason}</span>`;
    if (type === 'players') {
      return `<tr class="${cls}">
        <td>${r.rowNum}</td>
        <td style="font-weight:700">${r.data.fullName}</td>
        <td style="text-align:center">${r.data.shirtNumber || '—'}</td>
        <td>${r.data.dateOfBirth || '—'}</td>
        <td>${r.data.nationality || '—'}</td>
        <td><span class="pos-pill">${r.data.primaryPosition || '—'}</span></td>
        <td>${badge}</td></tr>`;
    } else {
      return `<tr class="${cls}">
        <td>${r.rowNum}</td>
        <td>${r.data.date || '—'}</td>
        <td style="font-weight:700">${r.data.opponent}</td>
        <td>${r.data.homeAway}</td>
        <td>${r.data.competitionType}</td>
        <td>${badge}</td></tr>`;
    }
  }).join('');

  el.innerHTML = `
    <div style="margin:16px 0 12px">
      <div class="ir-row ir-ok" style="display:inline-flex;margin-right:8px">✓ ${ok} ${I18n.t('status_ok')}</div>
      ${warn ? `<div class="ir-row ir-warn" style="display:inline-flex;margin-right:8px">⚠ ${warn} ${I18n.t('status_warn')}</div>` : ''}
      ${skip ? `<div class="ir-row ir-skip" style="display:inline-flex">✗ ${skip} ${I18n.t('status_skip')}</div>` : ''}
    </div>
    <div style="font-size:12px;font-weight:700;margin-bottom:8px">${I18n.t('import_preview')}</div>
    <div class="game-detail-table-wrap" style="margin-bottom:14px">
      <table class="game-detail-table">
        <thead><tr>${headers.map((h,i) => `<th${i===0?' class="col-sticky-num" style="min-width:60px"':''}>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="btn btn-primary" onclick="confirmImport('${type}')" ${toImport === 0 ? 'disabled' : ''}>
      ${I18n.t('btn_import_confirm')} (${toImport})
    </button>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// IMPORT PROCESSING
// ══════════════════════════════════════════════════════════════════════════════
async function processImportRows(rows, type) {
  dbgLog('processImportRows: type=' + type + ' rows=' + rows.length);
  if (!rows.length) { Toast.error('No data rows found in file.'); return; }
  if (!State.currentSeasonId) { Toast.error('No active season. Create one in Settings first.'); return; }

  let validated = [];
  if (type === 'players') validated = await validateImportPlayers(rows);
  else if (type === 'games') validated = await validateImportGames(rows);
  else if (type === 'opponents') validated = validateImportOpponents(rows);

  const ok = validated.filter(r=>r.status==='ok').length;
  const warn = validated.filter(r=>r.status==='warn').length;
  const skip = validated.filter(r=>r.status==='skip').length;
  const err = validated.filter(r=>r.status==='err').length;
  dbgLog('Validation: ok=' + ok + ' warn=' + warn + ' skip=' + skip + ' err=' + err);

  const previewId = 'import' + type.charAt(0).toUpperCase() + type.slice(1) + 'Preview';
  renderImportPreview(validated, previewId, type);
}

async function validateImportPlayers(rows) {
  const existing = await DB.getAll('players', 'seasonId', State.currentSeasonId);
  return rows.map(r => {
    const name = r.fullname || r['full name'] || r.name || '';
    const dob = r.dateofbirth || r['date of birth'] || r.dob || '';
    const pos = r.primaryposition || r['primary position'] || r.position || '';
    const shirt = r.shirtnumber || r['shirt number'] || r.number || '';
    if (!name.trim()) return { status:'err', reason:'Name required', display:[name||'—',dob,pos,shirt] };
    if (!pos.trim()) return { status:'err', reason:'Position required', display:[name,dob,pos,shirt] };
    const dup = existing.find(p =>
      p.fullName.toLowerCase()===name.toLowerCase().trim() && dob.trim() && p.dateOfBirth===dob.trim()
    );
    if (dup) return { status:'skip', reason:'Duplicate (same name + DOB)', display:[name,dob,pos,shirt] };
    const status = dob.trim() ? 'ok' : 'warn';
    const reason = dob.trim() ? '' : 'No DOB — verify manually';
    return {
      status, reason, display:[name,dob||'—',pos,shirt||'—'],
      data: {
        seasonId: State.currentSeasonId,
        fullName: name.trim(),
        shirtNumber: shirt ? parseInt(shirt)||null : null,
        dateOfBirth: dob.trim()||null,
        nationality: (r.nationality||'').trim()||null,
        primaryPosition: pos.trim(),
        secondaryPosition: (r.secondaryposition||r['secondary position']||'').trim()||null,
        dominantFoot: (r.dominantfoot||r['dominant foot']||'').trim()||null,
        height: r.height ? parseInt(r.height)||null : null,
        weight: r.weight ? parseInt(r.weight)||null : null,
        isActive: true,
        trackingStatus: null,
        developmentNotes: (r.notes||r.developmentnotes||'').trim()||null,
        createdAt: new Date().toISOString(),
      }
    };
  });
}

async function validateImportGames(rows) {
  const existing = await DB.getAll('games', 'seasonId', State.currentSeasonId);
  return rows.map(r => {
    const date = (r.date||'').trim();
    const opp = (r.opponent||r.opponentname||r['opponent name']||'').trim();
    const ha = (r.homeaway||r['home/away']||r.venue||'Home').trim();
    const compType = (r.competitiontype||r['competition type']||'League').trim();
    const compName = (r.competitionname||r['competition name']||'').trim();
    const venue = (r.venue||r.ground||'').trim();
    const oppScore = parseInt(r.opponentscore||r['opponent score']||'0')||0;
    const notes = (r.notes||'').trim();
    if (!date) return { status:'err', reason:'Date required', display:[date,opp,ha] };
    if (!opp) return { status:'err', reason:'Opponent required', display:[date,opp,ha] };
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return { status:'err', reason:'Date must be YYYY-MM-DD', display:[date,opp,ha] };
    const dup = existing.find(g => g.date===date && (g.opponent||'').toLowerCase()===opp.toLowerCase());
    if (dup) return { status:'skip', reason:'Duplicate (same date + opponent)', display:[date,opp,ha] };
    return {
      status:'ok', reason:'', display:[date,opp,ha],
      data: {
        seasonId: State.currentSeasonId,
        date, opponent: opp, homeAway: ha,
        competitionType: compType, competitionName: compName||null,
        venue: venue||null, opponentScore: oppScore,
        teamNotes: notes||null, createdAt: new Date().toISOString(),
      }
    };
  });
}

function validateImportOpponents(rows) {
  return rows.map(r => {
    const name = (r.opponentname||r.opponent||r.name||'').trim();
    if (!name) return { status:'err', reason:'Name required', display:['—','—','—'] };
    return {
      status:'ok', reason:'', display:[name, r.agegroup||'—', r.level||'—'],
      data: { opponentName: name, ageGroup: r.agegroup||null, level: r.level||null, notes: r.notes||null }
    };
  });
}

function renderImportPreview(validated, previewId, type) {
  const el = document.getElementById(previewId);
  if (!el) return;
  const ok = validated.filter(r=>r.status==='ok').length;
  const warn = validated.filter(r=>r.status==='warn').length;
  const skip = validated.filter(r=>r.status==='skip').length;
  const err = validated.filter(r=>r.status==='err').length;
  const canImport = ok + warn;
  el.innerHTML = `
    <div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <span class="badge-ok">${ok} ready</span>
      ${warn?`<span class="badge-warn">${warn} flagged</span>`:''}
      ${skip?`<span class="badge-skip">${skip} skipped</span>`:''}
      ${err?`<span class="badge-err">${err} errors</span>`:''}
      ${canImport?`<button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="confirmImport('${type}',window._importData_${type})">Import ${canImport} rows</button>`:''}
    </div>
    <div style="overflow-x:auto"><table class="import-preview-table">
      <thead><tr><th>Status</th><th>Name / Date</th><th>Col 2</th><th>Col 3</th><th>Reason</th></tr></thead>
      <tbody>${validated.map(r=>`
        <tr class="row-${r.status}">
          <td><span class="badge-${r.status}">${r.status.toUpperCase()}</span></td>
          <td>${r.display[0]||'—'}</td><td>${r.display[1]||'—'}</td><td>${r.display[2]||'—'}</td>
          <td style="color:#999;font-size:10px">${r.reason}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  window['_importData_' + type] = validated;
}

async function confirmImport(type, validated) {
  if (!validated) return;
  const toImport = validated.filter(r => r.status==='ok' || r.status==='warn');
  if (!toImport.length) return;
  await Backup.create('before-import');
  let count = 0;
  for (const r of toImport) {
    const store = type==='players' ? 'players' : type==='games' ? 'games' : 'opponents';
    await DB.put(store, r.data);
    count++;
  }
  dbgLog('Import done: ' + count + ' rows written to ' + type);
  Toast.show(count + ' ' + type + ' imported successfully.');
  const previewId = 'import' + type.charAt(0).toUpperCase() + type.slice(1) + 'Preview';
  const el = document.getElementById(previewId);
  if (el) el.innerHTML = '<div style="padding:10px;background:#f0faf2;border-radius:3px;font-size:13px;color:#2a7a3b;font-weight:600">&#10003; Import complete — ' + count + ' rows added.</div>';
  window['_importData_' + type] = null;
}

function switchSettingsTab(tab) {
  State.currentSettingsTab = tab;
  try { sessionStorage.setItem('squadTracker_settingsTab', tab); } catch(e) {}
  ['seasons','import','sync','backup','danger'].forEach(t => {
    const panel = document.getElementById(`stab-panel-${t}`);
    const btn   = document.getElementById(`stab-${t}`);
    if (panel) panel.style.display = t === tab ? '' : 'none';
    if (btn)   btn.classList.toggle('active-tab', t === tab);
  });
  // If switching to import, ensure players tab is shown and subtitle is set
  if (tab === 'import') {
    switchImportTab('players');
    renderImportSection();
  }
}

function switchImportTab(tab) {
  try { sessionStorage.setItem('squadTracker_importTab', tab); } catch(e) {}
  ['players','games','opponents'].forEach(t => {
    const panel = document.getElementById('import' + t.charAt(0).toUpperCase() + t.slice(1) + 'Panel');
    const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (panel) panel.style.display = t===tab ? 'block' : 'none';
    if (btn) { btn.classList.toggle('active-tab', t===tab); }
  });
}

function renderImportSection() {
  const sub = document.getElementById('importSubtitle');
  if (sub) sub.textContent = State.currentSeason ? State.currentSeason.seasonName : '';
}
