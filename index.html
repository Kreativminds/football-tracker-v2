// ── TRAINING TAB — shared between guardian view and player portal ──────────
// viewAs is 'guardian' or 'player' — controls which buttons are shown.
// Guardian: can see everything, create sessions FOR the player, cannot edit
// or delete a player-created session.
// Player: can see everything, create/edit/delete only their OWN sessions,
// can mark a guardian-assigned session as completed (filling in results)
// but cannot delete or reassign it.
async function renderPlayerTraining(playerId, viewAs) {
  const el = document.getElementById(viewAs === 'player' ? 'pp-training-content' : `tracked-training-${playerId}`);
  if (!el) return;
  const player = await DB.get('players', playerId);
  if (!player) return;

  const sessions = await getTrainingSessionsForPlayer(playerId, State.currentSeasonId);
  sessions.sort((a,b) => new Date(b.scheduledDate||0) - new Date(a.scheduledDate||0));

  const { totals } = await getTrainingProgress(playerId, State.currentSeasonId);
  const progressKeys = Object.keys(totals);
  const progressCustomDrillsList = await getAllCustomDrills();

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <h3 style="font-size:14px;font-weight:700">${I18n.t('tr_title')} — ${esc(shortName(player.fullName))}</h3>
      <button class="btn btn-primary btn-sm" onclick="openTrainingForm(${playerId},'${viewAs}')">+ ${viewAs==='guardian' ? I18n.t('tr_btn_create_for_player', {name: shortName(player.fullName)}) : I18n.t('tr_form_title')}</button>
    </div>

    <div id="trainingFormPanel-${playerId}" class="form-panel panel-hidden" style="margin-bottom:16px"></div>

    <div class="card" style="margin-bottom:14px">
      <div id="packsListPanel"></div>
    </div>

    ${progressKeys.length ? `
    <div class="card" style="margin-bottom:14px">
      <div class="card-title">${I18n.t('tr_progress_title')}</div>
      ${progressKeys.map(drillKey => {
        const t = totals[drillKey];
        const fieldEntries = Object.entries(t.fieldSums);
        const customDrillMatch = t.isCustom ? progressCustomDrillsList.find(d => String(d.drillId) === String(drillKey)) : null;
        const label = t.isLibrary ? libDrillDisplayName(drillKey) : (t.isCustom ? (customDrillMatch?.name || drillKey) : drillTypeLabel(drillKey));
        const doneCount = t.sessionCount - t.skippedCount;
        return `<div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:700;margin-bottom:4px">${esc(label)}
            <span style="color:var(--muted);font-weight:400">(${doneCount} ${I18n.t('tr_progress_sessions_suffix')}${t.skippedCount?', '+t.skippedCount+' '+I18n.t('tr_progress_skipped_suffix'):''})</span>
          </div>
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            ${fieldEntries.map(([fk,sum]) => {
              const fLabel = t.isLibrary
                ? (getLibraryDrill(drillKey)?.kpiFields.find(f=>f.key===fk)?.label || fk)
                : (t.isCustom ? (customDrillMatch?.kpiFields.find(f=>f.key===fk)?.label || fk) : drillFieldLabel(drillKey,fk));
              return `<div style="font-size:11px;color:var(--muted)">${esc(fLabel)}: <strong style="color:var(--dark)">${sum}</strong></div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>` : `<p style="font-size:12px;color:var(--muted);margin-bottom:14px">${I18n.t('tr_progress_empty')}</p>`}

    ${!sessions.length ? `<div class="empty"><strong>${I18n.t('tr_empty_title')}</strong><p>${viewAs==='guardian' ? I18n.t('tr_empty_desc_guardian',{name:shortName(player.fullName)}) : ''}</p></div>` : `
    <div class="who-played-list">
      ${sessions.map(s => `
        <div class="wp-row" onclick="gdDebugLog('training row clicked: session '+${s.trainingSessionId});openTrainingViewer(${s.trainingSessionId},'${viewAs}')" style="cursor:pointer">
          <div class="wp-info">
            <span class="wp-num">${s.status==='Completed'?'&#10003;':'&#128197;'}</span>
            <span class="wp-name">${esc(s.title)}</span>
            <span class="pos-pill" style="margin-left:auto">${s.scheduledDate?fmtDate(s.scheduledDate):'—'}</span>
            <span class="wp-role-pill ${s.status==='Completed'?'wp-role-starter':'wp-role-sub'}" style="margin-left:6px">${s.status==='Completed'?I18n.t('tr_status_completed'):I18n.t('tr_status_scheduled')}</span>
          </div>
        </div>`).join('')}
    </div>`}
  `;
  await renderPacksList(viewAs);
}

  _trainingFormDrills = existing ? JSON.parse(JSON.stringify(existing.drills||[])) : getDefaultSessionDrills();

  panel.innerHTML = `

// Builds a short, readable session name from the date plus a summary of
// selected drills — e.g. "Training – 01/07 – Warm-Up, Sit-Ups & Push-Ups"
// or, with more drills than fit cleanly, "Training – 01/07 – Warm-Up +3 more".
// Capped so it never runs long regardless of how many drills are selected.
function buildAutoSessionName(dateStr, drills) {
  const dateLabel = dateStr ? fmtDate(dateStr) : '';
  const names = (drills||[]).map(d => {
    if (d.libraryKey) return libDrillDisplayName(d.libraryKey);
    if (d.drillType) return drillTypeLabel(d.drillType);
    return null;
  }).filter(Boolean);

  let summary = '';
  if (names.length === 0) summary = '';
  else if (names.length <= 2) summary = names.join(', ');
  else summary = `${names[0]} +${names.length-1} ${I18n.t('tr_auto_name_more')}`;

  const parts = [I18n.t('tr_auto_name_prefix')];
  if (dateLabel) parts.push(dateLabel);
  if (summary) parts.push(summary);
  return parts.join(' – ');
}

// Called whenever the drill list or date changes on the CREATE form — only
// updates the title if it still matches what auto-naming would have
// produced a moment ago (i.e. the person hasn't typed their own title yet),
// so this never overwrites a name someone has deliberately customised.
let _lastAutoTitle = '';
function refreshAutoSessionName(playerId) {
  const titleInput = document.getElementById('tr-title');
  const dateInput = document.getElementById('tr-date');
  if (!titleInput || !dateInput) return;
  const newAutoTitle = buildAutoSessionName(dateInput.value, _trainingFormDrills);
  if (!titleInput.value.trim() || titleInput.value === _lastAutoTitle) {
    titleInput.value = newAutoTitle;
  }
  _lastAutoTitle = newAutoTitle;
}

function removeTrainingDrillRow(playerId, index, mode = 'plan') {

function updateTrainingDrillField(index, fieldKey, value, isText) {
  _trainingFormDrills[index][fieldKey] = isText ? value : (parseFloat(value)||0);
}

// ── PHASE 3 — optional per-session targets ───────────────────────────────────
// Stored under a separate `target` object on the drill entry, e.g.
// { situps: 25 } — never mixed into the actual result fields, so this
// can never collide with an existing KPI key, never affects Personal Best
// (which only ever reads the real result fields), and is fully backward
// compatible: a drill entry with no `target` property behaves exactly as
// it always has, since every check below treats an absent target as
// "no target set," not zero.
function updateTrainingDrillTarget(index, fieldKey, value) {
  const drill = _trainingFormDrills[index];
  if (!drill.target) drill.target = {};
  const trimmed = String(value).trim();
  if (trimmed === '') {
    delete drill.target[fieldKey]; // clearing the input removes the target entirely, not sets it to 0
  } else {
    drill.target[fieldKey] = parseFloat(trimmed) || 0;
  }
}

// ── PHASE 2 — counters/steppers instead of typing ────────────────────────────
// [-] value [+] per field, avoiding the keyboard for the common case of
// small adjustments. Typing directly into the number is still possible
// (the value itself is a real input) for larger jumps, so nothing is lost —
// this is quicker for the common case, not a restriction.
function stepTrainingDrillField(index, fieldKey, delta, rerenderFn) {
  const current = parseFloat(_trainingFormDrills[index][fieldKey]) || 0;
  _trainingFormDrills[index][fieldKey] = Math.max(0, current + delta);
  rerenderFn();
}

function renderKpiStepper(value, onDecClick, onIncClick, onTypeInput, disabled) {
  return `
    <div style="display:flex;align-items:center;gap:4px">
      <button type="button" onclick="${onDecClick}" ${disabled?'disabled':''} style="width:36px;height:36px;flex-shrink:0;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:18px;font-weight:700;cursor:pointer;${disabled?'opacity:.4':''}">&minus;</button>
      <input type="number" min="0" value="${value??0}" oninput="${onTypeInput}" style="width:100%;min-width:0;text-align:center;padding:6px 4px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-weight:700" ${disabled?'disabled':''}>
      <button type="button" onclick="${onIncClick}" ${disabled?'disabled':''} style="width:36px;height:36px;flex-shrink:0;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:18px;font-weight:700;cursor:pointer;${disabled?'opacity:.4':''}">+</button>

}

          </div>

          </div>

        ${detailDrill ? `

async function saveTrainingFormSession() {
  const title = document.getElementById('tr-title')?.value.trim();
  if (!title) { Toast.error(I18n.t('tr_err_title_required')); return; }
  const playerId = _trainingFormPlayerId;
  const viewAs = _trainingFormViewAs;

  const session = {
    playerId,
    seasonId: State.currentSeasonId,
    title,
    scheduledDate: document.getElementById('tr-date')?.value || null,
    notes: document.getElementById('tr-notes')?.value.trim() || null,
    drills: JSON.parse(JSON.stringify(_trainingFormDrills)),
  };

  if (_trainingFormEditingId) {
    const existing = await DB.get('trainingSessions', _trainingFormEditingId);
    if (!existing || !canEditTrainingSession(existing, viewAs)) {
      Toast.error(I18n.t('tr_err_cannot_edit', {who: existing?.createdBy === 'player' ? I18n.t('tr_created_by_player') : I18n.t('tr_created_by_guardian')}));
      return;
    }
    session.trainingSessionId = _trainingFormEditingId;
    session.status = existing.status;
    session.createdBy = existing.createdBy; // ownership never changes on edit
  } else {
    session.status = 'Scheduled';
    session.createdBy = viewAs; // 'guardian' or 'player' — whoever created it now
  }

  try {
    await saveTrainingSession(session);
    Toast.show(I18n.t('tr_saved'));
    document.getElementById(`trainingFormPanel-${playerId}`)?.classList.add('panel-hidden');
    await renderPlayerTraining(playerId, viewAs);
  } catch(err) {
    Toast.error(I18n.t('gd_could_not_save', {msg: err.message}));
  }
}

            const target = drill.target?.[fieldKey];
            // Existing values stay visible even when entry is disabled —
            // never auto-zeroed just by changing status. Only cleared if
            // the person explicitly edits and saves with new values.
            return `

            </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('') || `<p style="font-size:12px;color:var(--muted)">${I18n.t('tr_progress_empty')}</p>`;
}

async function saveTrainingCompletion() {
  const session = await DB.get('trainingSessions', _trainingCompletionSessionId);
  if (!session) return;

  // ── PHASE 2 — Personal Best celebration ──────────────────────────────────
  // Capture each drill's Personal Best BEFORE this save, so after saving we
  // can tell whether today's result actually beat it. Only meaningful for
  // official/custom drills with a real kpiFields schema (legacy generic
  // drills don't have PB tracking at all, correctly skipped here).
  const previousBests = {}; // drillIdentifier -> { fieldKey: previousBestValue }
  for (const drill of _trainingFormDrills) {
    const drillIdentifier = drill.libraryKey || drill.customDrillId;
    if (!drillIdentifier) continue;
    const history = await getDrillHistoryForPlayer(drillIdentifier, session.playerId, session.seasonId);
    previousBests[drillIdentifier] = {};
    Object.entries(history.fields || {}).forEach(([fk, r]) => {
      if (r.field.showPersonalBest) previousBests[drillIdentifier][fk] = r.personalBest;
    });
  }

  session.drills = JSON.parse(JSON.stringify(_trainingFormDrills));
  session.status = 'Completed';
  await saveTrainingSession(session);
  document.getElementById('trainingCompletionOverlay')?.remove();
  Toast.show(I18n.t('tr_saved'));

  // Now recompute and compare — celebrate the first genuine improvement
  // found (one celebration per save keeps this feeling special, not noisy,
  // even if several fields improved at once).
  const pbCelebrated = await celebrateAnyNewPersonalBests(session, previousBests);

  // ── PHASE 3 — target celebration ─────────────────────────────────────────
  // Deliberately separate from Personal Best: different data (a one-off
  // per-session target, not historical best), different message, and only
  // shown if the PB toast didn't already fire this save — avoids stacking
  // two celebration toasts on top of each other for the same save.
  if (!pbCelebrated) {
    await celebrateAnyTargetsHit(session);
  }

  await renderPlayerTraining(session.playerId, _trainingCompletionViewAs);
}

// Compares freshly-saved results against the pre-save Personal Bests
// captured above, and shows one celebratory toast for the first genuine
// improvement found. Deliberately simple — no animation library, no new
// UI component, just the existing Toast system with a distinct message,
// so this is cheap to build and cheap to maintain.
async function celebrateAnyNewPersonalBests(session, previousBests) {
  for (const drill of session.drills) {
    const status = getDrillCompletionStatus(drill);
    if (!isKpiEntryEnabled(status) || status === 'not_started') continue;
    const drillIdentifier = drill.libraryKey || drill.customDrillId;
    if (!drillIdentifier || !previousBests[drillIdentifier]) continue;

    const resolved = resolveSessionDrill(drill, await getAllCustomDrills());
    const kpiFields = resolved.fields || [];
    for (const f of kpiFields) {
      if (!f.showPersonalBest) continue;
      const prevBest = previousBests[drillIdentifier][f.key];
      const newValue = parseFloat(drill[f.key]);
      if (isNaN(newValue)) continue;
      const improved = prevBest === null || prevBest === undefined
        ? true // first-ever recorded value for this field counts as a PB
        : (f.goalDirection === 'lower' ? newValue < prevBest : newValue > prevBest);
      if (improved) {
        const drillLabel = drillResolutionLabel(resolved);
        Toast.show(`🏆 ${I18n.t('tr_new_personal_best', {drill: drillLabel, field: f.label, value: formatKpiValue(f, newValue)})}`);
        return true; // one celebration per save — see comment above
      }
    }
  }
  return false;
}

// ── PHASE 3 — target-hit celebration ─────────────────────────────────────────
// Entirely separate from Personal Best: reads only the per-session `target`
// object set at planning time, compares it to the actual saved result, and
// celebrates the first field that met or beat its target. Uses goalDirection
// the same way PB does (lower is better for e.g. a sprint time), so "hit
// the target" means the right direction, not just "value >= target" blindly.
async function celebrateAnyTargetsHit(session) {
  const customDrillsList = await getAllCustomDrills();
  for (const drill of session.drills) {
    if (!drill.target) continue;
    const status = getDrillCompletionStatus(drill);
    if (!isKpiEntryEnabled(status) || status === 'not_started') continue;

    const resolved = resolveSessionDrill(drill, customDrillsList);
    const kpiFields = resolved.fields || [];
    for (const f of kpiFields) {
      const target = drill.target[f.key];
      if (target === undefined || target === null) continue;
      const newValue = parseFloat(drill[f.key]);
      if (isNaN(newValue)) continue;
      const hit = f.goalDirection === 'lower' ? newValue <= target : newValue >= target;
      if (hit) {
        const drillLabel = drillResolutionLabel(resolved);
        Toast.show(`🎯 ${I18n.t('tr_target_hit', {drill: drillLabel, field: f.label, value: formatKpiValue(f, newValue)})}`);
        return true; // one celebration per save, same reasoning as Personal Best
      }
    }
  }
  return false;
}

function confirmDeleteTrainingSession(sessionId, viewAs) {
  if (!window.confirm(I18n.t('tr_confirm_delete_body'))) return;
  (async () => {
    const session = await DB.get('trainingSessions', sessionId);
    try {
      await deleteTrainingSession(sessionId, viewAs);
      document.getElementById('trainingViewerOverlay')?.remove();
      Toast.show(I18n.t('ch_deleted'));
      if (session) await renderPlayerTraining(session.playerId, viewAs);
    } catch(err) {
      Toast.error(err.message);
    }
  })();
}

// ── PORTAL — TEAM SUMMARY (read-only) ────────────────────────────────────────
// Mirrors the guardian's Team Summary: season record, most-used lineup, top
// scorers/assisters/appearances/MoM leader cards. Deliberately leaves out
// the squad-wide injury report the guardian sees — that's other children's
// medical information, not something appropriate to surface in a portal a
// child can access themselves.
async function renderPlayerPortalTeamSummary() {
  const el = document.getElementById('pp-sec-teamsummary');
  if (!el) return;

  const [games, players, allGP] = await Promise.all([
    DB.getAll('games','seasonId',State.currentSeasonId),
    DB.getAll('players','seasonId',State.currentSeasonId),
    DB.getAll('gamePlayers','seasonId',State.currentSeasonId)
  ]);

  if (!games.length) {
    el.innerHTML = `<div class="page-header"><div><h1>${I18n.t('nav_teamSummary')}</h1></div></div><div class="empty"><strong>${I18n.t('ts_no_games_title')}</strong><p>${I18n.t('ts_no_games_desc')}</p></div>`;
    return;
  }

  const finishedGames = games.filter(g => isGameResultVisible(g));
  const ts = Calc.teamSeasonStats(finishedGames, allGP);

  const pStats = players.filter(p=>p.isActive).map(p => ({
    ...p, ...Calc.playerSeasonStats(p.playerId, finishedGames, allGP)
  }));
  const topScorers = [...pStats].sort((a,b)=>b.goals-a.goals).slice(0,5);
  const topAssisters = [...pStats].sort((a,b)=>b.assists-a.assists).slice(0,5);
  const mostApps = [...pStats].filter(p=>p.calledUp>0).sort((a,b)=>b.calledUp-a.calledUp).slice(0,5);
  const mostMoM = [...pStats].sort((a,b)=>b.mom-a.mom).filter(p=>p.mom>0).slice(0,5);

  const mostUsedLineup = buildMostUsedLineup(players, finishedGames, allGP);
  const shirtColor = State.currentSeason?.shirtColor || '#B23333';

  el.innerHTML = `
    <div class="page-header"><div><h1>${I18n.t('nav_teamSummary')}</h1></div></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="val">${ts.played}</div><div class="lbl">${I18n.t('ts_played')}</div></div>
      <div class="stat-card"><div class="val">${ts.wins}</div><div class="lbl">${I18n.t('ts_wins')}</div></div>
      <div class="stat-card"><div class="val">${ts.draws}</div><div class="lbl">${I18n.t('ts_draws')}</div></div>
      <div class="stat-card"><div class="val">${ts.losses}</div><div class="lbl">${I18n.t('ts_losses')}</div></div>
      <div class="stat-card"><div class="val">${ts.goalsFor}</div><div class="lbl">${I18n.t('ts_goals_for')}</div></div>
      <div class="stat-card"><div class="val">${ts.goalsAgainst}</div><div class="lbl">${I18n.t('ts_goals_against')}</div></div>
      <div class="stat-card"><div class="val">${ts.goalDiff>0?'+':''}${ts.goalDiff}</div><div class="lbl">${I18n.t('ts_goal_diff')}</div></div>
      <div class="stat-card"><div class="val">${ts.cleanSheets}</div><div class="lbl">${I18n.t('ts_clean_sheets')}</div></div>
    </div>

    ${renderLineupPitch(mostUsedLineup, shirtColor)}

    <div class="card">
      <div class="card-title">${I18n.t('ts_records')}</div>
      <div class="info-row"><span class="ir-label">${I18n.t('ts_home')}</span><span class="ir-value">${ts.homeW}W ${ts.homeD}D ${ts.homeL}L</span></div>
      <div class="info-row"><span class="ir-label">${I18n.t('ts_away')}</span><span class="ir-value">${ts.awayW}W ${ts.awayD}D ${ts.awayL}L</span></div>
      <div class="info-row"><span class="ir-label">${I18n.t('ts_best_win_streak')}</span><span class="ir-value">${ts.bestStreak} ${I18n.t('ts_games_suffix')}</span></div>
      <div class="info-row"><span class="ir-label">${I18n.t('ts_best_unbeaten')}</span><span class="ir-value">${ts.bestUnbeaten} ${I18n.t('ts_games_suffix')}</span></div>
      ${ts.biggestWin?`<div class="info-row"><span class="ir-label">${I18n.t('ts_biggest_win')}</span><span class="ir-value">${ts.biggestWin.score} ${I18n.t('ts_vs')} ${esc(ts.biggestWin.opp)}</span></div>`:''}
      ${ts.biggestLoss?`<div class="info-row"><span class="ir-label">${I18n.t('ts_biggest_loss')}</span><span class="ir-value">${ts.biggestLoss.score} ${I18n.t('ts_vs')} ${esc(ts.biggestLoss.opp)}</span></div>`:''}
    </div>

    <div class="leader-grid">
      ${leaderCard(I18n.t('ts_top_scorers'), topScorers, 'goals', I18n.t('ts_stat_goals'))}
      ${leaderCard(I18n.t('ts_top_assisters'), topAssisters, 'assists', I18n.t('ts_stat_assists'))}
    </div>
    <div class="leader-grid">
      ${leaderCard(I18n.t('ts_most_used'), mostApps, 'calledUp', I18n.t('ts_stat_apps'))}
      ${mostMoM.length ? leaderCard(I18n.t('ts_player_of_match'), mostMoM, 'mom', I18n.t('ts_stat_mom')) : '<div></div>'}
    </div>
  `;
}

// ── PORTAL — STATS (read-only Extended Stats: season totals + accuracy) ─────
// Same underlying data as the guardian's Stats tab, but with the per-game
// entry form removed entirely — that's an editing tool, not something a
// player needs or should have write access to from their own portal.
async function renderPlayerPortalExtendedStats() {
  const el = document.getElementById('pp-sec-stats');
  if (!el) return;
  const playerId = State.portalPlayerId;
  const player = await DB.get('players', playerId);
  if (!player) return;

  await getFieldVisibility();
  const allPGS = await DB.getAll('playerGameStats','playerId',playerId);

  const totals = {};
  EXT_STAT_FIELDS.forEach(s => s.fields.forEach(f => {
    totals[f.key] = allPGS.reduce((sum,r) => sum+(parseInt(r[f.key])||0), 0);
  }));

  const visibleSections = EXT_STAT_FIELDS
    .map(section => ({ ...section, fields: section.fields.filter(f => isFieldVisible(f.key)) }))
    .filter(section => section.fields.length > 0);

  const pct = (a,b) => b>0 ? Math.round(a/b*100) : '—';
  const accuracyRows = [
    [I18n.t('ext_acc_pass'), pct(totals.passesCompleted, totals.passesAttempted), totals.passesCompleted, totals.passesAttempted, ['passesCompleted','passesAttempted']],
    [I18n.t('ext_acc_dribble'), pct(totals.dribblesCompleted, totals.dribblesAttempted), totals.dribblesCompleted, totals.dribblesAttempted, ['dribblesCompleted','dribblesAttempted']],
    [I18n.t('ext_acc_tackle'), pct(totals.tacklesWon, totals.tacklesAttempted), totals.tacklesWon, totals.tacklesAttempted, ['tacklesWon','tacklesAttempted']],
    [I18n.t('ext_acc_cross'), pct(totals.crossesCompleted, totals.crossesAttempted), totals.crossesCompleted, totals.crossesAttempted, ['crossesCompleted','crossesAttempted']],
    [I18n.t('ext_acc_duel'), pct(totals.duelsWon, totals.duelsAttempted), totals.duelsWon, totals.duelsAttempted, ['duelsWon','duelsAttempted']],
  ].filter(row => row[4].every(key => isFieldVisible(key)));

  el.innerHTML = `
    <div class="page-header"><div><h1>${I18n.t('pp_nav_stats')}</h1><div class="page-header-sub">${esc(shortName(player.fullName))}</div></div></div>
    <div class="card">
      <div class="card-title">${I18n.t('ext_season_totals')}</div>
      ${visibleSections.length ? visibleSections.map(section => `
        <div style="margin-bottom:12px">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px">${extSectionLabel(section)}</div>
          <div class="stat-grid" style="margin-bottom:0">
            ${section.fields.map(f => `
              <div class="stat-card">
                <div class="val" style="font-size:22px">${totals[f.key]||0}</div>
                <div class="lbl">${extFieldLabel(f)}</div>
              </div>`).join('')}
          </div>
        </div>`).join('') : `<p style="font-size:12px;color:var(--muted)">${I18n.t('ext_all_hidden')}</p>`}
    </div>
    ${accuracyRows.length ? `
    <div class="card">
      <div class="card-title">${I18n.t('ext_accuracy_title')}</div>
      ${accuracyRows.map(([label, pctVal, made, total]) => `
        <div class="prog-wrap">
          <div class="prog-label">
            <span>${label}</span>
            <span>${pctVal}%${typeof pctVal === 'number' ? ` (${made}/${total})` : ''}</span>
          </div>
          <div class="prog-bar"><div class="prog-fill" style="width:${typeof pctVal==='number'?pctVal:0}%"></div></div>
        </div>`).join('')}
    </div>` : ''}
  `;
}

function openEventForm(playerId, entry) {
  const form = document.getElementById(`eventForm-${playerId}`);
  if (!form) return;
  form.classList.remove('panel-hidden');
  if (!entry) {
    [`ev-title-${playerId}`,`ev-location-${playerId}`,`ev-outcome-${playerId}`,`ev-desc-${playerId}`].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    const t=document.getElementById(`ev-type-${playerId}`);if(t)t.value='Tournament';
    const s=document.getElementById(`ev-start-${playerId}`);if(s)s.value='';
    const en=document.getElementById(`ev-end-${playerId}`);if(en)en.value='';
    const h=document.getElementById(`ev-id-${playerId}`);if(h)h.value='';
  }
  form.scrollIntoView({behavior:'smooth'});
}

async function editEventEntry(playerId, id) {
  const e = await DB.get('events', id);
  if (!e) return;
  openEventForm(playerId, e);
  const s = (fid, val) => { const el=document.getElementById(`${fid}-${playerId}`); if(el) el.value=val||''; };
  s('ev-title',e.title); s('ev-type',e.eventType); s('ev-start',e.startDate); s('ev-end',e.endDate);
  s('ev-location',e.location); s('ev-outcome',e.outcome); s('ev-desc',e.description);
  const h=document.getElementById(`ev-id-${playerId}`);if(h)h.value=id;
}

// ══════════════════════════════════════════════════════════════════════════════
// DB PUT WRAPPER — marks records as modified for sync
// ══════════════════════════════════════════════════════════════════════════════
const _origPut = DB.put.bind(DB);
const SYNC_STORES_SET = new Set(['seasons','players','games','gamePlayers','achievements','clubHistory','globalPlayers','opponents','playerGameStats','events','goalEvents','injuries','trainingSessions','customDrills','drillFavourites','trainingPacks']);

DB.put = async function(store, obj) {
  if (SYNC_STORES_SET.has(store) && obj) {
    const now = new Date().toISOString();
    if (!obj.createdAt) obj.createdAt = now;
    obj.updatedAt = now;
    if (!obj.syncStatus) {
      obj.syncStatus = 'local';
    } else if (obj.syncStatus === 'synced') {
      obj.syncStatus = 'modified';
    }
  }
  if (typeof gdDebugLog === 'function') {
    const idField = Object.keys(obj||{}).find(k => /Id$/.test(k) && k.toLowerCase().startsWith(store.toLowerCase().replace(/s$/,'')));
    gdDebugLog(`DB.put(${store}) key=${obj && (obj[idField]||'(new)')}`);
  }
  return _origPut(store, obj);
};

async function loadMeta() {
  const m = await DB.get('appMeta', 'currentSeason');
  if (m) { State.currentSeasonId = m.value; }
  // EN and PT are fully supported. IT/FR/ES are not translated yet — force-
  // correct any stale saved value for those back to EN so the app never
  // silently shows a half-translated language across different screens.
  const SUPPORTED_LANGS = ['EN', 'PT'];
  const langM = await DB.get('appMeta', 'language');
  if (langM && !SUPPORTED_LANGS.includes(langM.value)) {
    await DB.put('appMeta', { metaKey: 'language', value: 'EN' });
    I18n.set('EN');
  } else if (langM) {
    I18n.set(langM.value);
  }
  applyNavLabels();
  applyStaticTranslations();
  const season = State.currentSeasonId ? await DB.get('seasons', State.currentSeasonId) : null;
  State.currentSeason = season || null;
  document.getElementById('navSeason').textContent = season ? season.seasonName : 'No season';
}

    sub.textContent = State.currentSeason.seasonName;

    const allInjuries = await DB.getAll('injuries');
    const activeInjuryByPlayer = {};
    allInjuries.forEach(inj => {

    });
    players.sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99)||(a.fullName||'').localeCompare(b.fullName||''));

    if (search) players = players.filter(p=>p.fullName.toLowerCase().includes(search.toLowerCase()));
    if (posFilter) players = players.filter(p=>p.primaryPosition===posFilter);

    if (!players.length) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('squad_no_players_title')}</strong><p>${I18n.t('squad_no_players_desc')}</p></div>`;
      return;
    }

    // Sort state stored on element to persist across re-renders
    const sortKey   = el.dataset.sortKey   || 'shirtNumber';
    const sortDir   = el.dataset.sortDir   || 'asc';

    const sortFns = {
      shirtNumber: (a,b) => (parseInt(a.shirtNumber)||999) - (parseInt(b.shirtNumber)||999),
      fullName:    (a,b) => (a.fullName||'').localeCompare(b.fullName||''),
      primaryPosition: (a,b) => (a.primaryPosition||'').localeCompare(b.primaryPosition||''),
      secondaryPosition: (a,b) => (a.secondaryPosition||'').localeCompare(b.secondaryPosition||''),
      dominantFoot:(a,b) => (a.dominantFoot||'').localeCompare(b.dominantFoot||''),
      dateOfBirth: (a,b) => (a.dateOfBirth||'').localeCompare(b.dateOfBirth||''),
    };

    players.sort((a,b) => {
      const fn = sortFns[sortKey] || sortFns.shirtNumber;
      return sortDir === 'asc' ? fn(a,b) : fn(b,a);
    });

    function thSort(key, label, extraClass='') {
      const active = sortKey === key;
      const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="squadSort('${key}')">${label}${arrow}</th>`;
    }

    const rows = players.map(p => {
      const injury = activeInjuryByPlayer[p.playerId];
      const rowBg = injury ? '#fbeaea' : '';
      const rowStyle = injury ? `style="background:${rowBg}"` : '';
      const stickyBg = injury ? `style="background:${rowBg}"` : '';
      return `
      <tr ${rowStyle} class="${injury?'row-injured':''}">
        <td class="col-sticky-num" ${stickyBg}>${p.shirtNumber||'—'}</td>
        <td class="col-sticky-name" title="${esc(p.fullName)}" style="${injury?`background:${rowBg};`:''}${p.trackingStatus==='tracked'?'cursor:pointer;text-decoration:underline;text-decoration-color:#ccc':''}" ${p.trackingStatus==='tracked'?`onclick="openPlayerCardPopup(${p.playerId})"`:''}>${esc(shortName(p.fullName))} ${p.trackingStatus==='tracked'?`<span class="badge badge-lor" title="${esc(p.trackingLabel||I18n.t('squad_tracked_label_default'))}">${esc(p.trackingLabel||'★')}</span>`:''} ${!p.isActive?`<span class="badge-nc badge" style="font-size:9px">${I18n.t('squad_archived_badge')}</span>`:''}</td>
        <td><span class="pos-pill">${p.primaryPosition||'—'}</span></td>
        <td>${p.secondaryPosition||'—'}</td>
        <td>${p.dominantFoot||'—'}</td>
        <td>${p.dateOfBirth?fmtDate(p.dateOfBirth):'—'}</td>
        <td>${injury?`<span class="badge" style="background:#fde8e8;color:#b03030" title="${esc(injuryTypeLabel(injury.injuryType)||'')} ${esc(injury.notes||'')}">&#129460; ${I18n.t('squad_status_injured')}</span>`:`<span style="color:#2a7a3b;font-size:11px">&#10003; ${I18n.t('squad_status_fit')}</span>`}</td>
        <td>
          <button class="btn btn-secondary btn-sm" onclick="editPlayer(${p.playerId})">${I18n.t('common_edit')}</button>
          <button class="btn btn-secondary btn-sm" onclick="archivePlayer(${p.playerId},${!p.isActive})" style="margin-left:4px">${p.isActive?I18n.t('common_archive'):I18n.t('common_restore')}</button>
          <button class="btn ${injury?'btn-danger':'btn-secondary'} btn-sm" onclick="openInjuryModal(${p.playerId})" style="margin-left:4px">${injury?I18n.t('squad_btn_manage_injury'):I18n.t('squad_btn_add_injury')}</button>
          <button class="btn btn-secondary btn-sm" onclick="openInjuryHistoryModal(${p.playerId})" style="margin-left:4px">${I18n.t('inj_btn_history')}</button>
        </td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="game-detail-table-wrap">
        <table class="game-detail-table">
          <thead><tr>
            ${thSort('shirtNumber',I18n.t('squad_col_num'),'col-sticky-num')}
            ${thSort('fullName',I18n.t('squad_col_name'),'col-sticky-name')}
            ${thSort('primaryPosition',I18n.t('squad_col_position'))}
            ${thSort('secondaryPosition',I18n.t('squad_col_pos2'))}
            ${thSort('dominantFoot',I18n.t('squad_col_foot'))}
            ${thSort('dateOfBirth',I18n.t('squad_col_dob'))}
            <th>${I18n.t('squad_col_status')}</th>
            <th>${I18n.t('squad_col_actions')}</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── GAMES LIST ─────────────────────────────────────────────────────────────
  async function gamesList(search='', compFilter='') {
    const el = document.getElementById('gamesContent');
    const sub = document.getElementById('gamesSubtitle');

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }
    sub.textContent = State.currentSeason.seasonName;

    let games = await DB.getAll('games','seasonId',State.currentSeasonId);
    if (search) games = games.filter(g=>g.opponent.toLowerCase().includes(search.toLowerCase()));
    if (compFilter) games = games.filter(g=>g.competitionType===compFilter);

    if (!games.length) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('games_no_games_title')}</strong><p>${I18n.t('games_no_games_desc')}</p></div>`;
      return;
    }

    const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);

    // Pre-compute score/result for sorting
    const enriched = games.map(g => {
      const gps = allGP.filter(r=>r.gameId===g.gameId);
      const our = Calc.teamGoals(gps);
      const their = parseInt(g.opponentScore)||0;
      return { ...g, _our: our, _their: their, _res: Calc.result(our, their) };
    });

    const sortKey = el.dataset.sortKey || 'date';
    const sortDir = el.dataset.sortDir || 'desc';
    const sortFns = {
      date:            (a,b) => new Date(a.date||0) - new Date(b.date||0),
      opponent:        (a,b) => (a.opponent||'').localeCompare(b.opponent||''),
      homeAway:        (a,b) => (a.homeAway||'').localeCompare(b.homeAway||''),
      competitionType: (a,b) => (a.competitionType||'').localeCompare(b.competitionType||''),
      score:           (a,b) => (a._our - a._their) - (b._our - b._their),
      result:          (a,b) => (a._res||'').localeCompare(b._res||''),
    };
    enriched.sort((a,b) => {
      const fn = sortFns[sortKey] || sortFns.date;
      return sortDir === 'asc' ? fn(a,b) : fn(b,a);
    });

    function thSort(key, label, extraClass='') {
      const active = sortKey === key;
      const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="gamesSort('${key}')">${label}${arrow}</th>`;
    }

    const allOpponents = await DB.getAll('opponents');
    const opponentLogoByName = {};
    allOpponents.forEach(o => { if (o.logoUrl) opponentLogoByName[(o.opponentName||'').toLowerCase()] = o.logoUrl; });

    const rows = enriched.map(g => {
      const gVisible = isGameResultVisible(g);
      const logoUrl = opponentLogoByName[(g.opponent||'').toLowerCase()];
      return `<tr style="cursor:pointer" onclick="openGameDetail(${g.gameId})">
        <td class="col-sticky-num" style="min-width:60px">${g.date?fmtDate(g.date):'—'}</td>
        <td class="col-sticky-name">
          <span style="display:flex;align-items:center;gap:6px">
            ${logoUrl?`<img src="${esc(logoUrl)}" style="width:18px;height:18px;object-fit:contain;border-radius:3px;flex-shrink:0" onerror="this.style.display='none'">`:''}
            ${esc(g.opponent)}
          </span>
        </td>
        <td>${g.homeAway?homeAwayLabel(g.homeAway):'—'}</td>
        <td><span style="font-size:11px;color:var(--muted)">${g.competitionType?compTypeLabel(g.competitionType):'—'}</span></td>
        <td class="td-bold">${gVisible?(()=>{const s=Calc.homeAwayScore(g.homeAway,g._our,g._their);return s.home+' — '+s.away;})():'<span class="td-muted" style="font-weight:400;font-size:11px">—</span>'}</td>
        <td>${gVisible?`<span class="badge badge-${g._res}">${g._res}</span>`:`<span class="td-muted" style="font-size:11px">${I18n.t('games_status_upcoming')}</span>`}</td>
        <td onclick="event.stopPropagation()">
          <button class="btn btn-secondary btn-sm" onclick="editGame(${g.gameId})">${I18n.t('common_edit')}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteGame(${g.gameId})" style="margin-left:4px">${I18n.t('common_delete')}</button>
        </td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="game-detail-table-wrap">
        <table class="game-detail-table">
          <thead><tr>
            ${thSort('date',I18n.t('games_col_date'),'col-sticky-num')}
            ${thSort('opponent',I18n.t('games_col_opponent'),'col-sticky-name')}
            ${thSort('homeAway',I18n.t('games_col_homeaway'))}
            ${thSort('competitionType',I18n.t('games_col_competition'))}
            ${thSort('score',I18n.t('games_col_score'))}
            ${thSort('result',I18n.t('games_col_result'))}
            <th>${I18n.t('squad_col_actions')}</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── GAME DETAIL ────────────────────────────────────────────────────────────
  async function gameDetail(gameId) {
    const el = document.getElementById('gameDetailContent');
    const [game, players, existingGP] = await Promise.all([
      DB.get('games', gameId),
      DB.getAll('players','seasonId', State.currentSeasonId),
      DB.getAll('gamePlayers','gameId', gameId)
    ]);

    if (!game) { el.innerHTML = `<p>${I18n.t('games_not_found')}</p>`; return; }

    const activePlayers = players.filter(p=>p.isActive).sort((a,b)=>(a.shirtNumber||99)-(b.shirtNumber||99));
    window._gdPlayers = activePlayers;
    window._gdGameId = gameId;

    const ourScore = Calc.teamGoals(existingGP);
    const theirScore = parseInt(game.opponentScore)||0;
    const res = Calc.result(ourScore, theirScore);
    const displayScore = Calc.homeAwayScore(game.homeAway, ourScore, theirScore);
    const currentTab = State.gameDetailTab || 'squad';
    const matchedOpponent = await findOpponentByName(game.opponent);

    const debugOn = await isDebugModeOn();

    el.innerHTML = `
      <div class="game-header">
        <div class="game-header-top">
          <div style="display:flex;align-items:center;gap:10px">
            ${matchedOpponent?.logoUrl ? `<img src="${esc(matchedOpponent.logoUrl)}" style="width:36px;height:36px;object-fit:contain;border-radius:4px;flex-shrink:0;background:#f0f0f0" onerror="this.style.display='none'">` : ''}
            <div>
              <div class="game-title">${esc(game.opponent)}</div>
              <div class="game-meta">${game.date?fmtDate(game.date):'—'} · ${homeAwayLabel(game.homeAway)} · ${compTypeLabel(game.competitionType)} ${game.competitionName?'· '+esc(game.competitionName):''} ${game.venue?'· '+esc(game.venue):''}</div>
            </div>
          </div>
          <div>
            <div class="game-score" id="liveScore">${displayScore.home} — ${displayScore.away}</div>
            <div class="game-score-sub"><span class="badge badge-${res}" id="liveResult">${res}</span></div>
          </div>
        </div>
        ${game.teamNotes?`<div style="margin-top:10px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:10px">${esc(game.teamNotes)}</div>`:''}
      </div>

      <div class="tab-bar-row" style="margin-bottom:16px">
        <button class="import-tab ${currentTab==='squad'?'active-tab':''}" id="gdtab-squad" onclick="switchSimpleTab(${gameId},'squad')">${I18n.t('gd_tab_squad')}</button>
        <button class="import-tab ${currentTab==='xi'?'active-tab':''}" id="gdtab-xi" onclick="switchSimpleTab(${gameId},'xi')">${I18n.t('gd_tab_xi')}</button>
        <button class="import-tab ${currentTab==='goals'?'active-tab':''}" id="gdtab-goals" onclick="switchSimpleTab(${gameId},'goals')">${I18n.t('gd_tab_goals')}</button>
      </div>
      <div style="font-size:11px;color:#2a7a3b;margin-bottom:10px">&#10003; ${I18n.t('gd_autosave_note')}</div>

      ${debugOn ? `<div id="gdDebugPanel" style="background:#111;color:#0f0;font-family:monospace;font-size:10px;padding:10px;border-radius:4px;margin-bottom:14px;white-space:pre-wrap;line-height:1.5">DEBUG: waiting for first action...</div>` : ''}

      <div id="gdPanel-squad" style="${currentTab==='squad'?'':'display:none'}"></div>
      <div id="gdPanel-xi" style="${currentTab==='xi'?'':'display:none'}"></div>
      <div id="gdPanel-goals" style="${currentTab==='goals'?'':'display:none'}"></div>

      <div style="margin-top:10px">
        <button class="btn btn-secondary" onclick="closeGameDetail()">&#8592; ${I18n.t('gd_btn_back')}</button>
      </div>
    `;

    gdDebugLog('gameDetail() loaded for game ' + gameId + ', tab=' + currentTab);
    if (currentTab==='squad') await renderSquadListTab(gameId);
    if (currentTab==='xi')    await renderStartingXITab(gameId);
    if (currentTab==='goals') await renderSimpleGoalsTab(gameId);
  }

  // ── LORENZO ────────────────────────────────────────────────────────────────
  async function trackedPlayer(playerId) {
    const el = document.getElementById(`tracked-content-${playerId}`);
    const sub = document.getElementById(`tracked-subtitle-${playerId}`);
    if (!el) return;

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }

    const players = await DB.getAll('players','seasonId',State.currentSeasonId);
    const lor = players.find(p=>p.playerId===playerId && p.isActive);

    if (!lor) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('tp_not_found_title')}</strong><p>${I18n.t('tp_not_found_desc')}</p><button class="btn btn-primary" onclick="Nav.go('squad')">${I18n.t('tp_btn_go_squad')}</button></div>`;
      return;
    }

    if (sub) sub.textContent = `${lor.fullName} · ${State.currentSeason.seasonName}`;

    const games = await DB.getAll('games','seasonId',State.currentSeasonId);
    const allGP = await DB.getAll('gamePlayers','seasonId',State.currentSeasonId);
    const lorGP = allGP.filter(r=>r.playerId===lor.playerId);
    // Only count games whose result is actually visible (i.e. likely finished)
    // towards season totals — an in-progress game shouldn't inflate stats yet.
    const finishedGames = games.filter(g => isGameResultVisible(g));
    const s = Calc.lorenzoStats(finishedGames, lorGP);

    // Sorting for the Match by Match table on this Overview tab
    const ovSortKey = el.dataset.sortKey || 'date';
    const ovSortDir = el.dataset.sortDir || 'desc';
    const ovEnriched = games.map(g => {
      const gp = allGP.find(r=>r.gameId===g.gameId && r.playerId===playerId);
      const gps = allGP.filter(r=>r.gameId===g.gameId);
      const our = Calc.teamGoals(gps);
      const their = parseInt(g.opponentScore)||0;
      return { game:g, gp, _our:our, _their:their, _res:Calc.result(our,their) };
    });
    const ovSortFns = {
      date:     (a,b) => new Date(a.game.date||0) - new Date(b.game.date||0),
      opponent: (a,b) => (a.game.opponent||'').localeCompare(b.game.opponent||''),
      result:   (a,b) => (a._res||'').localeCompare(b._res||''),
      role:     (a,b) => (a.gp?.role||'').localeCompare(b.gp?.role||''),
      position: (a,b) => (a.gp?.positionPlayed||'').localeCompare(b.gp?.positionPlayed||''),
      goals:    (a,b) => (a.gp?.goals||0) - (b.gp?.goals||0),
      assists:  (a,b) => (a.gp?.assists||0) - (b.gp?.assists||0),
      yc:       (a,b) => (a.gp?.yellowCards||0) - (b.gp?.yellowCards||0),
      rc:       (a,b) => (a.gp?.redCards||0) - (b.gp?.redCards||0),
    };
    ovEnriched.sort((a,b) => {
      const fn = ovSortFns[ovSortKey] || ovSortFns.date;
      return ovSortDir === 'asc' ? fn(a,b) : fn(b,a);
    });
    function ovThSort(key, label, extraClass='') {
      const active = ovSortKey === key;
      const arrow  = active ? (ovSortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th class="${extraClass}" style="cursor:pointer;user-select:none" onclick="overviewMatchSort(${playerId},'${key}')">${label}${arrow}</th>`;
    }

    const sortedGames = [...games].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const last5 = sortedGames.slice(0,5);

    // position breakdown
    const posEntries = Object.entries(s.positionBreakdown).sort((a,b)=>b[1]-a[1]);

    el.innerHTML = `
      <div class="print-header" style="display:none;margin-bottom:20px">
        <h2>${esc(lor.fullName)} — ${State.currentSeason.seasonName}</h2>
        <p style="color:var(--muted);font-size:13px">${State.currentSeason.seasonName} · ${State.currentSeason.clubName||''}</p>
      </div>

      <div class="stat-grid">
        <div class="stat-card"><div class="val">${s.calledUp}</div><div class="lbl">${I18n.t('tp_stat_appearances')}</div></div>
        <div class="stat-card"><div class="val">${s.started}</div><div class="lbl">${I18n.t('tp_stat_starts')}</div><div class="sub">${s.subbed} ${I18n.t('tp_stat_as_sub')}</div></div>
        <div class="stat-card"><div class="val">${s.goals}</div><div class="lbl">${I18n.t('tp_stat_goals')}</div></div>
        <div class="stat-card"><div class="val">${s.assists}</div><div class="lbl">${I18n.t('tp_stat_assists')}</div></div>
        <div class="stat-card"><div class="val">${s.contributions}</div><div class="lbl">${I18n.t('tp_stat_contributions')}</div></div>
        <div class="stat-card"><div class="val">${s.fullGames}</div><div class="lbl">${I18n.t('tp_stat_full_games')}</div></div>
        <div class="stat-card"><div class="val">${s.minutes}</div><div class="lbl">${I18n.t('tp_stat_est_minutes')}</div></div>
        <div class="stat-card"><div class="val">${s.mom}</div><div class="lbl">${I18n.t('tp_stat_mom')}</div></div>
        <div class="stat-card"><div class="val">${s.captain}</div><div class="lbl">${I18n.t('tp_stat_captain')}</div></div>
        <div class="stat-card"><div class="val">${s.yellow}</div><div class="lbl">${I18n.t('tp_stat_yellow')}</div></div>
        <div class="stat-card"><div class="val">${s.red}</div><div class="lbl">${I18n.t('tp_stat_red')}</div></div>
        <div class="stat-card"><div class="val">${s.availabilityPct}%</div><div class="lbl">${I18n.t('tp_stat_availability')}</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="card">
          <div class="card-title">${I18n.t('tp_card_percentages')}</div>
          <div class="prog-wrap">
            <div class="prog-label"><span>${I18n.t('tp_stat_availability')}</span><span>${s.availabilityPct}%</span></div>
            <div class="prog-bar"><div class="prog-fill" style="width:${s.availabilityPct}%"></div></div>
          </div>
          <div class="prog-wrap">
            <div class="prog-label"><span>${I18n.t('tp_starts_rate')}</span><span>${s.startsPct}%</span></div>
            <div class="prog-bar"><div class="prog-fill" style="width:${s.startsPct}%"></div></div>
          </div>
        </div>
        ${posEntries.length ? `
        <div class="card">
          <div class="card-title">${I18n.t('tp_card_position_breakdown')}</div>
          ${posEntries.map(([pos,cnt])=>`
            <div class="prog-wrap">
              <div class="prog-label"><span>${pos}</span><span>${cnt} ${I18n.t('tp_games_suffix')}</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:${Math.round(cnt/s.calledUp*100)||0}%"></div></div>
            </div>`).join('')}
        </div>` : '<div></div>'}
      </div>

      ${last5.length ? `
      <div class="card">
        <div class="card-title">${I18n.t('tp_card_recent_form')}</div>
        <div class="form-strip">
          ${last5.map(g=>{
            const gp = lorGP.find(r=>r.gameId===g.gameId);
            const gps = allGP.filter(r=>r.gameId===g.gameId);
            const our = Calc.teamGoals(gps);
            const their = parseInt(g.opponentScore)||0;
            const res = Calc.result(our,their);
            const visible = isGameResultVisible(g);
            if (!visible) return `<div class="form-badge"><div class="fb-result badge" style="background:#f0f0f0;color:#999">···</div><div class="fb-stat">${esc(g.opponent.substring(0,8))}</div><div class="fb-stat">${I18n.t('tp_form_upcoming')}</div></div>`;
            if (!gp||!gp.calledUp) return `<div class="form-badge"><div class="fb-result badge badge-${res}">${res}</div><div class="fb-stat">${esc(g.opponent.substring(0,8))}</div><div class="fb-stat">${I18n.t('tp_form_dnp')}</div></div>`;
            const fbs = Calc.homeAwayScore(g.homeAway, our, their);
            return `<div class="form-badge"><div class="fb-result badge badge-${res}">${res}</div><div class="fb-stat">${fbs.home}-${fbs.away}</div><div class="fb-stat">G:${gp.goals||0} A:${gp.assists||0}</div></div>`;
          }).join('')}
        </div>
      </div>` : ''}

      <div class="card">
        <div class="card-title">${I18n.t('tp_card_match_by_match')}</div>
        <div class="game-detail-table-wrap" style="margin-bottom:0">
          <table class="game-detail-table" style="min-width:980px">
            <thead><tr>
              ${ovThSort('date',I18n.t('tp_col_date'),'col-sticky-num')}
              ${ovThSort('opponent',I18n.t('tp_col_opponent'),'col-sticky-name')}
              ${ovThSort('result',I18n.t('tp_col_result'))}
              ${ovThSort('role',I18n.t('tp_col_role'))}
              ${ovThSort('position',I18n.t('tp_col_position'))}
              ${ovThSort('goals',I18n.t('tp_col_goals'))}
              ${ovThSort('assists',I18n.t('tp_col_assists'))}
              ${ovThSort('yc',I18n.t('tp_col_yc'))}

  // ── TEAM SUMMARY ───────────────────────────────────────────────────────────
  async function teamSummary() {
    const el = document.getElementById('teamSummaryContent');
    const sub = document.getElementById('teamSubtitle');

    if (!State.currentSeason) { el.innerHTML = noSeason(); return; }
    sub.textContent = State.currentSeason.seasonName;

    const [games, players, allGP] = await Promise.all([
      DB.getAll('games','seasonId',State.currentSeasonId),
      DB.getAll('players','seasonId',State.currentSeasonId),
      DB.getAll('gamePlayers','seasonId',State.currentSeasonId)
    ]);

    if (!games.length) {
      el.innerHTML = `<div class="empty"><strong>${I18n.t('ts_no_games_title')}</strong><p>${I18n.t('ts_no_games_desc')}</p></div>`;
      return;
    }

    // Only finished games count towards team and player season totals —
    // a game still in progress shouldn't affect the table yet.
    const finishedGames = games.filter(g => isGameResultVisible(g));

    const ts = Calc.teamSeasonStats(finishedGames, allGP);

    // player stats
    const pStats = players.filter(p=>p.isActive).map(p => ({
      ...p, ...Calc.playerSeasonStats(p.playerId, finishedGames, allGP)
    }));

    const topScorers = [...pStats].sort((a,b)=>b.goals-a.goals).slice(0,5);
    const topAssisters = [...pStats].sort((a,b)=>b.assists-a.assists).slice(0,5);
    const mostApps = [...pStats].filter(p=>p.calledUp>0).sort((a,b)=>b.calledUp-a.calledUp).slice(0,5);
    const mostMoM = [...pStats].sort((a,b)=>b.mom-a.mom).filter(p=>p.mom>0).slice(0,5);

    window._teamSummaryAllStats = pStats; // store full dataset for re-sort

    // Most Used Lineup — best XI based on appearances per position this season
    const mostUsedLineup = buildMostUsedLineup(players, finishedGames, allGP);
    const shirtColor = State.currentSeason?.shirtColor || '#B23333';

    // Squad-wide injury report for this season
    const allPlayers = await DB.getAll('players','seasonId',State.currentSeasonId);
    const allInjuriesThisSeason = (await DB.getAll('injuries','seasonId',State.currentSeasonId));
    const injuriesByPlayer = {};
    allInjuriesThisSeason.forEach(inj => {
      if (!injuriesByPlayer[inj.playerId]) injuriesByPlayer[inj.playerId] = [];
      injuriesByPlayer[inj.playerId].push(inj);
    });
    const currentlyInjured = allPlayers.filter(p => {
      const list = injuriesByPlayer[p.playerId] || [];
      return list.some(i => i.status === 'Injured');

    const playersWithHistory = allPlayers.filter(p => (injuriesByPlayer[p.playerId]||[]).length > 0);

    el.innerHTML = `
      <div class="stat-grid">

        <div class="stat-card"><div class="val">${ts.wins}</div><div class="lbl">${I18n.t('ts_wins')}</div></div>

        <div class="stat-card"><div class="val">${ts.losses}</div><div class="lbl">${I18n.t('ts_losses')}</div></div>
        <div class="stat-card"><div class="val">${ts.goalsFor}</div><div class="lbl">${I18n.t('ts_goals_for')}</div></div>
        <div class="stat-card"><div class="val">${ts.goalsAgainst}</div><div class="lbl">${I18n.t('ts_goals_against')}</div></div>
        <div class="stat-card"><div class="val">${ts.goalDiff>0?'+':''}${ts.goalDiff}</div><div class="lbl">${I18n.t('ts_goal_diff')}</div></div>
        <div class="stat-card"><div class="val">${ts.cleanSheets}</div><div class="lbl">${I18n.t('ts_clean_sheets')}</div></div>
      </div>

      ${renderLineupPitch(mostUsedLineup, shirtColor)}

      <div class="card">
        <div class="card-title">${I18n.t('ts_records')}</div>
        <div class="info-row"><span class="ir-label">${I18n.t('ts_home')}</span><span class="ir-value">${ts.homeW}W ${ts.homeD}D ${ts.homeL}L</span></div>
        <div class="info-row"><span class="ir-label">${I18n.t('ts_away')}</span><span class="ir-value">${ts.awayW}W ${ts.awayD}D ${ts.awayL}L</span></div>
        <div class="info-row"><span class="ir-label">${I18n.t('ts_best_win_streak')}</span><span class="ir-value">${ts.bestStreak} ${I18n.t('ts_games_suffix')}</span></div>
        <div class="info-row"><span class="ir-label">${I18n.t('ts_best_unbeaten')}</span><span class="ir-value">${ts.bestUnbeaten} ${I18n.t('ts_games_suffix')}</span></div>
        ${ts.biggestWin?`<div class="info-row"><span class="ir-label">${I18n.t('ts_biggest_win')}</span><span class="ir-value">${ts.biggestWin.score} ${I18n.t('ts_vs')} ${esc(ts.biggestWin.opp)}</span></div>`:''}
        ${ts.biggestLoss?`<div class="info-row"><span class="ir-label">${I18n.t('ts_biggest_loss')}</span><span class="ir-value">${ts.biggestLoss.score} ${I18n.t('ts_vs')} ${esc(ts.biggestLoss.opp)}</span></div>`:''}
      </div>

      <div class="card">
        <div class="card-title">${I18n.t('ts_injuries_title')}</div>
        ${currentlyInjured.length ? `
          <p style="font-size:11px;color:var(--muted);margin-bottom:8px">${I18n.t('ts_injuries_current_count', {n: currentlyInjured.length})}</p>

        ${playersWithHistory.length ? `

      </div>

      <div class="leader-grid">

  // ── LEADER CARD — featured top player + short ranked list, single stat ──────
  function leaderCard(title, players, statKey, statLabel) {
    if (!players.length) return '<div></div>';
    const leader = players[0];
    const rest = players.slice(1, 5);
    const initials = (leader.fullName||'').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
    return `
      <div class="leader-col">
        <div class="leader-col-title">${title.toUpperCase()}</div>
        <div class="card leader-feature-card">
          <div class="leader-feature">
            <div class="leader-feature-left">
              <div class="leader-name">${esc(shortName(leader.fullName))}</div>
              <div class="leader-stat-val">${leader[statKey]||0}</div>
              <div class="leader-stat-lbl">${statLabel}</div>
            </div>
            <div class="leader-feature-photo">
              ${leader.photoUrl
                ? `<img src="${esc(leader.photoUrl)}" onerror="this.outerHTML='<div class=&quot;leader-photo-fallback&quot;>${initials}</div>'">`
                : `<div class="leader-photo-fallback">${initials}</div>`}
            </div>
          </div>
        </div>
        ${rest.length ? `
        <div class="card leader-list-card">
          ${rest.map((p,i) => `
            <div class="leader-row">
              <span class="leader-rank">${i+2}</span>
              <span class="leader-row-name" title="${esc(p.fullName)}">${esc(shortName(p.fullName))}</span>
              <span class="leader-row-val">${p[statKey]||0}</span>
            </div>`).join('')}
        </div>` : ''}
      </div>`;
  }

  function playerTable(tableId, title, players, fields, headers) {
    if (!players.length) return '';
    const elId = `pt-${tableId}`;
    const sortKey = window[`_sortKey_${tableId}`] || fields[1]; // default: second field (the "top" metric)
    const sortDir = window[`_sortDir_${tableId}`] || 'desc';

    const sorted = [...players].sort((a,b) => {
      const av = a[sortKey]||0, bv = b[sortKey]||0;
      const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
      return sortDir === 'asc' ? cmp : -cmp;
    });

    return `
      <div class="card" id="${elId}" style="padding:14px 0 14px 14px">
        <div class="card-title" style="padding-right:14px">${title}</div>
        <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:280px">
          <thead><tr>${headers.map((h,i)=>{
            const key = fields[i];
            const active = sortKey === key;
            const arrow = active ? (sortDir==='asc'?' ▲':' ▼') : '';
            const stickyStyle = i===0 ? 'position:sticky;left:0;background:#fff;z-index:1;' : '';
            return `<th style="${stickyStyle}font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#999;padding:5px 8px;text-align:${i===0?'left':'center'};border-bottom:1px solid #ddd;white-space:nowrap;cursor:pointer;user-select:none" onclick="playerTableSort('${tableId}','${key}')">${h}${arrow}</th>`;
          }).join('')}</tr></thead>
          <tbody>${sorted.map((p,i)=>`<tr>${fields.map((f,fi)=>{
            const stickyStyle = fi===0 ? 'position:sticky;left:0;background:#fff;z-index:1;' : '';
            return `<td style="${stickyStyle}padding:7px 8px;font-size:12px;border-bottom:1px solid #eee;white-space:nowrap;${fi===0?'font-weight:700':'text-align:center'}" ${fi===0?`title="${esc(p[f])}"`:''}>${fi===0?`${i+1}. ${esc(shortName(p[f]))}`:p[f]||0}</td>`;
          }).join('')}</tr>`).join('')}</tbody>
        </table>
        </div>
      </div>`;
  }

// Global wrapper — onclick handlers run in global scope, Render.teamSummary lives in the closure
function playerTableSort(tableId, key) {
  const current = window[`_sortKey_${tableId}`];
  const dir      = window[`_sortDir_${tableId}`];

// ══════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════════════════════
const Nav = (() => {
  let current = 'dashboard';

  async function go(section) {
    if (typeof gdDebugLog === 'function') gdDebugLog(`Nav.go('${section}')`);
    // close game detail if open
    document.getElementById('gamesListView').style.display = 'block';
    document.getElementById('gameDetailView').style.display = 'none';

    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(`sec-${section}`)?.classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l=>{
      l.classList.toggle('active', l.dataset.section===section);
    });
    current = section;
    State.currentSection = section;
    try { sessionStorage.setItem('squadTracker_lastSection', section); } catch(e) {}

    // close mobile menu
    document.getElementById('mobileMenu').classList.remove('open');

    // render section
    await refresh(section);
    window.scrollTo(0,0);

    // Populate the scroll-triggered nav label directly from whatever the
    // page's own <h1> actually says — this is what makes the mechanism work
    // automatically for any future page without needing a maintained name
    // map: the label always matches the real heading because it IS the real
    // heading's text, just echoed into the nav once you scroll past it.
    // Use the nav button's own label as the page name — more reliable than
    // scraping page content (which varies: some pages have no heading at
    // all, Home's only heading is a "Welcome to NextEleven" banner that
    // isn't a useful page label). The nav button text is always correct,
    // already translated, and exists for every current and future page.
    // Use the nav button's own label as the page name — more reliable than
    // scraping page content (which varies: some pages have no heading at
    // all, Home's only heading is a "Welcome to NextEleven" banner that
    // isn't a useful page label). Most nav buttons wrap their text in a
    // data-nav-label span, but the tracked-player buttons (added per
    // tracked player) just put the player's name directly in the button
    // with no wrapping span — so this falls back to the button's own text
    // when no inner span is found, covering that page and any future
    // button built the same simple way.
    const navBtnEl = document.querySelector(`.nav-link[data-section="${section}"]`);
    const navBtn = navBtnEl?.querySelector('[data-nav-label]');
    const navLabel = document.getElementById('navPageName');
    if (navLabel) navLabel.textContent = navBtn ? navBtn.textContent.trim() : (navBtnEl ? navBtnEl.textContent.trim() : '');
    setupPageNameOnScroll();
  }

  async function refresh(section) {
    section = section || current;
    switch(section) {
      case 'home':         await Render.home(); break;
      case 'dashboard':    await Render.dashboard(); break;
      case 'squad':        await Render.squad(document.getElementById('squadSearch')?.value||'', document.getElementById('squadFilter')?.value||''); break;
      case 'games':        await Render.gamesList(document.getElementById('gamesSearch')?.value||'', document.getElementById('gamesFilter')?.value||''); break;
      case 'teamSummary':  await Render.teamSummary(); break;
      case 'settings':     await Render.settings(); break;
      case 'help':         Render.help(); break;
      case 'admin':
        switchAdminTab('roadmap');
        break;
      default:
        if (section.startsWith('tracked-')) {
          const pid = parseInt(section.replace('tracked-',''));
          await Render.trackedPlayer(pid);
        }
        break;
    }
  }

  // ── PLAYER PORTAL NAVIGATION — fully separate from the guardian app's
  // go(), so there is no shared code path that could accidentally expose a
  // guardian-only section to the portal.
  async function goPortal(section) {
    gdDebugLog(`goPortal('${section}') called`);

    const allSections = document.querySelectorAll('#playerPortal .section');
    gdDebugLog(`found ${allSections.length} .section elements inside #playerPortal`);
    allSections.forEach(s => s.style.display = 'none');

    const target = document.getElementById(`pp-sec-${section}`);
    gdDebugLog(`target element pp-sec-${section} exists: ${!!target}`);
    if (!target) { gdDebugLog(`ABORT — no element with id pp-sec-${section} found in the DOM`); return; }
    // IMPORTANT: must be an explicit 'block', not '' — the base .section CSS
    // rule is display:none, and these elements never carry the .active class
    // that the guardian app's sections use to override that. Clearing the
    // inline style here was falling straight back to that none rule, which
    // is the actual reason every page but Home appeared blank: the content
    // was rendering correctly the whole time, just sitting inside an element
    // the stylesheet was still hiding.
    target.style.display = 'block';

    document.querySelectorAll('#portalMobileMenu .nav-link[data-portal-section]').forEach(l => {
      l.classList.toggle('active', l.dataset.portalSection === section);
    });
    State.currentPortalSection = section;
    try { sessionStorage.setItem('squadTracker_lastPortalSection', section); } catch(e) {}

    gdDebugLog(`State.portalPlayerId = ${State.portalPlayerId}, State.currentSeasonId = ${State.currentSeasonId}`);

    try {
      if (section === 'home')      { gdDebugLog('calling renderPlayerPortalHome()'); await renderPlayerPortalHome(); gdDebugLog('renderPlayerPortalHome() finished OK'); }
      if (section === 'dashboard') { gdDebugLog('calling renderPlayerPortalStats()'); await renderPlayerPortalStats(); gdDebugLog('renderPlayerPortalStats() finished OK'); }
      if (section === 'stats')     { gdDebugLog('calling renderPlayerPortalExtendedStats()'); await renderPlayerPortalExtendedStats(); gdDebugLog('renderPlayerPortalExtendedStats() finished OK'); }
      if (section === 'training')  { gdDebugLog('calling renderPlayerTrainingShell()'); await renderPlayerTrainingShell(State.portalPlayerId); gdDebugLog('renderPlayerTrainingShell() finished OK'); }
      if (section === 'games')     { gdDebugLog('calling renderPlayerPortalGames()'); await renderPlayerPortalGames(); gdDebugLog('renderPlayerPortalGames() finished OK'); }
      if (section === 'clubs')     { gdDebugLog('calling renderPlayerPortalClubs()'); await renderPlayerPortalClubs(); gdDebugLog('renderPlayerPortalClubs() finished OK'); }
      if (section === 'achievements') { gdDebugLog('calling renderPlayerPortalAchievements()'); await renderPlayerPortalAchievements(); gdDebugLog('renderPlayerPortalAchievements() finished OK'); }
      if (section === 'events')    { gdDebugLog('calling renderPlayerPortalEvents()'); await renderPlayerPortalEvents(); gdDebugLog('renderPlayerPortalEvents() finished OK'); }
      if (section === 'teamsummary') { gdDebugLog('calling renderPlayerPortalTeamSummary()'); await renderPlayerPortalTeamSummary(); gdDebugLog('renderPlayerPortalTeamSummary() finished OK'); }
      gdDebugLog(`target.innerHTML.length after render = ${target.innerHTML.length}`);

      // Populate the scroll-triggered nav label directly from the page's own
      // <h1> text — same zero-maintenance approach as the guardian side, so
      // any future portal page works automatically with no extra wiring.
      // Use the portal nav button's own label — same reliable approach as
      // the guardian side, works for every current and future portal page.
      const navBtn = document.querySelector(`.nav-link[data-portal-section="${section}"] [data-i18n]`);
      const navLabel = document.getElementById('portalNavPageName');
      if (navLabel) navLabel.textContent = navBtn ? navBtn.textContent.trim() : '';
      setupPageNameOnScroll();
    } catch(err) {
      // Show the real error directly on the page instead of leaving it
      // silently blank — async errors here would otherwise only appear in
      // the browser console, invisible on a phone with no way to check it.
      gdDebugLog(`ERROR in ${section}: ${err.message}`);
      const el = document.getElementById(`pp-sec-${section}`);
      if (el) el.innerHTML = `<div class="empty"><strong>Something went wrong loading this page.</strong><p style="font-family:monospace;font-size:11px;color:#b03030;margin-top:8px">${esc(err.message)}</p></div>`;
      console.error('[goPortal] render error for section', section, err);
    }
  }

  return { go, refresh, current: () => current, goPortal };
})();

const Toast = (() => {
  let timer;
  function show(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'show error' : 'show';
    clearTimeout(timer);
    timer = setTimeout(()=>t.className='', 2800);
  }
  function error(msg) { show(msg, true); }
  return { show, error };
})();

const Confirm = (() => {
  let _cb = null;
  function show(title, msg, cb) {
    _cb = cb;
    document.getElementById('dialogTitle').textContent = title;
    document.getElementById('dialogMsg').textContent = msg;
    document.getElementById('confirmDialog').classList.add('open');
  }
  function resolve(yes) {
    document.getElementById('confirmDialog').classList.remove('open');
    if (yes && _cb) _cb();
    _cb = null;
  }
  return { show, resolve };
})();

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Shortens a full name to "First Last" for compact table display.
// "Lorenzo Morenda Mabere" -> "Lorenzo Mabere". Names with 1-2 words pass through unchanged.
function shortName(fullName) {
  if (!fullName) return '';
  const parts = String(fullName).trim().split(/\s+/);
  if (parts.length <= 2) return fullName;
  return parts[0] + ' ' + parts[parts.length - 1];
}
function fmtDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

  if (!nat) return '';
  const parts = nat.split('/').map(s => s.trim().toLowerCase());
  const flags = parts.map(p => NATIONALITY_FLAGS[p] || '').filter(Boolean);
  return flags.length ? flags.join(' ') : '&#127760;'; // globe fallback

function calcAge(dob) {
  if (!dob) return null;
  const birth = new Date(dob);
  if (isNaN(birth)) return null;
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  const monthDiff = now.getMonth() - birth.getMonth();
  if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birth.getDate())) age--;
  return age;
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// CSV PARSER (synchronous — no async, no await)
// ══════════════════════════════════════════════════════════════════════════════
function parseCSVText(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g,'').trim().toLowerCase().replace(/\s+/g,''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  });
}
